<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KETADATA NETWORK ROUTER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--fg:#fff;--muted:#555;--line:#181818;--line2:#2a2a2a;--top:42px;--left:280px;--right:340px}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;font-size:11px;overflow:hidden;cursor:crosshair}
body.invert{filter:invert(1);background:#fff}
button,input,textarea,select{font-family:Arial,Helvetica,sans-serif;font-size:11px;background:#000;color:#fff;border:1px solid var(--line2);outline:none;border-radius:0}
input,textarea,select{width:100%;padding:6px;color:rgba(255,255,255,.82)}
textarea{resize:vertical;min-height:38px;line-height:1.45}
button{padding:6px 8px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.62);cursor:pointer}
button:hover{color:#fff;border-color:rgba(255,255,255,.45)}
.topbar{position:fixed;top:0;left:0;right:0;height:var(--top);border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:#000;z-index:50}
.brand{letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.42)}.brand b{color:#fff}
.status{letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-size:9px}
.shell{position:fixed;top:var(--top);left:0;right:0;bottom:0;display:grid;grid-template-columns:var(--left) 1fr var(--right)}
.left{height:100%;overflow:hidden;background:#000}.right{height:100%;overflow:auto;background:#000}.left{border-right:1px solid var(--line2)}.right{border-left:1px solid var(--line2)}
.section{border-bottom:1px solid var(--line2);padding:9px}.kicker{color:var(--muted);letter-spacing:.18em;text-transform:uppercase;font-size:9px;margin-bottom:6px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}.stack{display:grid;gap:6px}.row{display:flex;gap:8px}.row>*{flex:1}
.note{color:rgba(255,255,255,.42);line-height:1.55}
.stageWrap{position:relative;height:100%;overflow:hidden;background:#000}
.toolbar{position:absolute;top:0;left:0;right:0;height:45px;background:#000;border-bottom:1px solid var(--line2);z-index:15;display:flex;align-items:center;gap:8px;padding:8px 10px}
.pill{border:1px solid var(--line2);padding:7px 10px;color:rgba(255,255,255,.45);letter-spacing:.14em;text-transform:uppercase;font-size:9px;cursor:pointer;user-select:none}
.pill.on{color:#fff;border-color:#fff}
.stage{position:absolute;top:45px;left:0;right:0;bottom:0;overflow:hidden;background:
  linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:48px 48px}
.links{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
.linkLine{stroke:rgba(255,255,255,.24);stroke-width:1}
.linkLine.hot{stroke:rgba(255,255,255,.76);stroke-width:1.4}
.linkLabel{fill:rgba(255,255,255,.38);font-size:8px;letter-spacing:.12em;text-transform:uppercase}
.cluster{position:absolute;border:1px dashed rgba(255,255,255,.17);background:rgba(255,255,255,.018);min-width:180px;min-height:110px;z-index:2}
.clusterTitle{position:absolute;top:-22px;left:-1px;border:1px solid rgba(255,255,255,.16);background:#000;padding:5px 8px;color:rgba(255,255,255,.48);font-size:9px;letter-spacing:.16em;text-transform:uppercase;cursor:grab;user-select:none;white-space:nowrap}
.node{position:absolute;width:190px;min-height:118px;background:#000;border:1px solid rgba(255,255,255,.24);padding:11px;z-index:5;cursor:grab;user-select:none}
.node:hover{border-color:rgba(255,255,255,.55)}.node.selected{border-color:#fff}.node.routeHot{box-shadow:0 0 0 1px rgba(255,255,255,.18)}
.nodeName{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#fff;line-height:1.3;margin-bottom:6px}
.nodeType{font-size:8px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px}
.nodeMini{font-size:10px;line-height:1.35;color:rgba(255,255,255,.58);white-space:pre-wrap}
.detail{padding:14px}.bigName{font-size:15px;letter-spacing:.08em;text-transform:uppercase;line-height:1.35;margin-bottom:4px}
.small{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
.label{font-size:8px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;margin-bottom:3px}.value{line-height:1.45;color:rgba(255,255,255,.68);white-space:pre-wrap}
.line{border-top:1px solid var(--line2);margin:13px 0}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.empty{color:var(--muted);line-height:1.6;padding:16px}
.connRow{border:1px solid var(--line2);padding:9px;margin-bottom:7px;color:rgba(255,255,255,.68);line-height:1.45}
.connTop{display:flex;justify-content:space-between;gap:8px;color:#fff;text-transform:uppercase;letter-spacing:.08em}
.connKind{color:var(--muted);font-size:8px;letter-spacing:.14em}
.xbtn{padding:3px 6px;font-size:8px}
.opportunity{border:1px solid var(--line2);padding:9px;margin-bottom:8px;background:#000}
.hotkeys{position:fixed;left:14px;bottom:12px;color:#333;font-size:9px;letter-spacing:.12em;text-transform:uppercase;pointer-events:none;z-index:80}
.null .topbar,.null .shell,.null .hotkeys{opacity:0;pointer-events:none}

@media(max-height:900px){
.left textarea{min-height:30px!important}
.left .section{padding:7px}
.left .stack{gap:4px}
.left input,.left select,.left textarea{padding:5px}
.left button{padding:5px 6px}
}

@media(max-width:1000px){.shell{grid-template-columns:1fr}.left,.right{display:none}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><b>KETADATA</b> NETWORK ROUTER</div>
  <div class="status" id="status">LOCAL STATE</div>
</div>

<div class="shell">
  <aside class="left">
    <div class="section">
      <div class="kicker">ADD NODE</div>
      <div class="stack">
        <input id="f_name" placeholder="NAME">
        <div class="grid">
          <select id="f_type"><option>BUILDER</option><option>THINKER</option><option>CONNECTOR</option><option>PATRON</option><option>AUDIENCE</option></select>
          <select id="f_status"><option>WARM</option><option>HOT</option><option>COLD</option><option>DORMANT</option><option>ACTIVE</option></select>
        </div>
        <input id="f_domain" placeholder="DOMAIN / FIELD">
        <textarea id="f_signal" placeholder="SIGNAL / WHAT THEY SEE"></textarea>
        <textarea id="f_need" placeholder="NEED / WHAT THEY WANT"></textarea>
        <textarea id="f_value" placeholder="VALUE / WHAT THEY CAN CONTRIBUTE"></textarea>
        <textarea id="f_routes" placeholder="POTENTIAL ROUTES"></textarea>
        <textarea id="f_notes" placeholder="NOTES"></textarea>
        <button onclick="addNode()">ADD NODE</button>
      </div>
    </div>

    <div class="section">
      <div class="kicker">ADD CLUSTER</div>
      <div class="stack">
        <input id="clusterName" placeholder="CLUSTER NAME">
        <button onclick="addCluster()">ADD CLUSTER</button>
      </div>
    </div>

    <div class="section">
      <div class="kicker">ADD OPPORTUNITY</div>
      <div class="stack">
        <input id="o_title" placeholder="OPPORTUNITY / MOTION">
        <textarea id="o_need" placeholder="NEEDS"></textarea>
        <textarea id="o_matches" placeholder="POTENTIAL MATCHES"></textarea>
        <textarea id="o_notes" placeholder="NOTES"></textarea>
        <button onclick="addOpportunity()">ADD OPPORTUNITY</button>
      </div>
    </div>

    <div class="section">
      <div class="kicker">STATE</div>
      <div class="stack">
        <button onclick="exportCSV()">EXPORT NODES CSV</button>
        <button onclick="exportLinksCSV()">EXPORT LINKS CSV</button>
        <button onclick="exportJSON()">EXPORT JSON</button>
        <button onclick="document.getElementById('importFile').click()">IMPORT JSON</button>
        <input id="importFile" type="file" accept=".json,application/json" style="display:none" onchange="importJSON(event)">
      </div>
    </div>
  </aside>

  <main class="stageWrap">
    <div class="toolbar">
      <span class="pill on" data-filter="ALL" onclick="setFilter('ALL')">ALL</span>
      <span class="pill" data-filter="BUILDER" onclick="setFilter('BUILDER')">BUILDERS</span>
      <span class="pill" data-filter="THINKER" onclick="setFilter('THINKER')">THINKERS</span>
      <span class="pill" data-filter="CONNECTOR" onclick="setFilter('CONNECTOR')">CONNECTORS</span>
      <span class="pill" data-filter="PATRON" onclick="setFilter('PATRON')">PATRONS</span>
      <span class="pill" data-filter="AUDIENCE" onclick="setFilter('AUDIENCE')">AUDIENCE</span>
      <input id="search" placeholder="SEARCH" oninput="render()" style="max-width:210px;margin-left:auto">
    </div>
    <div class="stage" id="stage">
      <svg class="links" id="links"></svg>
      <div id="clusters"></div>
      <div id="nodes"></div>
    </div>
  </main>

  <aside class="right">
    <div class="detail" id="detail"><div class="empty">SELECT A NODE.</div></div>
  </aside>
</div>

<div class="hotkeys">SHIFT+I INVERT · SHIFT+N NULL · DRAG NODES · SELECT NODE TO ADD CONNECTION</div>

<script>
const STORAGE_KEY='KETADATA_NETWORK_ROUTER_STATE_v3';
let state={nodes:[],links:[],clusters:[],opportunities:[],selectedId:null,filter:'ALL'};
let drag=null;

function uid(p='ID'){return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7)}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));flashStatus('SAVED')}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)state={nodes:[],links:[],clusters:[],opportunities:[],selectedId:null,filter:'ALL',...JSON.parse(raw)}}catch(e){}}
function flashStatus(t){const s=document.getElementById('status');s.textContent=t;setTimeout(()=>s.textContent='LOCAL STATE',900)}
function val(id){return document.getElementById(id).value.trim()}
function setVal(id,v){document.getElementById(id).value=v||''}
function stageRect(){return document.getElementById('stage').getBoundingClientRect()}
function defaultPos(){const r=stageRect();return {x:Math.max(30,Math.random()*(r.width-250)),y:Math.max(30,Math.random()*(r.height-170))}}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function trunc(s,n){s=s||'';return s.length>n?s.slice(0,n-1)+'…':s}

function addNode(){
  const pos=defaultPos();
  const n={id:uid('N'),name:val('f_name'),type:val('f_type'),status:val('f_status'),domain:val('f_domain'),signal:val('f_signal'),need:val('f_need'),value:val('f_value'),routes:val('f_routes'),notes:val('f_notes'),x:pos.x,y:pos.y,created:new Date().toISOString(),updated:new Date().toISOString()};
  if(!n.name){flashStatus('NAME REQUIRED');return}
  state.nodes.push(n);state.selectedId=n.id;clearNodeForm();save();render();
}
function clearNodeForm(){['f_name','f_domain','f_signal','f_need','f_value','f_routes','f_notes'].forEach(id=>setVal(id,''));setVal('f_type','BUILDER');setVal('f_status','WARM')}
function addCluster(){const name=val('clusterName')||'CLUSTER';const pos=defaultPos();state.clusters.push({id:uid('C'),name,x:pos.x,y:pos.y,w:260,h:160});setVal('clusterName','');save();render()}
function addOpportunity(){
  const o={id:uid('O'),title:val('o_title'),need:val('o_need'),matches:val('o_matches'),notes:val('o_notes'),created:new Date().toISOString()};
  if(!o.title){flashStatus('TITLE REQUIRED');return}
  state.opportunities.unshift(o);['o_title','o_need','o_matches','o_notes'].forEach(id=>setVal(id,''));save();renderDetail();flashStatus('OPPORTUNITY ADDED');
}
function setFilter(f){state.filter=f;render();save()}
function filteredNodes(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  return state.nodes.filter(n=>{
    const typeOk=state.filter==='ALL'||n.type===state.filter;
    const text=[n.name,n.type,n.status,n.domain,n.signal,n.need,n.value,n.routes,n.notes].join(' ').toLowerCase();
    return typeOk&&(!q||text.includes(q));
  });
}
function render(){
  renderClusters();renderNodes();renderLinks();renderDetail();
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('on',p.dataset.filter===state.filter));
}
function renderClusters(){
  document.getElementById('clusters').innerHTML=state.clusters.map(c=>`
    <div class="cluster" style="left:${c.x}px;top:${c.y}px;width:${c.w}px;height:${c.h}px">
      <div class="clusterTitle" onmousedown="startDrag(event,'cluster','${c.id}')">${esc(c.name)}</div>
    </div>`).join('');
}
function renderNodes(){
  const visible=new Set(filteredNodes().map(n=>n.id));
  document.getElementById('nodes').innerHTML=state.nodes.filter(n=>visible.has(n.id)).map(n=>`
    <div class="node ${state.selectedId===n.id?'selected':''} ${isConnectedToSelected(n.id)?'routeHot':''}" style="left:${n.x}px;top:${n.y}px" onmousedown="startDrag(event,'node','${n.id}')" onclick="nodeClick(event,'${n.id}')">
      <div class="nodeName">${esc(n.name)}</div>
      <div class="nodeType">${esc(n.type)} · ${esc(n.status)}</div>
      <div class="nodeMini">${esc(trunc(n.domain,48))}</div>
      <div class="nodeMini" style="margin-top:8px">${esc(trunc(n.need||n.signal||n.value,82))}</div>
    </div>`).join('');
}
function isConnectedToSelected(id){
  if(!state.selectedId||id===state.selectedId)return false;
  return state.links.some(l=>(l.a===state.selectedId&&l.b===id)||(l.b===state.selectedId&&l.a===id));
}
function renderLinks(){
  const svg=document.getElementById('links');
  const visible=new Set(filteredNodes().map(n=>n.id));
  svg.innerHTML=state.links.map(l=>{
    const a=state.nodes.find(n=>n.id===l.a),b=state.nodes.find(n=>n.id===l.b);
    if(!a||!b||!visible.has(a.id)||!visible.has(b.id))return '';
    const x1=a.x+95,y1=a.y+59,x2=b.x+95,y2=b.y+59,mx=(x1+x2)/2,my=(y1+y2)/2;
    const hot=state.selectedId===a.id||state.selectedId===b.id?' hot':'';
    return `<line class="linkLine${hot}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"></line><text class="linkLabel" x="${mx+5}" y="${my-5}">${esc(l.kind||'ROUTE')}</text>`;
  }).join('');
}
function nodeClick(e,id){e.stopPropagation();state.selectedId=id;save();render()}
function selected(){return state.nodes.find(n=>n.id===state.selectedId)}
function field(label,value){return `<div class="line"></div><div class="label">${label}</div><div class="value">${esc(value||'')}</div>`}
function renderDetail(){
  const d=document.getElementById('detail');
  const n=selected();
  if(!n){
    d.innerHTML='<div class="empty">SELECT A NODE.<br><br>SELECTED NODE PANEL CONTAINS ADD CONNECTION CONTROLS.</div>'+renderOpportunities();
    return;
  }
  d.innerHTML=`<div class="bigName">${esc(n.name)}</div><div class="small">${esc(n.type)} · ${esc(n.status)} · ${esc(n.domain)}</div>
  ${field('SIGNAL',n.signal)}${field('NEED',n.need)}${field('VALUE',n.value)}${field('ROUTES',n.routes)}
  <div class="line"></div><div class="kicker">ADD CONNECTION</div>
  <div class="stack">
    <select id="targetNode">${state.nodes.filter(x=>x.id!==n.id).map(x=>`<option value="${x.id}">${esc(x.name)} · ${esc(x.type)}</option>`).join('')}</select>
    <select id="linkKind"><option>ROUTE</option><option>KNOWS</option><option>FRIEND</option><option>COLLABORATOR</option><option>CLIENT</option><option>PATRON</option><option>FUNDS</option><option>NEEDS</option><option>BUILDS</option><option>INTRODUCE</option><option>OPPORTUNITY</option></select>
    <textarea id="linkNote" placeholder="CONNECTION NOTE"></textarea>
    <button onclick="addConnectionFromPanel()">ADD CONNECTION</button>
  </div>
  <div class="line"></div><div class="kicker">CONNECTIONS</div>${renderConnections(n)}
  <div class="line"></div><div class="actions"><button onclick="editSelected()">EDIT</button><button onclick="deleteSelected()">DELETE</button></div>
  ${field('NOTES',n.notes)}
  ${renderOpportunities()}`;
}
function renderConnections(n){
  const links=state.links.filter(l=>l.a===n.id||l.b===n.id);
  if(!links.length)return '<div class="empty" style="padding:0">NO CONNECTIONS.</div>';
  return links.map(l=>{
    const other=state.nodes.find(x=>x.id===(l.a===n.id?l.b:l.a));
    return `<div class="connRow"><div class="connTop"><span>${esc(other?other.name:'MISSING')}</span><button class="xbtn" onclick="deleteLink('${l.id}')">X</button></div><div class="connKind">${esc(l.kind||'ROUTE')}</div><div>${esc(l.note||'')}</div></div>`;
  }).join('');
}
function renderOpportunities(){
  return `<div class="line"></div><div class="kicker">OPPORTUNITIES</div>`+(state.opportunities.length?state.opportunities.map(o=>`<div class="opportunity"><div class="connTop"><span>${esc(o.title)}</span><button class="xbtn" onclick="deleteOpportunity('${o.id}')">X</button></div><div class="label">NEEDS</div><div class="value">${esc(o.need)}</div><div class="label" style="margin-top:8px">MATCHES</div><div class="value">${esc(o.matches)}</div><div class="label" style="margin-top:8px">NOTES</div><div class="value">${esc(o.notes)}</div></div>`).join(''):'<div class="empty" style="padding:0">NO OPPORTUNITIES.</div>');
}
function addConnectionFromPanel(){
  const n=selected();if(!n)return;
  const target=document.getElementById('targetNode')?.value;if(!target){flashStatus('NO TARGET');return}
  const exists=state.links.some(l=>(l.a===n.id&&l.b===target)||(l.a===target&&l.b===n.id));
  if(exists){flashStatus('LINK EXISTS');return}
  state.links.push({id:uid('L'),a:n.id,b:target,kind:val('linkKind')||'ROUTE',note:val('linkNote'),created:new Date().toISOString()});
  save();render();flashStatus('CONNECTION ADDED');
}
function deleteLink(id){state.links=state.links.filter(l=>l.id!==id);save();render()}
function deleteOpportunity(id){state.opportunities=state.opportunities.filter(o=>o.id!==id);save();renderDetail()}
function editSelected(){
  const n=selected();if(!n)return;
  setVal('f_name',n.name);setVal('f_type',n.type);setVal('f_status',n.status);setVal('f_domain',n.domain);setVal('f_signal',n.signal);setVal('f_need',n.need);setVal('f_value',n.value);setVal('f_routes',n.routes);setVal('f_notes',n.notes);
  state.nodes=state.nodes.filter(x=>x.id!==n.id);
  state.links=state.links.filter(l=>l.a!==n.id&&l.b!==n.id);
  state.selectedId=null;save();render();flashStatus('LOADED FOR EDIT');
}
function deleteSelected(){
  const n=selected();if(!n)return;if(!confirm('DELETE NODE?'))return;
  state.nodes=state.nodes.filter(x=>x.id!==n.id);
  state.links=state.links.filter(l=>l.a!==n.id&&l.b!==n.id);
  state.selectedId=null;save();render();
}
function startDrag(e,type,id){
  if(e.button!==0)return;
  const r=stageRect();
  const obj=type==='node'?state.nodes.find(n=>n.id===id):state.clusters.find(c=>c.id===id);
  if(!obj)return;
  drag={type,id,dx:e.clientX-r.left-obj.x,dy:e.clientY-r.top-obj.y,moved:false};
  if(type==='node')state.selectedId=id;
  document.addEventListener('mousemove',onDrag);
  document.addEventListener('mouseup',endDrag);
}
function onDrag(e){
  if(!drag)return;
  drag.moved=true;
  const r=stageRect();
  const obj=drag.type==='node'?state.nodes.find(n=>n.id===drag.id):state.clusters.find(c=>c.id===drag.id);
  if(!obj)return;
  obj.x=Math.max(0,e.clientX-r.left-drag.dx);obj.y=Math.max(0,e.clientY-r.top-drag.dy);obj.updated=new Date().toISOString();
  renderClusters();renderNodes();renderLinks();
}
function endDrag(){document.removeEventListener('mousemove',onDrag);document.removeEventListener('mouseup',endDrag);drag=null;save()}
function download(name,content,type){const blob=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function csvEscape(v){v=String(v??'');if(/[",\n]/.test(v))return '"'+v.replace(/"/g,'""')+'"';return v}
function exportCSV(){
  const headers=['name','type','status','domain','signal','need','value','routes','notes','connections','x','y','created','updated'];
  const rows=[headers.join(',')].concat(state.nodes.map(n=>{
    const connections=state.links.filter(l=>l.a===n.id||l.b===n.id).map(l=>{const other=state.nodes.find(x=>x.id===(l.a===n.id?l.b:l.a));return other?`${other.name} (${l.kind||'ROUTE'})`:''}).filter(Boolean).join('; ');
    const o={...n,connections};return headers.map(h=>csvEscape(o[h])).join(',');
  }));
  download('KETADATA_NETWORK_ROUTER_NODES.csv',rows.join('\n'),'text/csv;charset=utf-8');flashStatus('CSV EXPORTED');
}
function exportLinksCSV(){
  const headers=['from','to','kind','note','created'];
  const rows=[headers.join(',')].concat(state.links.map(l=>{
    const a=state.nodes.find(n=>n.id===l.a),b=state.nodes.find(n=>n.id===l.b);
    return [a?a.name:'',b?b.name:'',l.kind||'',l.note||'',l.created||''].map(csvEscape).join(',');
  }));
  download('KETADATA_NETWORK_ROUTER_LINKS.csv',rows.join('\n'),'text/csv;charset=utf-8');flashStatus('LINKS CSV EXPORTED');
}
function exportJSON(){download('KETADATA_NETWORK_ROUTER_STATE.json',JSON.stringify(state,null,2),'application/json;charset=utf-8');flashStatus('JSON EXPORTED')}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;const reader=new FileReader();
  reader.onload=()=>{try{const imported=JSON.parse(reader.result);if(!imported.nodes||!Array.isArray(imported.nodes))throw new Error('bad file');state={nodes:[],links:[],clusters:[],opportunities:[],selectedId:null,filter:'ALL',...imported};save();render();flashStatus('JSON IMPORTED')}catch(err){alert('Invalid JSON state file.')}};
  reader.readAsText(file);e.target.value='';
}
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName))return;
  if(e.shiftKey&&e.key.toLowerCase()==='i')document.body.classList.toggle('invert');
  if(e.shiftKey&&e.key.toLowerCase()==='n')document.body.classList.toggle('null');
});
document.getElementById('stage').addEventListener('click',()=>{state.selectedId=null;save();render()});
load();render();
</script>
