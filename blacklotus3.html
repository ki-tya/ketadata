<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BLACK LOTUS // DYNAMIC</title>
  <style>
    :root{
      --bg:#000;
      --ink:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.60);
      --line:rgba(255,255,255,.10);
      --line2:rgba(255,255,255,.18);
      --r:0px;
      --font: Arial, Helvetica, sans-serif;
    }
    *{ box-sizing:border-box; font-family: var(--font) !important; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: var(--bg);
      color: var(--ink);
      overflow:hidden;
    }

    #c{ position:fixed; inset:0; display:block; }

    .ui{
      position:fixed;
      left:14px;
      top:54px;
      z-index:10;
      display:flex;
      flex-direction:column;
      gap:10px;
      width:min(420px, calc(100vw - 24px));
      pointer-events:none;
    }
    .panel{
      pointer-events:auto;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.30);
      backdrop-filter: blur(8px);
      padding:10px;
      user-select:none;
      box-shadow:0 22px 80px rgba(0,0,0,.55);
    }
    .title{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      text-transform:uppercase;
      letter-spacing:.22em;
      font-weight:900;
      font-size:11px;
      color:rgba(255,255,255,.86);
      margin-bottom:8px;
      cursor:pointer;
    }
    .hint{
      font-size:11px;
      color:var(--muted);
      letter-spacing:.02em;
      text-transform:none;
      font-weight:400;
      max-width: 240px;
      text-align:right;
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:8px;
    }
    label{
      display:block;
      font-size:10px;
      color:rgba(255,255,255,.75);
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:8px;
    }
    input[type="range"]{
      width:100%;
      accent-color: rgba(220,220,220,.95);
    }
    .row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }
    .btn{
      appearance:none;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.22);
      color:rgba(255,255,255,.82);
      padding:6px 10px;
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      cursor:pointer;
    }
    .btn:hover{ border-color: var(--line2); }
    
    .miniBtn{
      width:26px;
      height:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.22);
      color: rgba(255,255,255,.85);
      cursor:pointer;
      font-weight:900;
      user-select:none;
      font-size:12px;
    }

    .miniBtn:hover{
      border-color: rgba(255,255,255,.28);
      color:#fff;
    }

.pill{
      border:1px solid var(--line);
      background: rgba(255,255,255,.02);
      padding:6px 8px;
      font-size:11px;
      color:var(--muted);
      border-radius: var(--r);
      text-transform:lowercase;
      white-space:nowrap;
    }

    .panel.collapsed .grid,
    .panel.collapsed .row,
    .panel.collapsed .spacer,
    .panel.collapsed .directory,
    .panel.collapsed .hotkeys{
      display:none !important;
    }
    .panel.collapsed .title{
      margin-bottom:0;
    }

    /* DIRECTORY SPECIFIC */
    .directory{
      max-height: calc(100vh - 180px);
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 6px;
    }
    .directory::-webkit-scrollbar{ width:6px; }
    .directory::-webkit-scrollbar-track{ background:rgba(255,255,255,.05); }
    .directory::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.15); border-radius:0; }
    .directory::-webkit-scrollbar-thumb:hover{ background:rgba(255,255,255,.25); }

    .dirSection{
      margin-bottom:16px;
    }
    .dirSection:last-child{
      margin-bottom:0;
    }
    .dirLabel{
      font-size:11px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:6px;
      font-weight:700;
    }
    .dirLinks{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .dirLink{
      font-size:11px;
      color:var(--ink);
      text-decoration:none;
      padding:4px 6px;
      border:1px solid transparent;
      transition: border-color 0.15s;
      display:block;
      letter-spacing:.02em;
    }
    .dirLink:hover{
      border-color:var(--line2);
    }


    body.null .ui{
      display:none !important;
    }

    .entryHints{
      position:fixed;
      inset:0;
      z-index:9;
      pointer-events:none;
    }
    .hintShiftI{
      position:absolute;
      right:14px;
      bottom:14px;
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:rgba(255,255,255,.22);
      mix-blend-mode:normal;
    }
    .hintHiddenBlack{
      position:absolute;
      left:14px;
      bottom:14px;
      display:flex;
      gap:14px;
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:rgba(0,0,0,.78);
    }
    .legend{ display:none !important; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="entryHints" aria-hidden="true">
    <div class="hintShiftI">SHIFT&nbsp;I</div>
    <div class="hintHiddenBlack">
      <div>SHIFT&nbsp;K</div>
      <div>SHIFT&nbsp;B</div>
    </div>
  </div>

  <div class="ui">
    <!-- CONTROLS PANEL -->
    <div class="panel" id="panel">
      <div class="title" id="panelTitle">
        <div style="display:flex;align-items:center;justify-content:space-between;width:100%;gap:10px;">
          <div>BLACK LOTUS</div>
          <div style="display:flex;align-items:center;gap:10px;">
            <button class="btn" id="liveMode">LIVE</button>
            <div class="miniBtn" id="ctlCollapse">–</div>
          </div>
        </div>
      </div>

      <div class="grid">
        <div>
          <label>petals</label>
          <input id="petals" type="range" min="6" max="24" value="12" />
        </div>
        <div>
          <label>layers</label>
          <input id="layers" type="range" min="2" max="10" value="6" />
        </div>
        <div>
          <label>spin</label>
          <input id="spin" type="range" min="0" max="100" value="42" />
        </div>
        <div>
          <label>breath</label>
          <input id="breath" type="range" min="0" max="100" value="55" />
        </div>
        <div>
          <label>grain</label>
          <input id="grain" type="range" min="0" max="100" value="35" />
        </div>
        <div>
          <label>contrast</label>
          <input id="contrast" type="range" min="0" max="100" value="65" />
        </div>
      </div>

      <div class="spacer" style="height:10px"></div>
      <div class="row">
        <button class="btn" id="toggle">pause</button>
        <button class="btn" id="invert">invert</button>
        <button class="btn" id="snap">screenshot</button>
        <span class="pill" id="stat">AUTO-MOD</span>
      </div>


      <div class="spacer" style="height:12px"></div>

      <div class="hotkeys" style="border-top:1px solid rgba(255,255,255,.08);padding-top:10px;">

        <div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55);display:flex;flex-wrap:wrap;gap:10px;line-height:1.8;">

          <span>N = NULL</span>
          <span>SHIFT+I = INVERT</span>
          <span>SPACE = PULSE</span>
          <span>R = RE-SEED</span>
          <span>WHEEL = ZOOM</span>

        </div>

      </div>


    </div>
<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: false });

  const ui = {
    petals: document.getElementById("petals"),
    layers: document.getElementById("layers"),
    spin: document.getElementById("spin"),
    breath: document.getElementById("breath"),
    grain: document.getElementById("grain"),
    contrast: document.getElementById("contrast"),
    toggle: document.getElementById("toggle"),
    invert: document.getElementById("invert"),
    snap: document.getElementById("snap"),
    stat: document.getElementById("stat"),
    panel: document.getElementById("panel"),
    panelTitle: document.getElementById("panelTitle"),
    directoryPanel: document.getElementById("directoryPanel"),
    directoryTitle: document.getElementById("directoryTitle"),
  };

  const NAV = {
    BASE: "based_diva9.html",
    LANDING: "index11.html",
  };

  let W=0, H=0, DPR=1;
  function resize(){
    DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    W = Math.floor(window.innerWidth * DPR);
    H = Math.floor(window.innerHeight * DPR);
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    ctx.setTransform(1,0,0,1,0,0);
  }
  window.addEventListener("resize", resize, { passive:true });
  resize();

  let running = true;
  let invert = false;

  let zoom = 1.0;
  let targetZoom = 1.0;
  let panX = 0;
  let panY = 0;
  let targetPanX = 0;
  let targetPanY = 0;

  let mouseX = 0, mouseY = 0;
  let drag = false;
  let lastX = 0, lastY = 0;

  let pulse = 0;
  let pulseKick = 0;

  let seed = (Math.random()*1e9)>>>0;
  function rnd(){
    seed ^= seed << 13; seed >>>= 0;
    seed ^= seed >> 17; seed >>>= 0;
    seed ^= seed << 5;  seed >>>= 0;
    return (seed >>> 0) / 4294967296;
  }
  function reseed(){
    seed = (Math.random()*1e9)>>>0;
    noisePhase = rnd()*1000;
    ui.stat.textContent = "re-seeded";
  }

  function hash2(ix, iy){
    let h = ix * 374761393 + iy * 668265263;
    h = (h ^ (h >> 13)) >>> 0;
    h = (h * 1274126177) >>> 0;
    return (h ^ (h >> 16)) >>> 0;
  }
  function smoothstep(t){ return t*t*(3-2*t); }
  function lerp(a,b,t){ return a + (b-a)*t; }
  function vnoise(x, y){
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    const a = (hash2(ix,iy) & 1023)/1023;
    const b = (hash2(ix+1,iy) & 1023)/1023;
    const c = (hash2(ix,iy+1) & 1023)/1023;
    const d = (hash2(ix+1,iy+1) & 1023)/1023;
    const ux = smoothstep(fx), uy = smoothstep(fy);
    return lerp(lerp(a,b,ux), lerp(c,d,ux), uy);
  }

  function setStat(s){ ui.stat.textContent = s; }

  function toggleInvert(){
    invert = !invert;
    setStat(invert ? "inverted" : "normal");
  }

  ui.toggle.onclick = () => {
    running = !running;
    ui.toggle.textContent = running ? "pause" : "run";
    if(running) requestAnimationFrame(frame);
  };
  ui.invert.onclick = () => { toggleInvert(); };
  ui.snap.onclick = () => {
    try{
      const a = document.createElement("a");
      a.download = "black_lotus.png";
      a.href = canvas.toDataURL("image/png");
      a.click();
      setStat("screenshot saved");
    }catch(e){
      setStat("screenshot blocked");
    }
  };

  document.getElementById("ctlCollapse").addEventListener("click", (e) => {
    e.stopPropagation();
    ui.panel.classList.toggle("collapsed");
  });

  // collapse ONLY from mini button


  // draggable controller
  (() => {
    let draggingUI = false;
    let uiStartX = 0;
    let uiStartY = 0;
    let mouseStartX = 0;
    let mouseStartY = 0;

    ui.panel.addEventListener("mousedown", (e) => {
    e.stopPropagation();
  });

  ui.panelTitle.addEventListener("mousedown", (e) => {

      if(e.target.id === "ctlCollapse") return;

      draggingUI = true;

      const rect = document.querySelector(".ui").getBoundingClientRect();

      uiStartX = rect.left;
      uiStartY = rect.top;

      mouseStartX = e.clientX;
      mouseStartY = e.clientY;

      e.preventDefault();
    });

    window.addEventListener("mousemove", (e) => {

      if(!draggingUI) return;

      const dx = e.clientX - mouseStartX;
      const dy = e.clientY - mouseStartY;

      const uiWrap = document.querySelector(".ui");

      uiWrap.style.left = Math.max(8, uiStartX + dx) + "px";
      uiWrap.style.top = Math.max(46, uiStartY + dy) + "px";

    });

    window.addEventListener("mouseup", () => {
      draggingUI = false;
    });

  })();


  window.addEventListener("mousemove", (e) => {
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = (e.clientY / window.innerHeight) * 2 - 1;
    if(drag){
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      targetPanX += dx * DPR;
      targetPanY += dy * DPR;
    }
  }, { passive:true });

  window.addEventListener("mousedown", (e) => {
    drag = true;
    lastX = e.clientX;
    lastY = e.clientY;
  }, { passive:true });

  window.addEventListener("mouseup", () => { drag = false; }, { passive:true });

  window.addEventListener("wheel", (e) => {
    e.preventDefault();
    const k = Math.exp(-e.deltaY * 0.0012);
    targetZoom = clamp(targetZoom * k, 0.45, 3.2);
  }, { passive:false });

  window.addEventListener("keydown", (e) => {
    if(e.key.toLowerCase() === "n"){
      e.preventDefault();
      document.body.classList.toggle("null");
      return;
    }

    if(e.shiftKey && e.key.toLowerCase() === "i"){
      e.preventDefault();
      toggleInvert();
      return;
    }

    if(e.shiftKey && e.key.toLowerCase() === "b"){
      e.preventDefault();
      window.location.href = NAV.BASE;
      return;
    }

    if(e.shiftKey && e.key.toLowerCase() === "k"){
      e.preventDefault();
      window.location.href = NAV.LANDING;
      return;
    }

    if(e.key === " "){
      e.preventDefault();
      pulseKick = 1.0;
      setStat("pulse");
    }
    if(e.key.toLowerCase() === "r"){
      reseed();
    }
  });

  function clamp(x,a,b){ return Math.max(a, Math.min(b, x)); }


  let liveMode = false;
  let liveT = 0;

  const liveBtn = document.getElementById("liveMode");

  liveBtn.addEventListener("click", () => {

    liveMode = !liveMode;

    liveBtn.textContent = liveMode ? "LIVE ON" : "LIVE";

    setStat(liveMode ? "auto modulation" : "manual");

  });


  let t0 = performance.now();
  let noisePhase = Math.random()*1000;

  function lotusIntensity(x, y, t, petals, layers, spinAmt, breathAmt){
    const r = Math.hypot(x,y);
    const a = Math.atan2(y,x);

    const breathe = 1.0 + 0.08 * breathAmt * Math.sin(t*0.8 + r*7.0);

    let mod = 0;
    let amp = 0.42;
    let freq = petals;
    let phase = t*0.6*spinAmt;

    for(let i=0;i<layers;i++){
      mod += amp * Math.cos(freq*a + phase + i*0.65);
      amp *= 0.62;
      freq += petals * 0.35;
      phase *= 1.02;
    }

    const nx = x*2.0 + 1.7*Math.sin(t*0.3);
    const ny = y*2.0 + 1.7*Math.cos(t*0.27);
    const n = vnoise(nx + noisePhase, ny + noisePhase) - 0.5;

    const boundary = 0.48 * breathe + 0.22*mod + 0.08*n;

    const d = boundary - r;

    const edge = smoothstep(clamp((d + 0.02) / 0.08, 0, 1));

    const veins = 0.06 * Math.cos((petals*2.0)*a - t*0.9) * Math.exp(-r*2.2);

    const core = Math.exp(-r*r*18.0);

    let I = edge + 0.65*core + veins;

    I += 0.08 * Math.exp(-Math.max(0, r-0.45)*10.0);

    return clamp(I, 0, 1);
  }

  function frame(now){
    if(!running) return;

    const dt = (now - t0) / 1000;
    t0 = now;

    zoom = lerp(zoom, targetZoom, 0.10);
    panX = lerp(panX, targetPanX, 0.10);
    panY = lerp(panY, targetPanY, 0.10);

    pulseKick = lerp(pulseKick, 0, 0.08);
    pulse = lerp(pulse, 0, 0.06) + pulseKick * 0.18;


    if(liveMode){

      liveT += dt;

      ui.spin.value = Math.floor(
        50 + 35 * Math.sin(liveT * 0.21)
      );

      ui.breath.value = Math.floor(
        55 + 30 * Math.sin(liveT * 0.13 + 1.4)
      );

      ui.grain.value = Math.floor(
        30 + 25 * Math.sin(liveT * 0.31 + 2.1)
      );

      ui.contrast.value = Math.floor(
        60 + 25 * Math.sin(liveT * 0.18 + 0.4)
      );

      ui.petals.value = Math.floor(
        12 + 5 * Math.sin(liveT * 0.09)
      );

      ui.layers.value = Math.floor(
        5 + 2 * Math.sin(liveT * 0.16 + 0.8)
      );

    }


    const petals = parseInt(ui.petals.value, 10);
    const layers = parseInt(ui.layers.value, 10);
    const spinAmt = parseInt(ui.spin.value, 10) / 100;
    const breathAmt = parseInt(ui.breath.value, 10) / 100;
    const grain = parseInt(ui.grain.value, 10) / 100;
    const contrast = parseInt(ui.contrast.value, 10) / 100;

    const t = performance.now()/1000;

    ctx.fillStyle = invert ? "#fff" : "#000";
    ctx.fillRect(0,0,W,H);

    const cx = W*0.5 + panX;
    const cy = H*0.5 + panY;

    const baseR = Math.min(W,H) * 0.42 * zoom * (1 + 0.35*pulse);
    const strokeCount = Math.floor(900 + petals*60);
    const ringCount = Math.floor(240 + layers*20);

    ctx.save();
    ctx.translate(cx, cy);

    const ink = invert ? "rgba(0,0,0," : "rgba(255,255,255,";
    const alphaBase = 0.10 + 0.22*contrast;

    for(let i=0;i<strokeCount;i++){
      const u = i / strokeCount;
      const a = u * Math.PI*2;

      const flowPhase = 0.5 + 0.5 * Math.sin(t * 0.11);

      const jaggedness =
        0.04 + (1.0 - flowPhase) * 0.24;

      const smoothness =
        0.22 * flowPhase;

      const warp = (
        jaggedness *
        (mouseX*Math.cos(a) + mouseY*Math.sin(a))
      );

      const rr = baseR * (
        0.78 +
        smoothness * Math.sin(a*petals + t*0.8*spinAmt) +
        jaggedness * Math.sin(a * petals * 2.4 + t * 1.6) +
        warp
      );
      const thick = 0.8 + 1.6 * (0.5 + 0.5*Math.sin(t*1.2 + a*3.0));

      const steps = 28;

      const aStroke = alphaBase * (0.25 + 0.75*Math.pow(Math.sin(a*0.5 + t*0.4)*0.5+0.5, 1.8));

      ctx.lineWidth = thick * DPR;
      ctx.beginPath();

      for(let s=0;s<=steps;s++){
        const v = s/steps;
        const r = v * rr;

        const lx = (Math.cos(a)*r) / baseR;
        const ly = (Math.sin(a)*r) / baseR;

        const I = lotusIntensity(lx, ly, t, petals, layers, spinAmt, breathAmt);

        const jitter = grain * 0.012 * (vnoise(lx*12 + t*0.7, ly*12 - t*0.6)-0.5);

        const phaseFlow = 0.5 + 0.5 * Math.sin(t * 0.09);

        const bend =
          (
            (0.04 + 0.22*(1.0-phaseFlow))*I +
            (0.02 + 0.08*(1.0-phaseFlow))*Math.sin(t + v*8 + a*2) +
            (0.12*phaseFlow)*Math.sin(t*0.2 + a*0.5)
          ) *
          (0.5 + 0.5*v);

        const x = Math.cos(a + bend + jitter) * r;
        const y = Math.sin(a + bend + jitter) * r;

        if(s === 0){ ctx.moveTo(x,y); }
        else{ ctx.lineTo(x,y); }
      }

      ctx.strokeStyle = ink + (aStroke) + ")";
      ctx.stroke();
    }

    for(let j=0;j<ringCount;j++){
      const v = j/(ringCount-1);
      const r = baseR * v;

      const segs = Math.floor(40 + petals*3);
      const off = t*0.35*spinAmt + v*0.9;
      ctx.beginPath();
      for(let k=0;k<=segs;k++){
        const u = k/segs;
        const a = u*Math.PI*2;

        const lx = (Math.cos(a)*r)/baseR;
        const ly = (Math.sin(a)*r)/baseR;
        const I = lotusIntensity(lx, ly, t, petals, layers, spinAmt, breathAmt);

        const warp = 0.10*(mouseX*Math.cos(a) + mouseY*Math.sin(a));
        const rr = r * (0.92 + 0.12*I + warp);

        const bend = 0.10*I*Math.sin(a*petals + off);
        const x = Math.cos(a + bend) * rr;
        const y = Math.sin(a + bend) * rr;

        if(k===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }

      const aRing = (0.02 + 0.14*contrast) * (1-v) * (0.3 + 0.7*Math.sin(t*0.5 + v*6)*0.5 + 0.35);
      ctx.lineWidth = (0.7 + 1.2*(1-v)) * DPR;
      ctx.strokeStyle = ink + aRing + ")";
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(0,0, baseR*0.08, 0, Math.PI*2);
    ctx.strokeStyle = ink + (0.25 + 0.35*contrast) + ")";
    ctx.lineWidth = 1.2 * DPR;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-baseR*0.02,0); ctx.lineTo(baseR*0.02,0);
    ctx.moveTo(0,-baseR*0.02); ctx.lineTo(0,baseR*0.02);
    ctx.strokeStyle = ink + (0.16 + 0.20*contrast) + ")";
    ctx.lineWidth = 1.0 * DPR;
    ctx.stroke();

    ctx.restore();

    const grd = ctx.createRadialGradient(W*0.5, H*0.5, 0, W*0.5, H*0.5, Math.max(W,H)*0.65);
    if(!invert){
      grd.addColorStop(0, "rgba(0,0,0,0)");
      grd.addColorStop(1, "rgba(0,0,0,0.65)");
    }else{
      grd.addColorStop(0, "rgba(255,255,255,0)");
      grd.addColorStop(1, "rgba(255,255,255,0.75)");
    }
    ctx.fillStyle = grd;
    ctx.fillRect(0,0,W,H);

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
  setTimeout(() => { ui.stat.textContent = "live"; }, 250);

})();
</script>
