<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KETADATA</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,0.38);
    }

    *{ box-sizing:border-box; }

    html, body{
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      background:var(--bg);
      color:var(--fg);
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .entry{
      width:min(96vw, 1800px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:1.2rem;
      position:relative;
      z-index:10;
    }

    h1{
      margin:0;
      font-weight:800;
      line-height:0.9;
      letter-spacing:0.02em;
    }

    #ketaWord{
      display:inline-flex;
      justify-content:center;
      align-items:baseline;
      width:96vw;
      max-width:1800px;
      font-size:clamp(7rem, 15vw, 16rem);
      cursor:pointer;
      user-select:none;
      position:relative;
    }

    #ketaWord .cell{
      flex:1 1 0;
      display:flex;
      justify-content:center;
      align-items:baseline;
      min-width:0;
    }

    #ketaWord .ch{
      display:inline-block;
      width:1ch;
      text-align:center;
      line-height:1;
    }

    .subtitle{
      margin:0;
      font-size:clamp(1.25rem, 3vw, 3.6rem);
      font-weight:800;
      letter-spacing:0.14em;
      text-transform:uppercase;
      user-select:none;
    }

    #warning{
      position:fixed;
      bottom:48px;
      left:50%;
      transform:translateX(-50%);
      font-size:0.85rem;
      letter-spacing:0.18em;
      line-height:1.4;
      color:rgba(255,255,255,0.35);
      text-align:center;
      pointer-events:none;
    }

    #isolatedSlash{
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      color:#fff;
      font-weight:800;
      opacity:0;
      z-index:999;
      pointer-events:none;
    }

    #blackout{
      position:fixed;
      inset:0;
      background:#000;
      opacity:0;
      z-index:998;
      pointer-events:none;
      transition:opacity 80ms linear;
    }

    body.entering #ketaWord,
    body.entering .subtitle,
    body.entering #warning{
      opacity:0;
      transition:opacity 120ms linear;
    }

    body.blacked #blackout{
      opacity:1;
    }
  </style>
</head>
<body>
  <div id="blackout"></div>
  <div id="isolatedSlash">/</div>

  <main class="entry">
    <h1>
      <div id="ketaWord" aria-label="KETADATA"></div>
    </h1>
    <p class="subtitle">INTELLIGENCE AGENCY</p>
  </main>

  <div id="warning">
    B A D&nbsp;&nbsp;G A T E W A Y<br/>
    MAY TRIGGER SEIZURES IN PHOTOSENSITIVE INDIVIDUALS
  </div>

  <script>
    const ketaWord = document.getElementById("ketaWord");
    const isolated = document.getElementById("isolatedSlash");
    const blackout = document.getElementById("blackout");

    const destinations = [
      "map.html",
      "astro2.html",
      "room.html",
      "blacklotus2.html",
      "kdtv1.html",
      "chakra.html",
      "crunch1.html",
      "mailto:diekitty@proton.me"
    ];

    const word = "KETADATA";
    const letters = [];
    let entering = false;
    let hoverIdx = Math.floor(word.length / 2);

    for (let i = 0; i < word.length; i++) {
      const ch = word[i];
      const cell = document.createElement("span");
      cell.className = "cell";

      const s = document.createElement("span");
      s.className = "ch";
      s.textContent = ch;
      s.dataset.orig = ch;

      s.addEventListener("mouseenter", () => {
        if (ketaWord.dataset.locked === "1") return;
        hoverIdx = i;
        s.textContent = "/";
      });

      s.addEventListener("mouseleave", () => {
        if (ketaWord.dataset.locked === "1") return;
        s.textContent = s.dataset.orig;
      });

      cell.appendChild(s);
      ketaWord.appendChild(cell);
      letters.push(s);
    }

    function reset() {
      entering = false;
      ketaWord.dataset.locked = "";
      letters.forEach(s => s.textContent = s.dataset.orig);
      isolated.style.opacity = "0";
      document.body.classList.remove("entering", "blacked");
      blackout.style.opacity = "0";
    }

    window.addEventListener("pageshow", (e) => {
      if (e.persisted) reset();
    });

    function placeIsolatedAtLetter(idx){
      const el = letters[Math.max(0, Math.min(letters.length - 1, idx))];
      const r = el.getBoundingClientRect();
      isolated.style.left = (r.left + r.width / 2) + "px";
      isolated.style.top = (r.top + r.height / 2) + "px";
      const fs = parseFloat(window.getComputedStyle(ketaWord).fontSize) || 200;
      isolated.style.fontSize = Math.max(64, fs) + "px";
    }

    function enterRoom(idx) {
      if (entering) return;
      entering = true;
      ketaWord.dataset.locked = "1";
      letters.forEach(s => s.textContent = "/");
      placeIsolatedAtLetter(idx);
      document.body.classList.add("entering");
      isolated.style.opacity = "1";

      const dest = destinations[idx] || "blacklotus2.html";

      setTimeout(() => {
        isolated.style.opacity = "0";
        document.body.classList.add("blacked");
      }, 950);

      setTimeout(() => {
        window.location.href = dest;
      }, 1850);
    }

    ketaWord.addEventListener("click", () => {
      enterRoom(hoverIdx);
    });
  </script>

  - removed meow ticker
  - kept warning block (minimal styling)
  -->
</body>
</html>
