<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KETADATA</title>
  <style>
    :root{
      --bg:#000000;
      --fg:#ffffff;
      --warning:rgba(255,255,255,0.50);
    }

    *{ box-sizing:border-box; }

    html, body{
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      background:#000000;
      color:#ffffff;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      text-align:center;
      position:relative;
    }

    .stage{
      min-height:100vh;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:0 2vw;
      position:relative;
      z-index:10;
    }

    h1{
      margin:0;
      font-weight:800;
      letter-spacing:0.02em;
      line-height:0.9;
      position:relative;
      z-index:10;
    }

    #ketaWord{
      display:inline-flex;
      justify-content:center;
      align-items:baseline;
      width:96vw;
      max-width:1800px;
      font-size:clamp(8rem, 15vw, 17rem);
      cursor:pointer;
      user-select:none;
      position:relative;
      color:#ffffff;
      text-rendering:geometricPrecision;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    #ketaWord .cell{
      flex:1 1 0;
      display:flex;
      justify-content:center;
      align-items:baseline;
      min-width:0;
    }

    #ketaWord .ch{
      display:inline-block;
      width:1ch;
      text-align:center;
      line-height:1;
      color:#ffffff;
      text-rendering:geometricPrecision;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .subtitle{
  margin:1.2rem 0 0 0;
  font-size:clamp(1.25rem, 3.2vw, 3.7rem);
  font-weight:800;

  letter-spacing:0.38em;  /* keep your wider spacing */
  text-transform:uppercase;

  color:rgba(255,255,255,0.2);  /* exact nav number color */

  user-select:none;
  text-rendering:geometricPrecision;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

    #warning{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:46px;
      width:min(94vw, 1400px);
      margin:0;
      font-size:0.84rem;
      line-height:1.45;
      letter-spacing:0.18em;
      color:var(--warning);
      pointer-events:none;
      z-index:10;
      text-transform:uppercase;
    }

    #isolatedSlash{
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      color:#ffffff;
      font-family: Arial, Helvetica, sans-serif;
      font-weight:800;
      line-height:1;
      opacity:0;
      z-index:999;
      pointer-events:none;
      text-shadow:none;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    body.entering #ketaWord,
    body.entering .subtitle,
    body.entering #warning{
      opacity:0;
      transition:opacity 120ms linear;
    }

    #blackout{
      position:fixed;
      inset:0;
      background:#000000;
      opacity:0;
      z-index:998;
      pointer-events:none;
      transition:opacity 80ms linear;
    }

    body.blacked #blackout{
      opacity:1;
    }

    @media (max-width: 700px){
      .subtitle{
        margin-top:0.95rem;
        letter-spacing:0.10em;
      }

      #warning{
        bottom:28px;
        font-size:0.66rem;
        letter-spacing:0.12em;
        line-height:1.4;
      }
    }
  </style>
</head>
<body>
  <div id="blackout"></div>
  <div id="isolatedSlash">/</div>

  <main class="stage">
    <h1>
      <div id="ketaWord" aria-label="KETADATA"></div>
    </h1>
    <p class="subtitle">PRIVATE INTELLIGENCE AGENCY</p>
  </main>

  <p id="warning">
  <br/>
FLASH WARNING : MAY TRIGGER SEIZURES 
  </p>

  <script>
    const ketaWord = document.getElementById("ketaWord");
    const isolated = document.getElementById("isolatedSlash");
    const blackout = document.getElementById("blackout");

    const destinations = [
      "desktop.html",
      "desktop.html",
      "desktop.html",
      "desktop.html",
      "desktop.html",
      "desktop.html",
      "desktop.html",
      "mailto:diekitty@proton.me"
    ];

    const word = "KETADATA";
    const letters = [];
    let entering = false;
    let hoverIdx = Math.floor(word.length / 2);

    for (let i = 0; i < word.length; i++) {
      const ch = word[i];
      const cell = document.createElement("span");
      cell.className = "cell";

      const s = document.createElement("span");
      s.className = "ch";
      s.textContent = ch;
      s.dataset.orig = ch;

      s.addEventListener("mouseenter", () => {
        if (ketaWord.dataset.locked === "1") return;
        hoverIdx = i;
        s.textContent = "/";
      });

      s.addEventListener("mouseleave", () => {
        if (ketaWord.dataset.locked === "1") return;
        s.textContent = s.dataset.orig;
      });

      cell.appendChild(s);
      ketaWord.appendChild(cell);
      letters.push(s);
    }

    function reset() {
      entering = false;
      ketaWord.dataset.locked = "";
      letters.forEach(s => (s.textContent = s.dataset.orig));
      isolated.style.opacity = "0";
      document.body.classList.remove("entering", "blacked");
      blackout.style.opacity = "0";
    }

    window.addEventListener("pageshow", (e) => {
      if (e.persisted) reset();
    });

    function placeIsolatedAtLetter(idx){
      const el = letters[Math.max(0, Math.min(letters.length - 1, idx))];
      const r = el.getBoundingClientRect();
      isolated.style.left = (r.left + r.width / 2) + "px";
      isolated.style.top  = (r.top + r.height / 2) + "px";
      const fs = parseFloat(window.getComputedStyle(ketaWord).fontSize) || 200;
      isolated.style.fontSize = Math.max(64, fs) + "px";
    }

    function enterRoom(idx) {
      if (entering) return;
      entering = true;
      ketaWord.dataset.locked = "1";
      letters.forEach(s => (s.textContent = "/"));
      placeIsolatedAtLetter(idx);
      document.body.classList.add("entering");
      isolated.style.opacity = "1";

      const dest = destinations[idx] || "blacklotus2.html";

      setTimeout(() => {
        isolated.style.opacity = "0";
        document.body.classList.add("blacked");
      }, 950);

      setTimeout(() => {
        window.location.href = dest;
      }, 1850);
    }

    ketaWord.addEventListener("click", () => {
      enterRoom(hoverIdx);
    });

    let isFlashing = false;
    let flashInterval = null;

    function startStrobe(){
      if (flashInterval) return;
      flashInterval = setInterval(() => {
        document.body.style.backgroundColor =
          (document.body.style.backgroundColor === "white") ? "black" : "white";
      }, 50);
    }

    function stopStrobe(){
      clearInterval(flashInterval);
      flashInterval = null;
      document.body.style.backgroundColor = "black";
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === " " || event.code === "Space") {
        event.preventDefault();
        if (isFlashing) {
          stopStrobe();
        } else {
          startStrobe();
        }
        isFlashing = !isFlashing;
      }

      if (event.key.toLowerCase() === "m") {
        window.location.href = "map.html";
      }

      if (event.key.toLowerCase() === "r") {
        window.location.href = "room.html";
      }
    });
  </script>

  <!--
  AE:
  - TITLE AND SUBTITLE NOW USE MATCHED WHITE RENDERING
  - REMOVED TITLE BRIGHTNESS FILTER THAT CAUSED SOFT / CREAM READ
  WB:
  FILE_ID: index
  ROOM_ID: ENTRY
  VERSION: v1.5.3
  UPDATED_AT: 2026-04-19
  CHANGELOG:
  - removed filter:brightness(1.08) from title
  - matched title/subtitle rendering treatment
  - preserved warning block
  - preserved strobe
  -->
</body>
</html>
