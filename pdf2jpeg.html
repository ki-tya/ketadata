<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>KETADATA — PDF → JPG</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#000;--fg:#fff;--muted:#666;--line:#222;--sans:Arial,Helvetica,sans-serif}
  body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:12px;letter-spacing:.06em;padding:70px 20px 40px}
  .label{color:var(--muted);font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
  .title{font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:28px;color:var(--fg)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  input[type="file"]{background:#000;color:var(--fg);border:1px solid var(--line);padding:6px 8px;font-family:var(--sans);font-size:11px;cursor:pointer}
  input[type="file"]::-webkit-file-upload-button{background:#000;color:var(--fg);border:1px solid #333;padding:4px 10px;font-family:var(--sans);font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
  .btn{background:#000;color:var(--fg);border:1px solid #333;padding:6px 14px;font-family:var(--sans);font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
  .btn:hover{border-color:var(--fg)}
  .btn:active{transform:translateY(1px)}
  .mode-group{display:flex;gap:0}
  .mode-btn{background:#000;color:var(--muted);border:1px solid var(--line);padding:6px 14px;font-family:var(--sans);font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:none}
  .mode-btn:first-child{border-right:none}
  .mode-btn.active{color:var(--fg);border-color:#555;background:#0a0a0a}
  .mode-btn:hover{border-color:#444;color:var(--fg)}
  progress{width:100%;height:2px;appearance:none;border:none;background:var(--line);display:block;margin-top:12px}
  progress::-webkit-progress-bar{background:var(--line)}
  progress::-webkit-progress-value{background:var(--fg)}
  progress::-moz-progress-bar{background:var(--fg)}
  .preview{margin-top:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
  .preview img{width:100%;display:block;border:1px solid var(--line)}
  .note{margin-top:24px;border:1px solid var(--line);padding:10px 12px;font-size:10px;color:var(--muted);letter-spacing:.06em;line-height:1.6}
  #status{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;min-height:16px;margin-top:8px}
</style>
</head>
<body>

<div class="label">KETADATA TOOLS</div>
<div class="title">PDF → JPG · LOCAL · NO UPLOAD</div>

<div class="row">
  <input type="file" id="fileInput" accept="application/pdf" />
</div>

<div class="label">OUTPUT MODE</div>
<div class="row" style="margin-bottom:20px">
  <div class="mode-group">
    <button class="mode-btn active" id="modeInvert">INVERTED</button>
    <button class="mode-btn" id="modeAsIs">AS IS</button>
  </div>
</div>

<div class="row">
  <button class="btn" id="convertBtn">CONVERT → ZIP</button>
</div>

<progress id="progress" value="0" max="1"></progress>
<div id="status"></div>

<div class="preview" id="preview"></div>

<div class="note">
  LOCAL ONLY — NO UPLOADS — NO WORKERS — SCALE 2× — JPEG 0.9<br>
  INVERTED: PIXEL-LEVEL RGB INVERSION — AS IS: NATIVE RENDER
</div>

<script src="https://unpkg.com/pdfjs-dist@3.4.120/legacy/build/pdf.min.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
const fileInput  = document.getElementById("fileInput");
const convertBtn = document.getElementById("convertBtn");
const preview    = document.getElementById("preview");
const progress   = document.getElementById("progress");
const status     = document.getElementById("status");
const modeInvert = document.getElementById("modeInvert");
const modeAsIs   = document.getElementById("modeAsIs");

let invertMode = true;

modeInvert.onclick = () => { invertMode = true;  modeInvert.classList.add("active"); modeAsIs.classList.remove("active"); };
modeAsIs.onclick   = () => { invertMode = false; modeAsIs.classList.add("active"); modeInvert.classList.remove("active"); };

pdfjsLib.GlobalWorkerOptions.workerSrc = null;

convertBtn.onclick = async () => {
  const file = fileInput.files[0];
  if (!file) { status.textContent = "NO FILE SELECTED"; return; }
  preview.innerHTML = "";
  progress.value = 0;
  status.textContent = "READING...";

  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer, disableWorker: true }).promise;
  const zip = new JSZip();
  const folder = zip.folder(file.name.replace(/\.pdf$/i, ""));

  for (let i = 1; i <= pdf.numPages; i++) {
    status.textContent = `PAGE ${i} / ${pdf.numPages}`;
    const page     = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 2 });
    const canvas   = document.createElement("canvas");
    const ctx      = canvas.getContext("2d");
    canvas.width   = viewport.width;
    canvas.height  = viewport.height;
    await page.render({ canvasContext: ctx, viewport }).promise;

    if (invertMode) {
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imgData.data;
      for (let p = 0; p < d.length; p += 4) {
        d[p]   = 255 - d[p];
        d[p+1] = 255 - d[p+1];
        d[p+2] = 255 - d[p+2];
      }
      ctx.putImageData(imgData, 0, 0);
    }

    const blob = await new Promise(r => canvas.toBlob(r, "image/jpeg", 0.9));
    folder.file(`page_${String(i).padStart(3,"0")}.jpg`, blob);
    const img = document.createElement("img");
    img.src = URL.createObjectURL(blob);
    preview.appendChild(img);
    progress.value = i / pdf.numPages;
  }

  status.textContent = "PACKAGING ZIP...";
  const zipBlob = await zip.generateAsync({ type: "blob" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(zipBlob);
  a.download = file.name.replace(/\.pdf$/i, "") + "_images.zip";
  a.click();
  status.textContent = `DONE — ${pdf.numPages} PAGE${pdf.numPages > 1 ? "S" : ""} — ${invertMode ? "INVERTED" : "AS IS"}`;
};
</script>
</body>
</html>
