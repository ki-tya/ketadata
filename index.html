<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KETADATA</title>

<style>
html, body{
  height:100%;
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  color:white;
}

body{
  font-family:Arial, sans-serif;
  text-align:center;
  padding-top:34vh;
}

h1{
  margin:0;
  font-weight:800;
  letter-spacing:0.02em;
  line-height:0.9;
  position:relative;
  z-index:10;
}

#ketaWord{
  display:inline-flex;
  justify-content:center;
  align-items:baseline;
  width:96vw;
  max-width:1800px;
  font-size:clamp(8rem, 15vw, 17rem);
  cursor:pointer;
  user-select:none;
  position:relative;
}

#ketaWord .cell{
  flex:1 1 0;
  display:flex;
  justify-content:center;
  align-items:baseline;
  min-width:0;
}

#ketaWord .ch{
  display:inline-block;
  width:1ch;
  text-align:center;
  line-height:1;
}

.bridge{
  height:9vh;
  position:relative;
  width:100%;
}

#base-link{
  position:absolute;
  left:50%;
  top:96%;
  transform:translate(-50%,-50%);

  display:block;

  width:52vw;

  background:transparent;

  color:transparent;

  text-decoration:none;

  font-size:1.9rem;
  font-weight:900;
  font-family:Arial Black, Arial, sans-serif;
  letter-spacing:0.14em;
  line-height:1;
  text-transform:uppercase;

  opacity:0;
  pointer-events:none;

  transition:
    opacity .08s linear,
    -webkit-text-stroke-color .08s linear;

  z-index:50;

  -webkit-text-stroke:1.8px rgba(255,255,255,.98);

  text-shadow:none;
}

body.strobe-active #base-link{
  opacity:1;
  pointer-events:auto;
}

body.clicking-base #base-link{
  -webkit-text-stroke-color:black;
}



#warning{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:150px;
  width:min(96vw, 1400px);
  pointer-events:none;
  z-index:10;

  color:#5555;

  font-size:1.5rem;
  margin:0;
  line-height:1.6;
}

#isolatedSlash{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  color:#fff;
  font-family:Arial, sans-serif;
  font-weight:800;
  line-height:1;
  opacity:0;
  z-index:999;
  pointer-events:none;
  text-shadow:none;
}

body.entering #ketaWord,
body.entering .bridge,
body.entering #warning{
  opacity:0;
  transition:opacity 120ms linear;
}

#blackout{
  position:fixed;
  inset:0;
  background:#000;
  opacity:0;
  z-index:998;
  pointer-events:none;
  transition:opacity 80ms linear;
}

body.blacked #blackout{
  opacity:1;
}
</style>
</head>

<body>

<div id="blackout"></div>
<div id="isolatedSlash">/</div>

<h1>
  <div id="ketaWord" aria-label="KETADATA"></div>

  <div class="bridge">
    <a
      id="base-link"
      href="https://ketadata.com/sur_9ase_vii.html"
    >
      [ SUR_9ASE_VII ]
    </a>
  </div>
</h1>

<p id="warning">
  MAY TRIGGER SEIZURES IN PHOTOSENSITIVE INDIVIDUALS
</p>

<script>
const ketaWord = document.getElementById("ketaWord");
const isolated = document.getElementById("isolatedSlash");
const blackout = document.getElementById("blackout");

const LETTER_DEST = "https://ketadata.com/consult.html";

const word = "KETADATA";
const letters = [];

let entering = false;
let hoverIdx = Math.floor(word.length / 2);

for (let i = 0; i < word.length; i++) {

  const ch = word[i];

  const cell = document.createElement("span");
  cell.className = "cell";

  const s = document.createElement("span");
  s.className = "ch";

  s.textContent = ch;
  s.dataset.orig = ch;

  s.addEventListener("mouseenter", () => {

    if (ketaWord.dataset.locked === "1") return;

    hoverIdx = i;
    s.textContent = "/";

  });

  s.addEventListener("mouseleave", () => {

    if (ketaWord.dataset.locked === "1") return;

    s.textContent = s.dataset.orig;

  });

  cell.appendChild(s);
  ketaWord.appendChild(cell);

  letters.push(s);
}

function reset() {

  entering = false;

  ketaWord.dataset.locked = "";

  letters.forEach(s => (
    s.textContent = s.dataset.orig
  ));

  isolated.style.opacity = "0";

  document.body.classList.remove(
    "entering",
    "blacked"
  );

  blackout.style.opacity = "0";
}

window.addEventListener("pageshow", (e) => {

  if (e.persisted) reset();

});

function placeIsolatedAtLetter(idx){

  const el = letters[
    Math.max(
      0,
      Math.min(letters.length - 1, idx)
    )
  ];

  const r = el.getBoundingClientRect();

  isolated.style.left =
    (r.left + r.width / 2) + "px";

  isolated.style.top =
    (r.top + r.height / 2) + "px";

  const fs =
    parseFloat(
      window.getComputedStyle(ketaWord).fontSize
    ) || 200;

  isolated.style.fontSize =
    Math.max(64, fs) + "px";
}

function enterRoom(idx) {

  if (entering) return;

  entering = true;

  ketaWord.dataset.locked = "1";

  letters.forEach(s => (
    s.textContent = "/"
  ));

  placeIsolatedAtLetter(idx);

  document.body.classList.add("entering");

  isolated.style.opacity = "1";

  setTimeout(() => {

    isolated.style.opacity = "0";

    document.body.classList.add("blacked");

  }, 950);

  setTimeout(() => {

    window.location.href = LETTER_DEST;

  }, 1850);
}

ketaWord.addEventListener("click", () => {
  enter(hoverIdx);
});

function enter(idx){
  enterRoom(idx);
}

let isFlashing = false;
let flashInterval;

function startStrobe(){

  document.body.classList.add(
    "strobe-active"
  );

  flashInterval = setInterval(() => {

    document.body.style.backgroundColor =
      (document.body.style.backgroundColor === "black")
      ? "white"
      : "black";

  }, 50);
}

function stopStrobe(){

  clearInterval(flashInterval);

  document.body.style.backgroundColor =
    "black";

  document.body.classList.remove(
    "strobe-active"
  );
}

document.getElementById("base-link").addEventListener("click",(e)=>{
  e.preventDefault();

  document.body.classList.add("clicking-base");
  document.body.classList.add("entering");
  document.body.classList.add("blacked");

  stopStrobe();

  setTimeout(()=>{
    window.location.href = "https://ketadata.com/sur_9ase_vii.html";
  },220);
});

document.addEventListener("keydown", (event) => {

  if (
    event.key === " " ||
    event.code === "Space"
  ) {

    event.preventDefault();

    if (isFlashing){
      stopStrobe();
    } else {
      startStrobe();
    }

    isFlashing = !isFlashing;
  }

});
</script>

</body>
</html>
