<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KETADATA</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    html,body{
      width:100%;height:100%;
      background:#000;
      color:#fff;
      font-family:Arial,Helvetica,sans-serif;
    }

    :root{
      --slot-h: 140px;
      --font-sz: 22px;
      --max-w: 1120px;
    }

    @media(max-width:600px){
      :root{ --slot-h:96px; --font-sz:14px; }
    }
    @media(min-width:601px) and (max-width:900px){
      :root{ --slot-h:116px; --font-sz:17px; }
    }

    /* ── LAYOUT ── */
    .wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      height:100vh;
      padding-top:12vh;
    }

    .inner{
      position:relative;
      width:100%;
      max-width:var(--max-w);
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .copy-wrap{
      position:absolute;
      bottom:calc(100% + 7rem);
      left:0;right:0;
      height:clamp(36px, 6vw, 72px);
    }
    .copy-item{
      position:absolute;
      width:100%;
      text-align:center;
      font-family:Arial,Helvetica,sans-serif;
      font-size:clamp(24px, 4.5vw, 56px);
      font-weight:400;
      letter-spacing:0.18em;
      text-transform:uppercase;
      color:rgba(255,255,255,0);
      transition:color 1.2s ease;
    }
    .copy-item.visible{color:rgba(255,255,255,0.9)}

    .contact{
      position:absolute;
      bottom:calc(100% + 3.5rem);
      left:0;right:0;
      font-family:Arial,Helvetica,sans-serif;
      font-size:var(--font-sz);
      font-weight:400;
      letter-spacing:0.18em;
      text-transform:lowercase;
      color:rgba(255,255,255,0);
      transition:color 1.8s ease;
      text-decoration:none;
      display:block;
      text-align:center;
    }
    .contact.visible{color:rgba(255,255,255,0.35)}
    @media(hover:hover){ .contact:hover{opacity:0.5} }

    /* ── MACHINE ── */
    .machine{
      display:flex;
      align-items:stretch;
      width:100%;
      border:1px solid rgba(255,255,255,0.14);
    }

    .slot{
      flex:1;
      height:var(--slot-h);
      overflow:hidden;
      border-right:1px solid rgba(255,255,255,0.07);
      position:relative;
    }
    .slot:last-child{border-right:none}

    /* redaction bars — height matches cap-height of the font */
    .machine.pristine .slot::before{
      content:'';
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:62%;
      height:calc(var(--font-sz) * 1.1);
      background:rgba(255,255,255,0.88);
      z-index:2;
      transition:opacity 0.5s ease;
    }
    .machine.pristine .reel-item{
      color:transparent!important;
    }

    .reel{
      display:flex;
      flex-direction:column;
      position:absolute;
      left:0;right:0;top:0;
      will-change:transform;
    }

    .reel-item{
      height:var(--slot-h);
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial,Helvetica,sans-serif;
      font-size:var(--font-sz);
      font-weight:400;
      letter-spacing:0.18em;
      text-transform:uppercase;
      color:#fff;
      padding:0 12px;
      text-align:center;
      line-height:1.4;
      flex-shrink:0;
    }
    .reel-item.dim{opacity:0.04}

    /* ── PULL ── */
    .pull-row{
      padding-top:3.5rem;
      padding-bottom:1rem;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .pull-btn{
      font-family:Arial,Helvetica,sans-serif;
      font-size:11px;
      font-weight:400;
      letter-spacing:0.32em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.35);
      background:none;
      border:1px solid rgba(255,255,255,0.13);
      padding:14px 52px;
      cursor:pointer;
      transition:color 0.1s,border-color 0.1s;
      -webkit-tap-highlight-color:transparent;
      outline:none;
    }
    @media(hover:hover){
      .pull-btn:hover{color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.3)}
    }
    .pull-btn:focus{color:rgba(255,255,255,0.35);border-color:rgba(255,255,255,0.13)}
    .pull-btn:disabled{opacity:0.08;cursor:default}
  </style>
</head>
<body>

  <div class="wrap">
    <div class="inner">

      <!-- floats above, doesn't affect machine centering -->
      <div class="copy-wrap">
        <span class="copy-item" id="copy1">CONTENT IS DATA</span>
        <span class="copy-item" id="copy2">DATA IS STRUCTURE</span>
      </div>

      <a class="contact" id="contact" href="mailto:ketadata001@gmail.com">ketadata001@gmail.com</a>

      <div class="machine pristine" id="machine">
        <div class="slot"><div class="reel" id="r0"></div></div>
        <div class="slot"><div class="reel" id="r1"></div></div>
        <div class="slot"><div class="reel" id="r2"></div></div>
      </div>

      <div class="pull-row">
        <button class="pull-btn" id="pull" onclick="spin()">PULL</button>
      </div>

    </div>
  </div>

  <script>
    const banks = [
      [
        'WE READ','WE INGEST','WE ABSORB','WE LISTEN','WE DIAGNOSE',
        'WE MONITOR','WE TRACK','WE SCOPE','WE AUDIT','WE RESEARCH',
        'WE DEEP DIVE','WE UNPACK','WE IDEATE','WE ALIGN','WE WORKSHOP',
        'WE DISCOVER','WE BENCHMARK','WE ONBOARD','WE CIRCLE BACK','WE LEVERAGE',
        'WE TOUCH BASE','WE TAKE STOCK','WE PRESSURE TEST','WE STRESS TEST','WE SENSE CHECK',
        'WE COME IN','WE ASK','WE OPEN','WE BEGIN','WE RECEIVE',
        'WE INFILTRATE','WE IMMERSE','WE OBSERVE','WE ENTER','WE ATTEND',
        'WE SHOW UP','WE SIT WITH IT','WE LOOK CLOSER','WE TUNE IN','WE CLOCK IT'
      ],
      [
        'WE STRUCTURE','WE PARSE','WE SYNTHESIZE','WE MAP','WE ANALYZE',
        'WE ORGANIZE','WE IDENTIFY','WE CLARIFY','WE OPTIMIZE','WE PIVOT',
        'WE ITERATE','WE STRATEGIZE','WE SYNERGIZE','WE PRIORITIZE','WE STREAMLINE',
        'WE ROADMAP','WE ACTION','WE IMPLEMENT','WE OPERATE','WE SOCIALIZE','WE DEMOCRATIZE',
        'WE FIND THE SIGNAL','WE KILL THE NOISE','WE COMPRESS','WE EXTRACT','WE REFRAME',
        'WE RECOMMEND','WE SHAPE','WE BUILD','WE LOCATE','WE SORT',
        'WE DESIGN','WE ART DIRECT','WE CONCEPT','WE NARRATIVE','WE EDIT',
        'WE CUT','WE CURATE','WE TRANSLATE','WE DECODE','WE CONNECT THE DOTS'
      ],
      [
        'WE BUILD','WE DELIVER','WE DOCUMENT','WE SHIP','WE DEPLOY',
        'WE EXECUTE','WE GO LIVE','WE TRANSFER','WE HAND OVER','WE CLOSE',
        'WE MOVE THE NEEDLE','WE ADD VALUE','WE DRIVE IMPACT','WE SCALE','WE MAKE IT STICK',
        'WE MAKE IT RUN','WE MAKE IT REAL','WE MAKE IT CLEAR','WE MAKE IT HOLD','WE MAKE IT USEFUL',
        'WE TAKE IT OFFLINE','WE LOOP BACK','WE FOLLOW UP','WE LEAVE','WE OUTPUT',
        'WE POSITION','WE PRODUCE','WE MAKE IT SCALE','WE MAKE IT COUNT','WE MAKE IT LAND',
        'WE MAKE IT HIT','WE MAKE IT HURT','WE MAKE IT MOVE','WE MAKE IT LAST','WE MAKE IT YOURS',
        'WE LEAVE A MARK','WE GET OUT','WE WALK AWAY','WE LET IT RUN','WE MAKE IT MATTER'
      ]
    ];

    function getSlotH(){
      return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--slot-h')) || 140;
    }

    let H = getSlotH();
    let indices = [0,0,0];
    let spinning = false;

    // track reveal timeouts so repeat spins cancel stale ones
    let revealTimers = [];
    function clearReveal(){ revealTimers.forEach(clearTimeout); revealTimers = []; }
    function rt(fn, ms){ revealTimers.push(setTimeout(fn, ms)); }

    function buildReels(){
      H = getSlotH();
      for(let i=0;i<3;i++){
        const r = document.getElementById('r'+i);
        r.innerHTML = '';
        [...banks[i],...banks[i],...banks[i],...banks[i],...banks[i]].forEach(t=>{
          const d = document.createElement('div');
          d.className = 'reel-item';
          d.textContent = t;
          r.appendChild(d);
        });
        setPos(i, indices[i], false);
      }
    }

    function setPos(i, idx, animate){
      const r = document.getElementById('r'+i);
      const total = banks[i].length;
      const ti = total + (idx % total);
      const y = -(ti * H) + H;
      r.style.transition = animate ? 'transform 0.48s cubic-bezier(0.16,1.3,0.3,1)' : 'none';
      r.style.transform = `translateY(${y}px)`;
      dim(i, ti);
    }

    function dim(ri, center){
      document.getElementById('r'+ri).querySelectorAll('.reel-item').forEach((el,i)=>{
        el.classList.toggle('dim', i !== center && i !== center-1 && i !== center+1);
      });
    }

    function spin(){
      if(spinning) return;
      spinning = true;

      // cancel any in-flight reveal from last spin
      clearReveal();

      document.getElementById('pull').disabled = true;
      document.getElementById('machine').classList.remove('pristine');
      document.getElementById('contact').classList.remove('visible');
      document.getElementById('copy1').classList.remove('visible');
      document.getElementById('copy2').classList.remove('visible');

      const targets = banks.map(b => Math.floor(Math.random() * b.length));
      const stopAt  = [760, 1100, 1440];
      const tick    = [23, 27, 31];

      for(let i=0;i<3;i++){
        let cur = indices[i];
        const total = banks[i].length;
        const iv = setInterval(()=>{
          cur = (cur+1) % total;
          const r  = document.getElementById('r'+i);
          const di = total + cur;
          r.style.transition = 'none';
          r.style.transform  = `translateY(${-(di*H)+H}px)`;
          dim(i, di);
        }, tick[i]);

        const si = i;
        setTimeout(()=>{
          clearInterval(iv);
          indices[si] = targets[si];
          setPos(si, indices[si], true);
          if(si === 2){
            setTimeout(()=>{
              spinning = false;
              // staggered reveal — cancel-safe via rt()
              rt(()=> document.getElementById('pull').disabled = false,          320);
              rt(()=> document.getElementById('copy1').classList.add('visible'), 500);
              rt(()=> document.getElementById('copy1').classList.remove('visible'), 2400);
              rt(()=> document.getElementById('copy2').classList.add('visible'), 3900);
              rt(()=> document.getElementById('copy2').classList.remove('visible'), 6800);
              rt(()=> document.getElementById('contact').classList.add('visible'),  8200);
            }, 480);
          }
        }, stopAt[si]);
      }
    }

    window.addEventListener('resize', ()=>{
      if(!spinning){
        H = getSlotH();
        for(let i=0;i<3;i++) setPos(i, indices[i], false);
      }
    });

    buildReels();
  </script>

</body>
</html>
