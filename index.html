<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KETADATA</title>
  <style>
    html,body{
      height:100%;margin:0;padding:0;
      overflow:hidden;background:#000;color:#fff;
      font-family:Arial,Helvetica,sans-serif;
      text-align:center;
    }
    body{ padding-top:32vh; }
    h1{ margin:0;font-weight:800; }

    #ketaWord{
      display:inline-flex;
      justify-content:center;align-items:baseline;
      width:96vw;max-width:1800px;
      font-size:clamp(8rem,15vw,17rem);
      cursor:pointer;user-select:none;
    }
    #ketaWord .cell{
      flex:1 1 0;display:flex;
      justify-content:center;align-items:baseline;
      min-width:0;
    }
    #ketaWord .ch{
      display:inline-block;width:1ch;
      text-align:center;line-height:1;
    }

    #warning{
      position:fixed;bottom:60px;
      left:50%;transform:translateX(-50%);
      width:min(96vw,1400px);
      pointer-events:none;z-index:10;
      color:rgba(255,255,255,.22);
      font-size:.9rem;letter-spacing:.18em;
      font-family:Arial,Helvetica,sans-serif;
    }

    /* base link — hidden until flash is active */
    #base-link{
      position:fixed;
      top:68vh;left:50%;
      transform:translateX(-50%);
      font-family:Arial,Helvetica,sans-serif;
      font-size:clamp(1.8rem,3vw,3rem);
      font-weight:800;
      letter-spacing:.18em;
      color:transparent;
      -webkit-text-stroke:2px #000;
      text-stroke:2px #000;
      text-decoration:none;
      z-index:1000;
      user-select:none;
      white-space:nowrap;
      text-transform:uppercase;
      pointer-events:auto;
      transition:color .08s, -webkit-text-stroke .08s;
    }
    #base-link:hover{
      color:transparent;
      -webkit-text-stroke:2px #000;
    }
    #base-link:active{
      color:#fff;
      -webkit-text-stroke:2px #fff;
    }

    #isolatedSlash{
      position:fixed;left:50%;top:50%;
      transform:translate(-50%,-50%);
      color:#fff;font-family:Arial,Helvetica,sans-serif;
      font-weight:800;line-height:1;
      opacity:0;z-index:999;pointer-events:none;
    }
    #blackout{
      position:fixed;inset:0;background:#000;
      opacity:0;z-index:998;pointer-events:none;
      transition:opacity 80ms linear;
    }
    body.blacked #blackout{ opacity:1; }
    body.entering #ketaWord,
    body.entering #warning,
    body.entering #base-link{
      opacity:0;transition:opacity 120ms linear;
    }
  </style>
</head>
<body>
  <div id="blackout"></div>
  <div id="isolatedSlash">/</div>
  <h1>
    <div id="ketaWord" aria-label="KETADATA"></div>
  </h1>
  <a id="base-link" href="https://ketadata.com/sur_9ase_vii.html">[ GO TO BASE ]</a>
  <p id="warning">
    B A D &nbsp; G A T E W A Y<br/>
    MAY TRIGGER SEIZURES IN PHOTOSENSITIVE INDIVIDUALS
  </p>

  <script>
    const LETTER_DEST = "https://ketadata.com/consult.html";
    const BASE_DEST   = "https://ketadata.com/sur_9ase_vii.html";

    const ketaWord = document.getElementById("ketaWord");
    const isolated = document.getElementById("isolatedSlash");
    const blackout = document.getElementById("blackout");
    const baseLink = document.getElementById("base-link");
    const word = "KETADATA";
    const letters = [];
    let entering = false;
    let hoverIdx = Math.floor(word.length / 2);

    for(let i=0;i<word.length;i++){
      const cell = document.createElement("span");
      cell.className = "cell";
      const s = document.createElement("span");
      s.className = "ch";
      s.textContent = word[i];
      s.dataset.orig = word[i];
      s.addEventListener("mouseenter",()=>{
        if(ketaWord.dataset.locked==="1") return;
        hoverIdx = i; s.textContent = "/";
      });
      s.addEventListener("mouseleave",()=>{
        if(ketaWord.dataset.locked==="1") return;
        s.textContent = s.dataset.orig;
      });
      cell.appendChild(s);
      ketaWord.appendChild(cell);
      letters.push(s);
    }

    function reset(){
      entering = false;
      ketaWord.dataset.locked = "";
      letters.forEach(s=>s.textContent=s.dataset.orig);
      isolated.style.opacity = "0";
      blackout.style.opacity = "0";
      document.body.classList.remove("entering","blacked");
    }
    window.addEventListener("pageshow",e=>{ if(e.persisted) reset(); });

    function placeIsolated(idx){
      const el = letters[Math.max(0,Math.min(letters.length-1,idx))];
      const r  = el.getBoundingClientRect();
      isolated.style.left = (r.left+r.width/2)+"px";
      isolated.style.top  = (r.top+r.height/2)+"px";
      const fs = parseFloat(window.getComputedStyle(ketaWord).fontSize)||200;
      isolated.style.fontSize = Math.max(64,fs)+"px";
    }

    function enter(idx){
      if(entering) return;
      entering = true;
      ketaWord.dataset.locked = "1";
      letters.forEach(s=>s.textContent="/");
      placeIsolated(idx);
      document.body.classList.add("entering");
      isolated.style.opacity = "1";
      setTimeout(()=>{
        isolated.style.opacity = "0";
        document.body.classList.add("blacked");
      },950);
      setTimeout(()=>{ window.location.href = LETTER_DEST; },1850);
    }

    ketaWord.addEventListener("click",()=>enter(hoverIdx));

    // space = strobe — reveals base link while active
    let isFlashing = false, flashInterval;
    document.addEventListener("keydown",e=>{
      if(e.key===" "||e.code==="Space"){
        e.preventDefault();
        if(isFlashing){
          clearInterval(flashInterval);
          document.body.style.backgroundColor="black";
        } else {
          flashInterval=setInterval(()=>{
            document.body.style.backgroundColor=
              document.body.style.backgroundColor==="black"?"white":"black";
          },50);
        }
        isFlashing=!isFlashing;
      }
    });
  </script>
</body>
</html>
