<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KETADATA</title>

<style>
html,body{
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}

body{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}

/* subtle infra field */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.08;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.025) 0px,
      rgba(255,255,255,.025) 1px,
      transparent 1px,
      transparent 3px
    );
}

/* subtle top glow */
body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(
      ellipse at top,
      rgba(255,255,255,.035),
      transparent 60%
    );
}

#blackout{
  position:fixed;
  inset:0;
  background:#000;
  opacity:0;
  pointer-events:none;
  z-index:9998;
  transition:opacity .08s linear;
}

body.blacked #blackout{
  opacity:1;
}

#isolatedSlash{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:9999;
  opacity:0;
  pointer-events:none;
  font-weight:800;
  line-height:1;
  color:#fff;
}

/* main system word */
#ketaWord{
  position:relative;
  z-index:20;

  display:inline-flex;
  justify-content:center;
  align-items:baseline;

  width:96vw;
  max-width:1800px;

  font-size:clamp(8rem,15vw,17rem);
  font-weight:800;
  letter-spacing:.015em;
  line-height:.9;

  cursor:pointer;
  user-select:none;
}

#ketaWord .cell{
  flex:1 1 0;
  display:flex;
  justify-content:center;
  align-items:baseline;
}

#ketaWord .ch{
  display:inline-block;
  width:1ch;
  text-align:center;
  transition:opacity .08s linear;
}

/* warning */
#warning{
  position:fixed;
  bottom:58px;
  left:50%;
  transform:translateX(-50%);
  width:min(92vw,1200px);

  color:rgba(255,255,255,.22);

  font-size:.82rem;
  letter-spacing:.32em;
  line-height:1.9;
  text-transform:uppercase;

  text-align:center;
  pointer-events:none;
  user-select:none;

  z-index:30;
}

/* invisible until strobe */
#base-link{
  position:fixed;
  bottom:140px;
  left:50%;
  transform:translateX(-50%);

  font-size:.92rem;
  letter-spacing:.28em;
  text-transform:uppercase;
  text-decoration:none;

  color:rgba(255,255,255,0);

  opacity:0;
  pointer-events:none;

  transition:
    opacity .12s linear,
    color .12s linear;

  z-index:100;
}

body.strobe-active #base-link{
  opacity:1;
  pointer-events:auto;
  color:rgba(255,255,255,.32);
}

body.strobe-active #base-link:hover{
  color:#fff;
}

/* entering transition */
body.entering #ketaWord,
body.entering #warning,
body.entering #base-link{
  opacity:0;
  transition:opacity .12s linear;
}
</style>
</head>

<body>

<div id="blackout"></div>
<div id="isolatedSlash">/</div>

<div id="ketaWord" aria-label="KETADATA"></div>

<a
  id="base-link"
  href="https://ketadata.com/sur_9ase_vii.html"
>
[GO TO BASE]
</a>

<div id="warning">
  MAY TRIGGER SEIZURES IN PHOTOSENSITIVE INDIVIDUALS
</div>

<script>
const LETTER_DEST = "https://ketadata.com/consult.html";

const ketaWord = document.getElementById("ketaWord");
const isolated = document.getElementById("isolatedSlash");

const word = "KETADATA";

const letters = [];

let entering = false;
let hoverIdx = Math.floor(word.length / 2);

/* build word */
for(let i=0;i<word.length;i++){

  const cell = document.createElement("span");
  cell.className = "cell";

  const s = document.createElement("span");
  s.className = "ch";

  s.textContent = word[i];
  s.dataset.orig = word[i];

  s.addEventListener("mouseenter",()=>{

    if(ketaWord.dataset.locked==="1") return;

    hoverIdx = i;
    s.textContent = "/";

  });

  s.addEventListener("mouseleave",()=>{

    if(ketaWord.dataset.locked==="1") return;

    s.textContent = s.dataset.orig;

  });

  cell.appendChild(s);
  ketaWord.appendChild(cell);

  letters.push(s);
}

/* reset */
function reset(){

  entering = false;

  ketaWord.dataset.locked = "";

  letters.forEach(s=>{
    s.textContent = s.dataset.orig;
  });

  isolated.style.opacity = "0";

  document.body.classList.remove(
    "entering",
    "blacked"
  );
}

window.addEventListener("pageshow",(e)=>{
  if(e.persisted) reset();
});

/* place isolated slash */
function placeIsolated(idx){

  const el = letters[
    Math.max(
      0,
      Math.min(letters.length-1,idx)
    )
  ];

  const r = el.getBoundingClientRect();

  isolated.style.left =
    (r.left + r.width/2) + "px";

  isolated.style.top =
    (r.top + r.height/2) + "px";

  const fs =
    parseFloat(
      window.getComputedStyle(ketaWord).fontSize
    ) || 200;

  isolated.style.fontSize =
    Math.max(64,fs) + "px";
}

/* enter */
function enter(idx){

  if(entering) return;

  entering = true;

  ketaWord.dataset.locked = "1";

  letters.forEach(s=>{
    s.textContent = "/";
  });

  placeIsolated(idx);

  document.body.classList.add("entering");

  isolated.style.opacity = "1";

  setTimeout(()=>{

    isolated.style.opacity = "0";

    document.body.classList.add("blacked");

  },950);

  setTimeout(()=>{

    window.location.href = LETTER_DEST;

  },1850);
}

ketaWord.addEventListener("click",()=>{
  enter(hoverIdx);
});

/* strobe */
let flashing = false;
let flashInterval;

function startStrobe(){

  document.body.classList.add("strobe-active");

  flashInterval = setInterval(()=>{

    document.body.style.backgroundColor =
      document.body.style.backgroundColor === "white"
      ? "black"
      : "white";

  },55);
}

function stopStrobe(){

  clearInterval(flashInterval);

  document.body.style.backgroundColor = "black";

  document.body.classList.remove("strobe-active");
}

document.addEventListener("keydown",(e)=>{

  if(e.key===" " || e.code==="Space"){

    e.preventDefault();

    if(flashing){
      stopStrobe();
    }else{
      startStrobe();
    }

    flashing = !flashing;
  }
});
</script>
