<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KETADATA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --slot-h:140px;
  --font-sz:22px;
  --max-w:1120px;
}
@media(max-width:600px){
  :root{--slot-h:96px;--font-sz:14px}
}
@media(min-width:601px) and (max-width:900px){
  :root{--slot-h:116px;--font-sz:17px}
}
html,body{
  width:100%;
  height:100%;
  background:#000;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
  cursor:crosshair;
}
body.invert{filter:invert(1);background:#fff}
.wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100vh;
  padding-top:9vh;
  padding-bottom:3vh;
}
.inner{
  position:relative;
  width:100%;
  max-width:var(--max-w);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 18px;
}
.contact{
  position:absolute;
  bottom:calc(100% + 3.5rem);
  left:0;
  right:0;
  font-size:var(--font-sz);
  font-weight:400;
  letter-spacing:.18em;
  text-transform:lowercase;
  color:rgba(255,255,255,0);
  transition:color 1.8s ease;
  text-decoration:none;
  display:block;
  text-align:center;
}
.contact.visible{color:rgba(255,255,255,.35)}
.contact:hover{opacity:.55}
.machine{
  display:flex;
  align-items:stretch;
  width:100%;
  border:1px solid rgba(255,255,255,.14);
  opacity:1;
  transition:opacity 1s ease;
}
@keyframes borderflash{
  0%{border-color:rgba(255,255,255,.14)}
  20%{border-color:rgba(255,255,255,.32)}
  55%{border-color:rgba(255,255,255,.32)}
  100%{border-color:rgba(255,255,255,.14)}
}
.machine.flash{animation:borderflash 5s linear forwards}
.slot{
  flex:1;
  height:var(--slot-h);
  overflow:hidden;
  border-right:1px solid rgba(255,255,255,.07);
  position:relative;
}
.slot:last-child{border-right:none}
.slot::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,#000 0%,rgba(0,0,0,.85) 18%,transparent 38%,transparent 62%,rgba(0,0,0,.85) 82%,#000 100%);
  pointer-events:none;
  z-index:1;
}
.machine.pristine .slot::before{
  content:'';
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:62%;
  height:calc(var(--font-sz) * 1.1);
  background:#fff;
  z-index:2;
}
.machine.pristine .reel-item{color:transparent!important}
.reel{
  display:flex;
  flex-direction:column;
  position:absolute;
  left:0;
  right:0;
  top:0;
  will-change:transform;
}
.reel-item{
  height:var(--slot-h);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:var(--font-sz);
  font-weight:400;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:#fff;
  padding:0 12px;
  text-align:center;
  line-height:1.4;
  flex-shrink:0;
}
.reel-item.dim{opacity:.03}
.pull-row{
  padding-top:3.5rem;
  padding-bottom:1rem;
  display:flex;
  flex-direction:column;
  align-items:center;
  opacity:1;
  transition:opacity 1s ease;
}
@keyframes pullbreath{
  0%,100%{color:rgba(255,255,255,.28);border-color:rgba(255,255,255,.10)}
  50%{color:rgba(255,255,255,.50);border-color:rgba(255,255,255,.24)}
}
.pull-btn{
  font-size:11px;
  font-weight:400;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:rgba(255,255,255,.35);
  background:none;
  border:1px solid rgba(255,255,255,.13);
  padding:14px 52px;
  cursor:pointer;
  transition:color .15s,border-color .15s;
  -webkit-tap-highlight-color:transparent;
  outline:none;
}
.pull-btn:not(:disabled){animation:pullbreath 3.2s ease-in-out infinite}
.pull-btn:hover{color:rgba(255,255,255,.7)!important;border-color:rgba(255,255,255,.4)!important}
.pull-btn:focus{color:rgba(255,255,255,.35);border-color:rgba(255,255,255,.13)}
.pull-btn:disabled{opacity:.07;cursor:default;animation:none}
.docs{
  position:fixed;
  right:18px;
  bottom:16px;
  color:rgba(255,255,255,.16);
  font-size:9px;
  letter-spacing:.18em;
  text-transform:uppercase;
  text-decoration:none;
  z-index:10;
}
.docs:hover{color:rgba(255,255,255,.55)}
.null .wrap,.null .docs{opacity:0;pointer-events:none}
</style>
</head>
<body>
  <div class="wrap">
    <div class="inner">
      <a class="contact" id="contact" href="mailto:ketadata001@gmail.com">ketadata001@gmail.com</a>
      <div class="machine pristine" id="machine">
        <div class="slot"><div class="reel" id="r0"></div></div>
        <div class="slot"><div class="reel" id="r1"></div></div>
        <div class="slot"><div class="reel" id="r2"></div></div>
      </div>
      <div class="pull-row">
        <button class="pull-btn" id="pull" onclick="spin()">PULL</button>
      </div>
    </div>
  </div>

  <a class="docs" href="docs.html">ketadata docs</a>

<script>
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

const banks=[
  [
    'WORLD','SYSTEM','SELF','FIELD','SIGNAL','ACCESS','NETWORK','EDGE','DOOR','FLOW',
    'PATTERN','VECTOR','SHAPE','FORCE','SPACE','TIME','CURRENT','TERRAIN','OPENING','PRESENCE',
    'CONTACT','ENERGY','MOVEMENT','POSSIBILITY'
  ],
  [
    'OBSERVE','DISTILL','MAP','CONNECT','FRAME','ROUTE','ORIENT','COMPRESS','SHAPE','TRACE',
    'POSITION','ALIGN','FILTER','INDEX','TUNE','SURFACE','READ','SORT','CUT','CLOCK',
    'TRANSLATE','CLARIFY','TEST','RETURN'
  ],
  [
    'FORM','SURFACE','ROOM','PATH','MOVE','OPENING','POSITION','INTERFACE','ENGINE','TOOL',
    'RETURN','OUTPUT','MACHINE','MODEL','BRIDGE','WINDOW','KEY','SYSTEM','DIRECTION','VALUE',
    'PRODUCT','SIGNAL','DOOR','EXIT'
  ]
];

function getSlotH(){
  return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--slot-h'))||140;
}

let H=getSlotH(),indices=[0,0,0],spinning=false,revealTimers=[];

function clearReveal(){revealTimers.forEach(clearTimeout);revealTimers=[]}
function rt(fn,ms){revealTimers.push(setTimeout(fn,ms))}

function buildReels(){
  H=getSlotH();
  for(let i=0;i<3;i++){
    const r=document.getElementById('r'+i);
    r.innerHTML='';
    [...banks[i],...banks[i],...banks[i],...banks[i],...banks[i]].forEach(t=>{
      const d=document.createElement('div');
      d.className='reel-item';
      d.textContent=t;
      r.appendChild(d);
    });
    setPos(i,indices[i],false);
  }
}

function setPos(i,idx,animate){
  const r=document.getElementById('r'+i),total=banks[i].length,ti=total+(idx%total),y=-(ti*H)+H;
  r.style.transition=animate?'transform .52s cubic-bezier(.12,1.4,.3,1)':'none';
  r.style.transform=`translateY(${y}px)`;
  dim(i,ti);
}

function dim(ri,center){
  document.getElementById('r'+ri).querySelectorAll('.reel-item').forEach((el,i)=>{
    el.classList.toggle('dim',i!==center&&i!==center-1&&i!==center+1);
  });
}

function flash(){
  const m=document.getElementById('machine');
  m.classList.remove('flash');
  void m.offsetWidth;
  m.classList.add('flash');
  setTimeout(()=>m.classList.remove('flash'),5000);
}

function spin(){
  if(spinning)return;
  spinning=true;
  clearReveal();
  document.getElementById('pull').disabled=true;
  document.getElementById('machine').classList.remove('pristine');
  document.getElementById('contact').classList.remove('visible');

  const targets=banks.map(b=>Math.floor(Math.random()*b.length));
  const stopAt=[700,1200,1950],tick=[20,25,30];

  for(let i=0;i<3;i++){
    let cur=indices[i];
    const total=banks[i].length;
    const iv=setInterval(()=>{
      cur=(cur+1)%total;
      const r=document.getElementById('r'+i),di=total+cur;
      r.style.transition='none';
      r.style.transform=`translateY(${-(di*H)+H}px)`;
      dim(i,di);
    },tick[i]);

    const si=i;
    setTimeout(()=>{
      clearInterval(iv);
      indices[si]=targets[si];
      setPos(si,indices[si],true);
      if(si===2){
        setTimeout(()=>{
          spinning=false;
          flash();
          rt(()=>document.getElementById('pull').disabled=false,380);
          rt(()=>document.getElementById('contact').classList.add('visible'),900);
        },480);
      }
    },stopAt[si]);
  }
}

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName))return;
  const k=e.key.toLowerCase();
  if(e.code==='Space'){e.preventDefault();flash()}
  if(k==='i')document.body.classList.toggle('invert');
  if(k==='n')document.body.classList.toggle('null');
});

window.addEventListener('resize',()=>{
  if(!spinning){
    H=getSlotH();
    for(let i=0;i<3;i++)setPos(i,indices[i],false);
  }
});

buildReels();
</script>
