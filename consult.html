<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KETADATA</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    html,body{
      width:100%;height:100%;
      background:#000;color:#fff;
      font-family:Arial,Helvetica,sans-serif;
      overflow:hidden;
      cursor:crosshair;
    }

    :root{
      --slot-h:140px;
      --font-sz:22px;
      --max-w:1120px;
    }
    @media(max-width:600px){
      :root{ --slot-h:96px; --font-sz:14px; }
    }
    @media(min-width:601px) and (max-width:900px){
      :root{ --slot-h:116px; --font-sz:17px; }
    }

    .wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;height:100vh;
      padding-top:12vh;
    }

    .inner{
      position:relative;
      width:100%;
      max-width:var(--max-w);
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    /* ── INTRO COPY — overlays the machine position ── */
    .intro{
      position:absolute;
      top:0;left:0;right:0;
      height:var(--slot-h);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:5;
      pointer-events:none;
    }
    .intro-line{
      position:absolute;
      font-family:Arial,Helvetica,sans-serif;
      font-size:var(--font-sz);
      font-weight:400;
      letter-spacing:0.18em;
      text-transform:uppercase;
      opacity:0;
      transition:opacity 1.2s ease;
      will-change:opacity;
      text-align:center;
    }
    .intro-line.visible{ opacity:1; }

    /* ── EMAIL ── */
    .contact{
      position:absolute;
      bottom:calc(100% + 3.5rem);
      left:0;right:0;
      font-family:Arial,Helvetica,sans-serif;
      font-size:var(--font-sz);
      font-weight:400;
      letter-spacing:0.18em;
      text-transform:lowercase;
      color:rgba(255,255,255,0);
      transition:color 1.8s ease;
      text-decoration:none;
      display:block;
      text-align:center;
    }
    .contact.visible{ color:rgba(255,255,255,0.35); }
    @media(hover:hover){ .contact:hover{ opacity:0.5; } }

    /* ── MACHINE ── */
    .machine{
      display:flex;
      align-items:stretch;
      width:100%;
      border:1px solid rgba(255,255,255,0.14);
      opacity:0;
      transition:opacity 1s ease;
    }
    .machine.visible{ opacity:1; }

    @keyframes borderflash{
      0%  { border-color:rgba(255,255,255,0.14); }
      20% { border-color:rgba(255,255,255,0.32); }
      55% { border-color:rgba(255,255,255,0.32); }
      100%{ border-color:rgba(255,255,255,0.14); }
    }
    .machine.flash{ animation:borderflash 5s linear forwards; }

    .slot{
      flex:1;
      height:var(--slot-h);
      overflow:hidden;
      border-right:1px solid rgba(255,255,255,0.07);
      position:relative;
    }
    .slot:last-child{ border-right:none; }

    .slot::after{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(
        to bottom,
        #000 0%,
        rgba(0,0,0,0.85) 18%,
        transparent 38%,
        transparent 62%,
        rgba(0,0,0,0.85) 82%,
        #000 100%
      );
      pointer-events:none;
      z-index:1;
    }

    @keyframes barbreath{
      0%,100%{ opacity:0.88; }
      50%    { opacity:0.55; }
    }
    .machine.pristine .slot::before{
      content:'';
      position:absolute;
      left:50%;top:50%;
      transform:translate(-50%,-50%);
      width:62%;
      height:calc(var(--font-sz) * 1.1);
      background:rgba(255,255,255,0.88);
      z-index:2;
      animation:barbreath 2.8s ease-in-out infinite;
    }
    .machine.pristine .reel-item{ color:transparent!important; }

    .reel{
      display:flex;flex-direction:column;
      position:absolute;left:0;right:0;top:0;
      will-change:transform;
    }

    .reel-item{
      height:var(--slot-h);
      display:flex;align-items:center;justify-content:center;
      font-family:Arial,Helvetica,sans-serif;
      font-size:var(--font-sz);
      font-weight:400;
      letter-spacing:0.18em;
      text-transform:uppercase;
      color:#fff;
      padding:0 12px;
      text-align:center;
      line-height:1.4;
      flex-shrink:0;
    }
    .reel-item.dim{ opacity:0.03; }

    /* ── PULL ── */
    .pull-row{
      padding-top:3.5rem;
      padding-bottom:1rem;
      display:flex;
      flex-direction:column;
      align-items:center;
      opacity:0;
      transition:opacity 1s ease;
    }
    .pull-row.visible{ opacity:1; }

    @keyframes pullbreath{
      0%,100%{ color:rgba(255,255,255,0.28); border-color:rgba(255,255,255,0.10); }
      50%    { color:rgba(255,255,255,0.50); border-color:rgba(255,255,255,0.24); }
    }
    .pull-btn{
      font-family:Arial,Helvetica,sans-serif;
      font-size:11px;font-weight:400;
      letter-spacing:0.32em;text-transform:uppercase;
      color:rgba(255,255,255,0.35);
      background:none;
      border:1px solid rgba(255,255,255,0.13);
      padding:14px 52px;
      cursor:pointer;
      transition:color 0.15s,border-color 0.15s;
      -webkit-tap-highlight-color:transparent;
      outline:none;
    }
    .pull-btn:not(:disabled){ animation:pullbreath 3.2s ease-in-out infinite; }
    @media(hover:hover){
      .pull-btn:hover{ color:rgba(255,255,255,0.7)!important; border-color:rgba(255,255,255,0.4)!important; }
    }
    .pull-btn:focus{ color:rgba(255,255,255,0.35); border-color:rgba(255,255,255,0.13); }
    .pull-btn:disabled{ opacity:0.07; cursor:default; animation:none; }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="inner">

      <a class="contact" id="contact" href="mailto:ketadata001@gmail.com">ketadata001@gmail.com</a>

      <div class="intro" id="intro">
        <div class="intro-line" id="intro1">CONTENT IS DATA</div>
        <div class="intro-line" id="intro2">DATA IS STRUCTURE</div>
      </div>

      <div class="machine pristine" id="machine">
        <div class="slot"><div class="reel" id="r0"></div></div>
        <div class="slot"><div class="reel" id="r1"></div></div>
        <div class="slot"><div class="reel" id="r2"></div></div>
      </div>

      <div class="pull-row" id="pull-row">
        <button class="pull-btn" id="pull" onclick="spin()">PULL</button>
      </div>

    </div>
  </div>

  <script>
    document.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

    const banks = [
      [
        'WE READ','WE INGEST','WE ABSORB','WE LISTEN','WE DIAGNOSE',
        'WE MONITOR','WE TRACK','WE SCOPE','WE AUDIT','WE RESEARCH',
        'WE DEEP DIVE','WE UNPACK','WE IDEATE','WE ALIGN','WE WORKSHOP',
        'WE DISCOVER','WE BENCHMARK','WE ONBOARD','WE CIRCLE BACK','WE LEVERAGE',
        'WE TOUCH BASE','WE TAKE STOCK','WE PRESSURE TEST','WE STRESS TEST','WE SENSE CHECK',
        'WE COME IN','WE ASK','WE OPEN','WE BEGIN','WE RECEIVE',
        'WE INFILTRATE','WE IMMERSE','WE OBSERVE','WE ENTER','WE ATTEND',
        'WE SHOW UP','WE SIT WITH IT','WE LOOK CLOSER','WE TUNE IN','WE CLOCK IT'
      ],
      [
        'WE STRUCTURE','WE PARSE','WE SYNTHESIZE','WE MAP','WE ANALYZE',
        'WE ORGANIZE','WE IDENTIFY','WE CLARIFY','WE OPTIMIZE','WE PIVOT',
        'WE ITERATE','WE STRATEGIZE','WE SYNERGIZE','WE PRIORITIZE','WE STREAMLINE',
        'WE ROADMAP','WE ACTION','WE IMPLEMENT','WE OPERATE','WE SOCIALIZE','WE DEMOCRATIZE',
        'WE FIND THE SIGNAL','WE KILL THE NOISE','WE COMPRESS','WE EXTRACT','WE REFRAME',
        'WE RECOMMEND','WE SHAPE','WE BUILD','WE LOCATE','WE SORT',
        'WE DESIGN','WE ART DIRECT','WE CONCEPT','WE NARRATIVE','WE EDIT',
        'WE CUT','WE CURATE','WE TRANSLATE','WE DECODE','WE CONNECT THE DOTS'
      ],
      [
        'WE BUILD','WE DELIVER','WE DOCUMENT','WE SHIP','WE DEPLOY',
        'WE EXECUTE','WE GO LIVE','WE TRANSFER','WE HAND OVER','WE CLOSE',
        'WE MOVE THE NEEDLE','WE ADD VALUE','WE DRIVE IMPACT','WE SCALE','WE MAKE IT STICK',
        'WE MAKE IT RUN','WE MAKE IT REAL','WE MAKE IT CLEAR','WE MAKE IT HOLD','WE MAKE IT USEFUL',
        'WE TAKE IT OFFLINE','WE LOOP BACK','WE FOLLOW UP','WE LEAVE','WE OUTPUT',
        'WE POSITION','WE PRODUCE','WE MAKE IT SCALE','WE MAKE IT COUNT','WE MAKE IT LAND',
        'WE MAKE IT HIT','WE MAKE IT HURT','WE MAKE IT MOVE','WE MAKE IT LAST','WE MAKE IT YOURS',
        'WE LEAVE A MARK','WE GET OUT','WE WALK AWAY','WE LET IT RUN','WE MAKE IT MATTER'
      ]
    ];

    function getSlotH(){
      return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--slot-h'))||140;
    }

    let H = getSlotH();
    let indices = [0,0,0];
    let spinning = false;
    let revealTimers = [];
    function clearReveal(){ revealTimers.forEach(clearTimeout); revealTimers=[]; }
    function rt(fn,ms){ revealTimers.push(setTimeout(fn,ms)); }

    function buildReels(){
      H = getSlotH();
      for(let i=0;i<3;i++){
        const r=document.getElementById('r'+i);
        r.innerHTML='';
        [...banks[i],...banks[i],...banks[i],...banks[i],...banks[i]].forEach(t=>{
          const d=document.createElement('div');
          d.className='reel-item';
          d.textContent=t;
          r.appendChild(d);
        });
        setPos(i,indices[i],false);
      }
    }

    function setPos(i,idx,animate){
      const r=document.getElementById('r'+i);
      const total=banks[i].length;
      const ti=total+(idx%total);
      const y=-(ti*H)+H;
      r.style.transition=animate?'transform 0.52s cubic-bezier(0.12,1.4,0.3,1)':'none';
      r.style.transform=`translateY(${y}px)`;
      dim(i,ti);
    }

    function dim(ri,center){
      document.getElementById('r'+ri).querySelectorAll('.reel-item').forEach((el,i)=>{
        el.classList.toggle('dim',i!==center&&i!==center-1&&i!==center+1);
      });
    }

    function flash(){
      const m=document.getElementById('machine');
      m.classList.remove('flash');
      void m.offsetWidth;
      m.classList.add('flash');
      setTimeout(()=>m.classList.remove('flash'),5000);
    }

    // ── INTRO SEQUENCE ──
    function runIntro(){
      const i1=document.getElementById('intro1');
      const i2=document.getElementById('intro2');
      const machine=document.getElementById('machine');
      const pullRow=document.getElementById('pull-row');

      setTimeout(()=> i1.classList.add('visible'),    400);
      setTimeout(()=> i1.classList.remove('visible'), 2200);
      setTimeout(()=> i2.classList.add('visible'),    3200);
      setTimeout(()=> i2.classList.remove('visible'), 5000);
      setTimeout(()=>{ machine.classList.add('visible'); pullRow.classList.add('visible'); }, 6200);
    }

    function spin(){
      if(spinning) return;
      spinning=true;
      clearReveal();

      document.getElementById('pull').disabled=true;
      document.getElementById('machine').classList.remove('pristine');
      document.getElementById('contact').classList.remove('visible');

      const targets=banks.map(b=>Math.floor(Math.random()*b.length));
      const stopAt=[700, 1200, 1950];
      const tick=[20, 25, 30];

      for(let i=0;i<3;i++){
        let cur=indices[i];
        const total=banks[i].length;
        const iv=setInterval(()=>{
          cur=(cur+1)%total;
          const r=document.getElementById('r'+i);
          const di=total+cur;
          r.style.transition='none';
          r.style.transform=`translateY(${-(di*H)+H}px)`;
          dim(i,di);
        },tick[i]);

        const si=i;
        setTimeout(()=>{
          clearInterval(iv);
          indices[si]=targets[si];
          setPos(si,indices[si],true);
          if(si===2){
            setTimeout(()=>{
              spinning=false;
              flash();
              rt(()=> document.getElementById('pull').disabled=false,             380);
              rt(()=> document.getElementById('contact').classList.add('visible'), 900);
            },480);
          }
        },stopAt[si]);
      }
    }

    window.addEventListener('resize',()=>{
      if(!spinning){ H=getSlotH(); for(let i=0;i<3;i++) setPos(i,indices[i],false); }
    });

    buildReels();
    runIntro();
  </script>

</body>
</html>
