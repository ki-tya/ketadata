<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>k-blm</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root{
      --base-gray:#2f2f2f;
      --glow1:#6a6a6a;
      --glow2:#8a8a8a;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
    }

    #stage{
      position:relative;
      width:100vw;
      height:100vh;
      display:grid;
      place-items:center;
    }

    .echo{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);

      font-family:"Great Vibes", cursive;
      font-weight:400;
      font-size:min(14vw,160px);
      line-height:1;
      text-align:center;
      white-space:nowrap;

      color:var(--base-gray);

      filter:blur(.2px);

      text-shadow:
        0 0 6px var(--glow1),
        0 0 14px var(--glow2);

      opacity:.9;

      pointer-events:none;

      animation:flicker 5s infinite ease-in-out;
    }

    @keyframes flicker{

      0%,100%{
        opacity:.88;
        text-shadow:
          0 0 6px var(--glow1),
          0 0 14px var(--glow2);
      }

      6%{
        opacity:.35;
        text-shadow:none;
      }

      8%{
        opacity:.95;
        text-shadow:
          0 0 10px var(--glow1),
          0 0 22px var(--glow2);
      }

      12%{
        opacity:.6;
        text-shadow:none;
      }

      15%{
        opacity:.92;
        text-shadow:
          0 0 8px var(--glow1),
          0 0 18px var(--glow2);
      }
    }
  </style>
</head>

<body>

  <div id="stage">
    <div class="echo">Bleak Lives Matter</div>
  </div>

</body>
</html>
