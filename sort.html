<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KETADATA SORTER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--fg:#fff;--dim:rgba(255,255,255,.18);--dimmer:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.1);
}
body{background:var(--bg);color:var(--fg);font-family:Arial,Helvetica,sans-serif;font-size:12px;min-height:100vh}

.topbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:14px 20px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:#000;z-index:10;
}
.topbar-title{letter-spacing:.25em;font-size:10px;color:var(--dim);white-space:nowrap}
.search{
  flex:1;min-width:100px;background:none;border:none;border-bottom:1px solid var(--border);
  color:#fff;font-family:Arial,Helvetica,sans-serif;font-size:12px;
  padding:4px 0;outline:none;
}
.search::placeholder{color:var(--dim)}
.filter-btns{display:flex;gap:4px;flex-wrap:wrap}
.flt{
  font-family:Arial,Helvetica,sans-serif;font-size:10px;letter-spacing:.12em;
  background:none;border:1px solid var(--border);color:var(--dim);
  padding:4px 10px;cursor:pointer;transition:all .1s;white-space:nowrap;
}
.flt:hover,.flt.active{color:#fff;border-color:rgba(255,255,255,.5)}
.count{font-size:10px;color:var(--dim);white-space:nowrap}

.catbar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:10px 20px;border-bottom:1px solid var(--border);
}
.cat-label{font-size:10px;letter-spacing:.2em;color:var(--dim);margin-right:4px;white-space:nowrap}
.cat-chip{
  font-family:Arial,Helvetica,sans-serif;font-size:10px;letter-spacing:.08em;
  padding:3px 10px;border:1px solid var(--border);cursor:pointer;
  color:var(--dim);background:none;transition:all .12s;
}
.cat-chip:hover{color:#fff;border-color:rgba(255,255,255,.4)}
.cat-chip.selected-cat{color:#fff;border-color:#fff}
.cat-chip .cat-del{margin-left:6px;opacity:.4;font-size:9px}
.cat-chip .cat-del:hover{opacity:1}
.new-cat-input{
  background:none;border:none;border-bottom:1px solid var(--border);
  color:#fff;font-family:Arial,Helvetica,sans-serif;font-size:10px;
  padding:3px 4px;outline:none;width:90px;
}
.new-cat-input::placeholder{color:var(--dim)}

.list{padding:8px 20px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:2px}
.cell{
  display:flex;align-items:center;
  border:1px solid transparent;min-height:32px;
  transition:background .1s;position:relative;
}
.cell:hover{background:rgba(255,255,255,.03);border-color:var(--dimmer)}
.cell.tagged-star{border-left:2px solid #fff!important}
.cell.tagged-x{opacity:.35}
.cell.is-new .fname::after{
  content:'NEW';font-size:8px;letter-spacing:.1em;
  color:rgba(255,255,255,.3);margin-left:6px;vertical-align:middle;
}

.btn-star,.btn-x{
  background:none;border:none;cursor:pointer;
  font-size:12px;padding:0 7px;flex-shrink:0;
  color:var(--dim);transition:color .1s;line-height:32px;
}
.btn-star:hover{color:#fff}
.btn-x:hover{color:rgba(255,255,255,.7)}
.cell.tagged-star .btn-star{color:#fff}
.cell.tagged-x .btn-x{color:rgba(255,255,255,.5)}

.fname{
  flex:1;color:rgba(255,255,255,.55);font-size:11px;
  padding:0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  cursor:pointer;transition:color .1s;
}
.fname:hover{color:#fff}
.cell.tagged-star .fname{color:rgba(255,255,255,.9)}

.row-cats{
  display:none;position:absolute;right:0;top:100%;z-index:5;
  background:#0d0d0d;border:1px solid var(--border);
  padding:6px;gap:4px;flex-wrap:wrap;min-width:100px;
}
.cell:hover .row-cats{display:flex}
.row-cat{
  font-family:Arial,Helvetica,sans-serif;font-size:9px;letter-spacing:.08em;
  padding:2px 7px;border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.45);background:none;cursor:pointer;transition:all .1s;white-space:nowrap;
}
.row-cat:hover{color:#fff;border-color:#fff}
.row-cat.active-cat{color:#fff;border-color:#fff;background:rgba(255,255,255,.08)}

.exportbar{
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 20px;background:#000;border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
}
.exp-btn{
  font-family:Arial,Helvetica,sans-serif;font-size:10px;letter-spacing:.15em;
  background:none;border:1px solid var(--border);color:var(--dim);
  padding:6px 14px;cursor:pointer;transition:all .1s;
}
.exp-btn:hover{color:#fff;border-color:#fff}
.exp-btn.hi{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.5)}
.exp-btn.hi:hover{color:#fff;border-color:#fff}
.exp-stats{font-size:10px;color:var(--dim);margin-left:auto}

.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:100;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:#080808;border:1px solid var(--border);
  padding:24px;max-width:660px;width:92%;max-height:82vh;overflow-y:auto;
}
.mtitle{font-size:10px;letter-spacing:.22em;color:var(--dim);margin-bottom:14px;text-transform:uppercase}
.msub{font-size:9px;letter-spacing:.18em;color:var(--dim);margin:14px 0 8px;text-transform:uppercase}
.modal pre{font-family:Arial,Helvetica,sans-serif;font-size:11px;color:rgba(255,255,255,.7);white-space:pre-wrap;word-break:break-all;line-height:1.6}
.mrow{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.mbtn{
  font-family:Arial,Helvetica,sans-serif;font-size:10px;letter-spacing:.15em;
  background:none;border:1px solid var(--border);color:var(--dim);
  padding:7px 14px;cursor:pointer;transition:all .1s;white-space:nowrap;
}
.mbtn:hover{color:#fff;border-color:#fff}
.minput{
  flex:1;background:none;border:1px solid var(--border);
  color:#fff;font-family:Arial,Helvetica,sans-serif;font-size:11px;
  padding:7px 10px;outline:none;min-width:0;
}
.minput::placeholder{color:var(--dim)}
.mtextarea{
  width:100%;height:160px;background:none;border:1px solid var(--border);
  color:#fff;font-family:Arial,Helvetica,sans-serif;font-size:11px;
  padding:10px;outline:none;resize:vertical;margin-bottom:8px;
}
.mtextarea::placeholder{color:var(--dim)}
.sync-result{
  font-size:11px;color:rgba(255,255,255,.4);
  padding:10px;border:1px solid var(--dimmer);
  margin-bottom:10px;line-height:1.8;min-height:36px;
}
.sync-result .ok{color:#fff}
.sync-result .sk{color:rgba(255,255,255,.25)}
.api-hint{font-size:10px;color:rgba(255,255,255,.25);margin-bottom:8px;line-height:1.6;word-break:break-all}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">KETADATA SORTER</span>
  <input class="search" id="search" placeholder="filter files..." oninput="renderList()"/>
  <div class="filter-btns">
    <button class="flt active" onclick="setFilter('all',this)">ALL</button>
    <button class="flt" onclick="setFilter('star',this)">★ KEPT</button>
    <button class="flt" onclick="setFilter('x',this)">✕ KILLED</button>
    <button class="flt" onclick="setFilter('none',this)">UNTAGGED</button>
    <button class="flt" onclick="setFilter('new',this)">NEW</button>
  </div>
  <span class="count" id="count"></span>
</div>

<div class="catbar">
  <span class="cat-label">FOLDERS →</span>
  <button class="cat-chip selected-cat" onclick="setCatFilter('ALL',this)">ALL</button>
  <div id="cat-chips"></div>
  <input class="new-cat-input" id="new-cat" placeholder="+ new folder" onkeydown="addCatKey(event)"/>
</div>

<div class="list" id="list"></div>

<div class="exportbar">
  <button class="exp-btn hi" onclick="openSync()">+ SYNC / ADD</button>
  <button class="exp-btn" onclick="showExport()">EXPORT</button>
  <button class="exp-btn" onclick="clearAnnotations()">RESET TAGS</button>
  <span class="exp-stats" id="stats"></span>
</div>

<!-- EXPORT MODAL -->
<div class="modal-bg" id="modal-export">
  <div class="modal">
    <div class="mtitle">EXPORT — PASTE BACK TO CLAUDE</div>
    <div class="mrow">
      <button class="mbtn" onclick="copyExport()">COPY</button>
      <button class="mbtn" onclick="closeModals()">CLOSE</button>
    </div>
    <pre id="export-text"></pre>
  </div>
</div>

<!-- SYNC MODAL -->
<div class="modal-bg" id="modal-sync">
  <div class="modal">
    <div class="mtitle">SYNC & ADD FILES</div>

    <div class="msub">MANUAL ADD</div>
    <div class="mrow">
      <input class="minput" id="manual-input" placeholder="newfile.html" onkeydown="manualAddKey(event)"/>
      <button class="mbtn" onclick="manualAdd()">ADD</button>
    </div>

    <div class="msub" style="margin-top:18px">SYNC FROM GITHUB API</div>
    <div class="api-hint">
      paste json from:<br/>
      https://api.github.com/repos/ki-tya/ketadata/git/trees/main?recursive=1
    </div>
    <textarea class="mtextarea" id="api-paste" placeholder="paste github api json here..."></textarea>
    <div class="sync-result" id="sync-result">—</div>
    <div class="mrow">
      <button class="mbtn" onclick="syncFromAPI()">SYNC</button>
      <button class="mbtn" onclick="closeModals()">CLOSE</button>
    </div>
  </div>
</div>

async function load(){

  try{ const r=await window.storage.get('kd-cat'); if(r) categories=JSON.parse(r.value);  }catch(e){}

}

async function saveFiles(){
  try{ await window.storage.set('kd-files', JSON.stringify({list:FILES, newFiles:[...newFiles]})); }catch(e){}
}
async function save(){
  try{ await window.storage.set('kd-ann', JSON.stringify(annotations)); }catch(e){}
  try{ await window.storage.set('kd-cat', JSON.stringify(categories));  }catch(e){}
}

// ── FILE ADD ──
function addFiles(incoming){
  const existing = new Set(FILES);
  const added=[], skipped=[];
  incoming.forEach(f=>{
    f=f.trim();
    if(!f) return;
    if(!f.endsWith('.html')) f=f+'.html';
    if(existing.has(f)) skipped.push(f);
    else { FILES.push(f); newFiles.add(f); added.push(f); existing.add(f); }
  });
  FILES.sort();
  if(added.length) saveFiles();
  return {added, skipped};
}

function manualAdd(){
  const inp=document.getElementById('manual-input');
  const val=inp.value.trim(); if(!val) return;
  const {added,skipped}=addFiles([val]);
  inp.value='';
  const res=document.getElementById('sync-result');
  if(added.length){ res.innerHTML=`<span class="ok">+ added: ${added.join(', ')}</span>`; renderList(); renderStats(); }
  else res.innerHTML=`<span class="sk">already exists: ${skipped.join(', ')}</span>`;
}
function manualAddKey(e){ if(e.key==='Enter') manualAdd(); }

function syncFromAPI(){
  const raw=document.getElementById('api-paste').value.trim();
  const res=document.getElementById('sync-result');
  if(!raw){ res.textContent='paste json first'; return; }
  let data;
  try{ data=JSON.parse(raw); }catch(e){ res.textContent='invalid json'; return; }
  const tree=data.tree||[];
  // root-level .html files only (no subdirectory paths)
  const htmlFiles=tree
    .filter(i=>i.type==='blob' && i.path && i.path.endsWith('.html') && !i.path.includes('/'))
    .map(i=>i.path);
  if(!htmlFiles.length){ res.textContent='no root-level html files found'; return; }
  const {added,skipped}=addFiles(htmlFiles);
  let out='';
  if(added.length){
    out+=`<span class="ok">+ ${added.length} added</span>`;
    added.forEach(f=>{ out+=`<br/><span class="ok" style="padding-left:12px">${f}</span>`; });
  }
  if(skipped.length) out+=`${added.length?'<br/>':''}<span class="sk">${skipped.length} already existed — skipped</span>`;
  res.innerHTML=out||'nothing to add';
  renderList(); renderStats();
}

// ── ANNOTATIONS ──
function getA(f){ return annotations[f]||{tag:null,cats:[]}; }

function setTag(f,t){
  const a=getA(f); a.tag=a.tag===t?null:t; annotations[f]=a;
  save(); renderList(); renderStats();
}
function toggleCat(f,cat){
  const a=getA(f); const i=(a.cats||[]).indexOf(cat);
  if(i>=0) a.cats.splice(i,1); else a.cats.push(cat);
  annotations[f]=a; save(); renderList();
}

// ── CATEGORIES ──
function addCat(name){
  name=name.trim().toUpperCase();
  if(!name||categories.includes(name)) return;
  categories.push(name); save(); renderCats(); renderList();
}
function deleteCat(cat){
  categories=categories.filter(c=>c!==cat);
  Object.keys(annotations).forEach(f=>{ annotations[f].cats=(annotations[f].cats||[]).filter(c=>c!==cat); });
  if(activeCatFilter===cat) activeCatFilter='ALL';
  save(); renderCats(); renderList();
}
function addCatKey(e){ if(e.key==='Enter'){ addCat(e.target.value); e.target.value=''; } }
function setCatFilter(cat,el){
  activeCatFilter=cat;
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('selected-cat'));
  el.classList.add('selected-cat'); renderList();
}
function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.flt').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); renderList();
}

// ── RENDER ──
function renderCats(){
  document.getElementById('cat-chips').innerHTML=categories.map(cat=>`
    <button class="cat-chip${activeCatFilter===cat?' selected-cat':''}" onclick="setCatFilter('${cat}',this)">
      ${cat}<span class="cat-del" onclick="event.stopPropagation();deleteCat('${cat}')"> ✕</span>
    </button>`).join('');
}

function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=FILES.filter(f=>{
    const a=getA(f);
    if(q&&!f.toLowerCase().includes(q)) return false;
    if(activeFilter==='star'&&a.tag!=='star') return false;
    if(activeFilter==='x'&&a.tag!=='x')      return false;
    if(activeFilter==='none'&&a.tag)          return false;
    if(activeFilter==='new'&&!newFiles.has(f)) return false;
    if(activeCatFilter!=='ALL'&&!(a.cats||[]).includes(activeCatFilter)) return false;
    return true;
  });
  document.getElementById('count').textContent=filtered.length+' files';
  const cells=filtered.map(f=>{
    const a=getA(f);
    const sc=a.tag==='star'?'tagged-star':'';
    const xc=a.tag==='x'?'tagged-x':'';
    const nc=newFiles.has(f)?'is-new':'';
    const pills=categories.map(cat=>{
      const on=(a.cats||[]).includes(cat);
      return `<button class="row-cat${on?' active-cat':''}" onclick="toggleCat('${f}','${cat}')">${cat}</button>`;
    }).join('');
    return `<div class="cell ${sc} ${xc} ${nc}">
      <button class="btn-star" onclick="setTag('${f}','star')">★</button>
      <button class="btn-x"   onclick="setTag('${f}','x')">✕</button>
      <span class="fname" onclick="window.open('${BASE+f}','_blank')">${f}</span>
      ${categories.length?`<div class="row-cats">${pills}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('list').innerHTML=`<div class="grid">${cells}</div>`;
}

function renderStats(){
  const s=FILES.filter(f=>getA(f).tag==='star').length;
  const x=FILES.filter(f=>getA(f).tag==='x').length;
  const n=FILES.filter(f=>!getA(f).tag).length;
  document.getElementById('stats').textContent=
    `${FILES.length} total  ★ ${s}  ✕ ${x}  — ${n} untagged  + ${newFiles.size} new`;
}

// ── MODALS ──
function openSync(){ document.getElementById('modal-sync').classList.add('open'); }
function closeModals(){ document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open')); }

function showExport(){
  const starred=FILES.filter(f=>getA(f).tag==='star');
  const xd=FILES.filter(f=>getA(f).tag==='x');
  const catMap={};
  categories.forEach(cat=>{ catMap[cat]=FILES.filter(f=>(getA(f).cats||[]).includes(cat)); });
  let out=`=== KETADATA FILE AUDIT ===\n\n`;
  out+=`★ KEPT (${starred.length})\n`; starred.forEach(f=>{ out+=`  ${f}\n`; });
  out+=`\n✕ KILLED (${xd.length})\n`; xd.forEach(f=>{ out+=`  ${f}\n`; });
  Object.keys(catMap).forEach(cat=>{
    if(catMap[cat].length){ out+=`\n[${cat}] (${catMap[cat].length})\n`; catMap[cat].forEach(f=>{ out+=`  ${f}\n`; }); }
  });
  if(newFiles.size){ out+=`\n[NEW SINCE LAST SYNC] (${newFiles.size})\n`; [...newFiles].forEach(f=>{ out+=`  ${f}\n`; }); }
  out+=`\n=== END ===`;
  document.getElementById('export-text').textContent=out;
  document.getElementById('modal-export').classList.add('open');
}
function copyExport(){ navigator.clipboard.writeText(document.getElementById('export-text').textContent).catch(()=>{}); }
function clearAnnotations(){
  if(!confirm('Reset all tags and folders? File list stays.')) return;
  annotations={}; categories=[];
  save(); renderCats(); renderList(); renderStats();
}

load();
</script>
