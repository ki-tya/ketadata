<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KETADATA DROP SURFACE</title>
<style>
:root{--bg:#000;--fg:#fff;--muted:#777;--line:#222;--panel:#050505}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--fg);font-family:Arial,Helvetica,sans-serif;font-size:11px;overflow:hidden}
body.invert{--bg:#fff;--fg:#000;--muted:#777;--line:#ddd;--panel:#fafafa}
#topbar{position:fixed;top:0;left:0;right:0;height:34px;border-bottom:1px solid var(--line);background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:20;letter-spacing:.08em}
#brand{font-weight:700}
#status{color:var(--muted);max-width:50vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#drop{position:absolute;inset:34px 0 0 0;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);letter-spacing:.04em}
#drop.active{outline:1px solid var(--fg);outline-offset:-18px;color:var(--fg)}
#viewer{position:absolute;inset:34px 0 0 0;width:100%;height:calc(100% - 34px);border:0;background:var(--bg);display:none}
#imageView{position:absolute;inset:34px 0 0 0;display:none;align-items:center;justify-content:center;overflow:auto;background:var(--bg)}
#imageView img{max-width:100%;max-height:100%;object-fit:contain}
#textView{position:absolute;inset:34px 0 0 0;display:none;padding:28px;white-space:pre-wrap;overflow:auto;line-height:1.45;background:var(--bg);color:var(--fg)}
#controls{position:fixed;right:12px;bottom:12px;border:1px solid var(--line);background:var(--panel);padding:8px;display:flex;gap:8px;z-index:30}
button{background:transparent;border:1px solid var(--line);color:var(--fg);font:inherit;padding:5px 8px;cursor:pointer;letter-spacing:.04em}
button:hover{border-color:var(--fg)}
#meta{position:fixed;left:12px;bottom:12px;color:var(--muted);z-index:30;max-width:48vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="topbar"><div id="brand">KETADATA / DROP SURFACE</div><div id="status">DROP FILE</div></div>
<div id="drop"><div>DROP PDF / IMAGE / TEXT / HTML<br><br>SHIFT+I INVERT · SHIFT+N NULL · SHIFT+F FULLSCREEN · ESC RESET</div></div>
<iframe id="viewer"></iframe>
<div id="imageView"><img id="img"></div>
<pre id="textView"></pre>
<div id="meta">NO FILE LOADED</div>
<div id="controls"><button onclick="resetSurface()">RESET</button><button onclick="toggleInvert()">INVERT</button><button onclick="toggleFullscreen()">FULL</button></div>
<script>
const drop=document.getElementById('drop'),viewer=document.getElementById('viewer'),imageView=document.getElementById('imageView'),img=document.getElementById('img'),textView=document.getElementById('textView'),statusEl=document.getElementById('status'),meta=document.getElementById('meta'),controls=document.getElementById('controls');
let currentUrl=null,nulled=false;
function clearViews(){viewer.style.display='none';imageView.style.display='none';textView.style.display='none';drop.style.display='none';viewer.removeAttribute('src');img.removeAttribute('src');textView.textContent='';if(currentUrl)URL.revokeObjectURL(currentUrl);currentUrl=null}
function loadFile(file){clearViews();currentUrl=URL.createObjectURL(file);statusEl.textContent=file.name.toUpperCase();meta.textContent=`${file.name} · ${file.type||'unknown'} · ${(file.size/1024/1024).toFixed(2)} MB`;if(file.type.startsWith('image/')){img.src=currentUrl;imageView.style.display='flex'}else if(file.type.startsWith('text/')||file.name.match(/\.(txt|md|csv|json|html|css|js)$/i)){file.text().then(t=>{textView.textContent=t;textView.style.display='block'})}else{viewer.src=currentUrl;viewer.style.display='block'}}
function resetSurface(){clearViews();drop.style.display='flex';statusEl.textContent='DROP FILE';meta.textContent='NO FILE LOADED';document.body.classList.remove('invert');document.body.style.background='var(--bg)';nulled=false}
function toggleInvert(){document.body.classList.toggle('invert')}
function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen()}
function toggleNull(){nulled=!nulled;if(nulled){viewer.classList.add('hidden');imageView.classList.add('hidden');textView.classList.add('hidden');drop.classList.add('hidden');controls.classList.add('hidden');meta.classList.add('hidden');document.body.style.background='#000'}else{viewer.classList.remove('hidden');imageView.classList.remove('hidden');textView.classList.remove('hidden');drop.classList.remove('hidden');controls.classList.remove('hidden');meta.classList.remove('hidden');document.body.style.background='var(--bg)'}}
window.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('active')});
window.addEventListener('dragleave',e=>{e.preventDefault();drop.classList.remove('active')});
window.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('active');const file=e.dataTransfer.files[0];if(file)loadFile(file)});
window.addEventListener('keydown',e=>{if(e.key==='Escape')resetSurface();if(e.shiftKey&&e.key.toLowerCase()==='i')toggleInvert();if(e.shiftKey&&e.key.toLowerCase()==='f')toggleFullscreen();if(e.shiftKey&&e.key.toLowerCase()==='n')toggleNull()});
</script>

</html>
