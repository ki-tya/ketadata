<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KETADATA // MAY 2026</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  :root{--line:#1e1e1e;--cell:128px;--gap:6px}
  .topbar{height:38px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0}
  .topbar-l{display:flex;align-items:center;gap:16px}
  .topbar-r{display:flex;align-items:center;gap:8px}
  .brand{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.36)}
  .brand strong{color:#fff;font-weight:700}
  .mlabel{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.28)}
  .act-btn{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35);background:#000;border:1px solid var(--line);padding:3px 9px;cursor:pointer;transition:color .1s,border-color .1s}
  .act-btn:hover{color:#fff;border-color:rgba(255,255,255,.32)}
  .keta-icon{width:12px;height:12px;border:1.5px solid rgba(255,255,255,.45);cursor:pointer;transition:background .1s}
  .keta-icon.filled{background:#fff}
  .page{height:100%;display:flex;flex-direction:column}
  .wrap{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:24px}
  .cal{width:calc(var(--cell)*7 + var(--gap)*6);display:grid;grid-template-columns:repeat(7,var(--cell));grid-auto-rows:var(--cell);gap:var(--gap)}
  .cell{border:1px solid var(--line);padding:8px;display:flex;flex-direction:column;position:relative;transition:border-color .12s,background .12s}
  .cell.pad{opacity:.10;pointer-events:none}
  .cell:not(.pad){cursor:pointer}
  .cell:not(.pad):hover{border-color:rgba(255,255,255,.26);background:rgba(255,255,255,.02)}
  .cell.today{border-color:rgba(255,255,255,.28)}
  .cell.today .dn{color:#fff;font-weight:700}
  .dn{position:absolute;top:7px;left:7px;font-size:11px;color:rgba(255,255,255,.42)}
  .dw{position:absolute;top:7px;right:7px;font-size:8px;letter-spacing:.14em;color:rgba(255,255,255,.20)}
  .prev{position:absolute;bottom:7px;left:7px;right:7px;font-size:9px;line-height:1.35;color:rgba(255,255,255,.28);overflow:hidden;max-height:38px}
  .has-brief{position:absolute;bottom:7px;right:7px;width:5px;height:5px;background:rgba(255,255,255,.70);border-radius:50%}
  .cell.focused{border-color:rgba(255,255,255,.55)!important;}
  body.wk .cell{display:none}
  body.wk .cell.inWeek{display:flex}

  #kn{position:fixed;top:54px;right:18px;width:300px;height:200px;background:#fff;color:#000;border:1px solid #000;display:none;z-index:50}
  #kn .knh{height:26px;background:#000;color:#fff;padding:4px 8px;cursor:move;display:flex;justify-content:space-between;align-items:center;font-size:9px;letter-spacing:.18em;text-transform:uppercase}
  #kn textarea{width:100%;height:calc(100% - 26px);border:none;resize:none;padding:10px;font-family:Arial,Helvetica,sans-serif;font-size:11px;outline:none}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="topbar-l"><div class="brand"><strong>KETADATA</strong></div><div class="mlabel">MAY · 2026</div></div>
    <div class="topbar-r">
      <button class="act-btn" id="btnTog">MONTH / WEEK</button>
      <button class="act-btn" id="btnExp">EXPORT</button>
      <button class="act-btn" id="btnImp">IMPORT</button>
      <input id="fileIn" type="file" accept="application/json" style="display:none">
      <div class="keta-icon filled" id="ki"></div>
    </div>
  </div>
  <div class="wrap"><div class="cal" id="cal"></div></div>
  </div>
<div id="kn"><div class="knh"><span>KETA NOTE</span><span id="cn" style="cursor:pointer">×</span></div><textarea id="knt" placeholder="decisions · deviations · next actions"></textarea></div>
<script>
const CK='ketadata.cal.may_2026';
const ST={wk:false,sw:0,sys:'',kn:''};
const cal=document.getElementById('cal');
const TODAY=29;

function addPad(){const c=document.createElement('div');c.className='cell pad';cal.appendChild(c);}
const BRIEFS=[23,24,25,26,27,28,29];
function addDay(d,dw,file){
  const c=document.createElement('div');
  c.className='cell';c.dataset.d=d;c.dataset.w=Math.floor((5+d-1)/7);c.dataset.file=file;
  if(d===TODAY)c.classList.add('today');
  const dot=BRIEFS.includes(d)?'<div class="has-brief"></div>':'';
  c.innerHTML=`<div class="dn">${d}</div><div class="dw">${dw}</div><div class="prev" id="p${d}"></div>${dot}`;
  c.addEventListener('click',()=>{if(ST.wk){ST.sw=+c.dataset.w;applyW();persist();return;}window.location.href=file;});
  cal.appendChild(c);
}
  addPad();
  addPad();
  addPad();
  addPad();
  addPad();
  addDay(1,'FRI','05_01_26.html');
  addDay(2,'SAT','05_02_26.html');
  addDay(3,'SUN','05_03_26.html');
  addDay(4,'MON','05_04_26.html');
  addDay(5,'TUE','05_05_26.html');
  addDay(6,'WED','05_06_26.html');
  addDay(7,'THU','05_07_26.html');
  addDay(8,'FRI','05_08_26.html');
  addDay(9,'SAT','05_09_26.html');
  addDay(10,'SUN','05_10_26.html');
  addDay(11,'MON','05_11_26.html');
  addDay(12,'TUE','05_12_26.html');
  addDay(13,'WED','05_13_26.html');
  addDay(14,'THU','05_14_26.html');
  addDay(15,'FRI','05_15_26.html');
  addDay(16,'SAT','05_16_26.html');
  addDay(17,'SUN','05_17_26.html');
  addDay(18,'MON','05_18_26.html');
  addDay(19,'TUE','05_19_26.html');
  addDay(20,'WED','05_20_26.html');
  addDay(21,'THU','05_21_26.html');
  addDay(22,'FRI','05_22_26.html');
  addDay(23,'SAT','05_23_26.html');
  addDay(24,'SUN','05_24_26.html');
  addDay(25,'MON','05_25_26.html');
  addDay(26,'TUE','05_26_26.html');
  addDay(27,'WED','05_27_26.html');
  addDay(28,'THU','05_28_26.html');
  addDay(29,'FRI','05_29_26.html');
  addDay(30,'SAT','05_30_26.html');
  addDay(31,'SUN','05_31_26.html');


function loadPrev(){
  for(let d=1;d<=31;d++){
    try{
      const raw=localStorage.getItem(`${String(d).padStart(2,'0')}_26`);
      const full=localStorage.getItem(`05_${String(d).padStart(2,'0')}_26`);
      const r = raw||full;
      if(!r)continue;
      const data=JSON.parse(r);
      if(data.notes){const el=document.getElementById('p'+d);if(el)el.textContent=data.notes.slice(0,60);}
      // brief dot
      const hasBrief = data.notes||false;
    }catch(e){}
  }
}

function applyW(){document.body.classList.toggle('wk',ST.wk);if(!ST.wk){cal.querySelectorAll('.cell').forEach(c=>c.classList.remove('inWeek'));return;}cal.querySelectorAll('.cell').forEach(c=>{c.classList.toggle('inWeek',c.classList.contains('pad')?ST.sw===0:+c.dataset.w===ST.sw);});}
function persist(){try{ST.sys=document.getElementById('sys').value;ST.kn=document.getElementById('knt').value;localStorage.setItem(CK,JSON.stringify(ST));}catch(e){}}
function loadCal(){try{const r=localStorage.getItem(CK);if(!r)return;const d=JSON.parse(r);Object.assign(ST,d);document.getElementById('sys').value=ST.sys||'';document.getElementById('knt').value=ST.kn||'';}catch(e){}}

const kn=document.getElementById('kn'),ki=document.getElementById('ki');
function tgNote(){const o=kn.style.display==='block';kn.style.display=o?'none':'block';ki.classList.toggle('filled',o);}
ki.addEventListener('click',tgNote);document.getElementById('cn').addEventListener('click',tgNote);
(function(){const box=kn,bar=box.querySelector('.knh');let drag=false,ox=0,oy=0;bar.addEventListener('mousedown',e=>{drag=true;const r=box.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;});window.addEventListener('mousemove',e=>{if(!drag)return;box.style.left=(e.clientX-ox)+'px';box.style.top=(e.clientY-oy)+'px';box.style.right='auto';});window.addEventListener('mouseup',()=>drag=false);})();

document.getElementById('btnTog').addEventListener('click',()=>{ST.wk=!ST.wk;applyW();persist();});
document.getElementById('btnExp').addEventListener('click',()=>{persist();const b=new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ketadata_may_2026.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500);});
document.getElementById('btnImp').addEventListener('click',()=>document.getElementById('fileIn').click());
document.getElementById('fileIn').addEventListener('change',()=>{const f=document.getElementById('fileIn').files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{Object.assign(ST,JSON.parse(r.result));document.getElementById('sys').value=ST.sys||'';document.getElementById('knt').value=ST.kn||'';applyW();}catch(e){alert('Import failed');}};r.readAsText(f);document.getElementById('fileIn').value='';});
document.getElementById('sys').addEventListener('input',persist);document.getElementById('knt').addEventListener('input',persist);



let focusedDay = TODAY;
function setFocus(d){
  if(d<1||d>31) return;
  cal.querySelectorAll('.cell.focused').forEach(c=>c.classList.remove('focused'));
  const cell=cal.querySelector('[data-d="'+d+'"]');
  if(cell){cell.classList.add('focused');focusedDay=d;}
}
document.addEventListener('keydown',e=>{
  const tag=document.activeElement?.tagName.toLowerCase();
  if(tag==='textarea'||tag==='input') return;
  switch(e.key){
    case 'ArrowRight': e.preventDefault(); setFocus(focusedDay+1); break;
    case 'ArrowLeft':  e.preventDefault(); setFocus(focusedDay-1); break;
    case 'ArrowDown':  e.preventDefault(); setFocus(focusedDay+7); break;
    case 'ArrowUp':    e.preventDefault(); setFocus(focusedDay-7); break;
    case 'Enter':{
      const f=cal.querySelector('.cell.focused');
      if(f&&f.dataset.file) window.location.href=f.dataset.file;
      break;
    }
    case 'n': if(!e.ctrlKey&&!e.metaKey) tgNote(); break;
  }
});
loadCal();applyW();loadPrev();setFocus(TODAY);
</script>
</body>
</html>
