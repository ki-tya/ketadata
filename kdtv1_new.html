<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KDTV1</title>
<style>
:root{
--bg:#000;
--panel:rgba(0,0,0,.76);
--line:rgba(255,255,255,.08);
--line2:rgba(255,255,255,.18);
--text:rgba(255,255,255,.86);
--muted:rgba(255,255,255,.44);
--blur:0px;
--contrast:1;
--brightness:1;
--saturate:1;
--grayscale:0;
}
*{box-sizing:border-box;}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,Helvetica,sans-serif;color:#fff;}
body.globalInvert{filter:invert(1) hue-rotate(180deg);}

.playerWrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:72px 24px;}
.screenShell{position:relative;width:min(1420px,calc(100vw - 48px));height:min(820px,calc(100vh - 144px));border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#000;box-shadow:0 40px 140px rgba(0,0,0,.82);transition:all .25s ease;}
.screenShell.surfaceFullscreen{position:fixed;inset:0;width:100vw;height:100vh;border-radius:0;z-index:9999;}
.playerMedia{position:absolute;inset:0;filter:blur(var(--blur)) contrast(var(--contrast)) brightness(var(--brightness)) saturate(var(--saturate)) grayscale(var(--grayscale));}
iframe{width:100%;height:100%;border:0;background:#000;}
.fx{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at center,rgba(255,255,255,.04),transparent 58%),radial-gradient(circle at center,transparent 40%,rgba(0,0,0,.82));mix-blend-mode:screen;}

.topbar,.bottombar{position:fixed;left:12px;right:12px;display:flex;align-items:center;justify-content:space-between;padding:3px 8px;gap:8px;border:1px solid var(--line);border-radius:999px;background:var(--panel);backdrop-filter:blur(18px);z-index:100;}
.topbar{top:12px;}
.bottombar{bottom:12px;}
.group{display:flex;align-items:center;gap:6px;}
.brand,.pill,.btn{height:22px;display:flex;align-items:center;padding:0 8px;border:1px solid var(--line);border-radius:999px;font-size:9px;letter-spacing:.16em;text-transform:uppercase;}
.brand,.pill{background:rgba(255,255,255,.02);}
.btn{cursor:pointer;background:rgba(255,255,255,.02);color:var(--muted);}
.btn:hover{border-color:var(--line2);color:#fff;background:rgba(255,255,255,.04);}

.panel{position:fixed;left:12px;top:48px;width:300px;max-height:calc(100vh - 108px);overflow:auto;background:rgba(0,0,0,.82);backdrop-filter:blur(22px);border:1px solid var(--line);border-radius:14px;z-index:90;box-shadow:0 20px 80px rgba(0,0,0,.55);}
.panel.hidden{display:none;}
.panel.dragging{transition:none;user-select:none;}
.panelHead{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:7px 8px;background:rgba(0,0,0,.92);border-bottom:1px solid rgba(255,255,255,.06);cursor:move;}
.panelTitle,.sectionLabel,.fxRow span,.fxVal,.cardMeta{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.section{padding:8px;border-bottom:1px solid rgba(255,255,255,.05);}
.categoryRow{display:flex;gap:6px;flex-wrap:wrap;}
.categoryBtn{cursor:pointer;padding:4px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.02);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.categoryBtn.active{border-color:var(--line2);color:#fff;}
.card{padding:8px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.02);margin-top:6px;cursor:pointer;}
.card:hover{border-color:var(--line2);background:rgba(255,255,255,.04);}
.cardTitle{font-size:11px;margin-bottom:4px;}
.effects{display:grid;gap:6px;}
.fxRow{display:grid;grid-template-columns:72px 1fr 36px;gap:8px;align-items:center;}
.fxRow input{width:100%;}
.lights{display:flex;gap:4px;}
.light{width:10px;height:10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.05);cursor:pointer;}
.light.active{background:#fff;box-shadow:0 0 10px rgba(255,255,255,.8);}
.note{position:fixed;right:12px;bottom:48px;width:320px;height:240px;border:1px solid var(--line);border-radius:14px;background:rgba(0,0,0,.82);backdrop-filter:blur(22px);overflow:hidden;display:none;z-index:95;}
.note.on{display:flex;flex-direction:column;}
.note textarea{flex:1;background:#000;border:0;color:#fff;padding:10px;resize:none;outline:none;}
.hiddenChrome .topbar,.hiddenChrome .bottombar,.hiddenChrome .panel,.hiddenChrome .note{display:none!important;}
</style>
</head>
<body>
<div class="playerWrap">
<div class="screenShell" id="screenShell">
<div class="playerMedia">
<iframe id="player" src="https://www.youtube-nocookie.com/embed/w6dj0_OS4kE?autoplay=1&controls=1&rel=0&modestbranding=1&playsinline=1" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
</div>
<div class="fx"></div>
</div>
</div>

<div class="topbar">
<div class="group">
<div class="brand">SHELL8 // KDTV1</div>
<div class="lights">
<div class="light"></div><div class="light"></div><div class="light"></div><div class="light"></div><div class="light"></div><div class="light"></div>
</div>
</div>
<div class="group">
<button class="btn" id="fullscreenBtn">fullscreen</button>
<button class="btn" id="invertBtn">invert</button>
<button class="btn" id="nullBtn">null</button>
<button class="btn" id="panelBtn">panel</button>
<button class="btn" id="noteBtn">keta_note</button>
</div>
</div>

<div class="bottombar">
<div class="pill">KDTV1 IMMERSIVE DJ SET ARCHIVE</div>
<div class="pill" id="status">READY</div>
</div>

<div class="panel" id="panel">
<div class="panelHead" id="panelHead">
<div class="panelTitle">KDTV CONTROL SURFACE</div>
<button class="btn" id="closePanel">close</button>
</div>

<div class="section">
<div class="sectionLabel">Input</div>
<input id="linkInput" type="text" placeholder="youtube / playlist / id" style="width:100%;height:24px;background:#000;border:1px solid rgba(255,255,255,.10);border-radius:999px;color:#fff;padding:0 10px;font-size:10px;outline:none;">
</div>

<div class="section">
<div class="sectionLabel">Categories</div>
<div class="categoryRow" id="categories"></div>
</div>

<div class="section">
<div class="sectionLabel">Archive</div>
<div id="cards"></div>
</div>

<div class="section">
<div class="sectionLabel">Effects</div>
<div class="effects">
<div class="fxRow"><span>blur</span><input type="range" min="0" max="20" step="0.1" value="0" data-var="--blur" data-unit="px"><div class="fxVal">0</div></div>
<div class="fxRow"><span>contrast</span><input type="range" min="0" max="4" step="0.01" value="1" data-var="--contrast"><div class="fxVal">1</div></div>
<div class="fxRow"><span>brightness</span><input type="range" min="0" max="3" step="0.01" value="1" data-var="--brightness"><div class="fxVal">1</div></div>
<div class="fxRow"><span>saturate</span><input type="range" min="0" max="5" step="0.01" value="1" data-var="--saturate"><div class="fxVal">1</div></div>
<div class="fxRow"><span>grayscale</span><input type="range" min="0" max="1" step="0.01" value="0" data-var="--grayscale"><div class="fxVal">0</div></div>
</div>
</div>
</div>

<div class="note" id="note">
<div class="panelHead"><div class="panelTitle">KETA_NOTE</div><button class="btn" id="closeNote">close</button></div>
<textarea placeholder="KETA_NOTE..."></textarea>
</div>

<script>
const DATA={
'DJ SETS':[
{title:'HARD TECHNO ARCHIVE',channel:'KETADATA',yt:'w6dj0_OS4kE'},
{title:'SURVEILLANCE MIX',channel:'KETADATA',yt:'ODZ8mfR7LVI'},
{title:'INDUSTRIAL NIGHTCORE',channel:'KETADATA',yt:'7XFgpeRXEpg'},
{title:'RED ROOM SESSION',channel:'KETADATA',yt:'jw-QNQdRkDo'}
],
'FILMS':[],
'RESEARCH':[],
'ARCHIVE':[]
};

const player=document.getElementById('player');
const panel=document.getElementById('panel');
const note=document.getElementById('note');
const status=document.getElementById('status');
const categories=document.getElementById('categories');
const cards=document.getElementById('cards');
const screenShell=document.getElementById('screenShell');
const linkInput=document.getElementById('linkInput');

let currentCategory='DJ SETS';

function setStatus(v){status.textContent=v.toUpperCase();}

function renderCategories(){
categories.innerHTML='';
Object.keys(DATA).forEach(cat=>{
const btn=document.createElement('button');
btn.className='categoryBtn';
if(cat===currentCategory) btn.classList.add('active');
btn.textContent=cat;
btn.onclick=()=>{currentCategory=cat;renderCategories();renderCards();};
categories.appendChild(btn);
});
}

function renderCards(){
cards.innerHTML='';
const items=DATA[currentCategory]||[];
if(!items.length){cards.innerHTML='<div class="cardMeta">EMPTY CATEGORY</div>';return;}
items.forEach(item=>{
const card=document.createElement('div');
card.className='card';
card.innerHTML=`<div class="cardTitle">${item.title}</div><div class="cardMeta">${item.channel}</div>`;
card.onclick=()=>{
player.src=`https://www.youtube-nocookie.com/embed/${item.yt}?autoplay=1&controls=1&rel=0&modestbranding=1&playsinline=1`;
setStatus(item.title);
};
cards.appendChild(card);
});
}

renderCategories();
renderCards();

document.querySelectorAll('.fxRow input').forEach(slider=>{
slider.addEventListener('input',()=>{
document.documentElement.style.setProperty(slider.dataset.var,slider.value+(slider.dataset.unit||''));
slider.parentElement.querySelector('.fxVal').textContent=slider.value;
});
});

document.querySelectorAll('.light').forEach((light,i)=>{
light.onclick=()=>{
document.querySelectorAll('.light').forEach(l=>l.classList.remove('active'));
for(let x=0;x<=i;x++) document.querySelectorAll('.light')[x].classList.add('active');
};
});

document.getElementById('fullscreenBtn').onclick=()=>{
screenShell.classList.toggle('surfaceFullscreen');
};

document.getElementById('invertBtn').onclick=()=>{
document.body.classList.toggle('globalInvert');
};

document.getElementById('nullBtn').onclick=()=>{
document.body.classList.toggle('hiddenChrome');
};

document.getElementById('panelBtn').onclick=()=>{
panel.classList.toggle('hidden');
};

document.getElementById('noteBtn').onclick=()=>{
note.classList.toggle('on');
};

document.getElementById('closePanel').onclick=()=>{
panel.classList.add('hidden');
};

document.getElementById('closeNote').onclick=()=>{
note.classList.remove('on');
};

linkInput.addEventListener('keydown',e=>{
if(e.key!=='Enter') return;
const val=linkInput.value.trim();
if(!val) return;
if(val.includes('list=')){
const listId=val.split('list=')[1].split('&')[0];
player.src=`https://www.youtube-nocookie.com/embed/videoseries?list=${listId}&autoplay=1&controls=1&rel=0&modestbranding=1&playsinline=1`;
setStatus('PLAYLIST');
return;
}
const reg=/((youtu\.be\/)|(v=)|(embed\/))([a-zA-Z0-9_-]{11})/;
const match=val.match(reg);
const id=match?match[5]:val;
player.src=`https://www.youtube-nocookie.com/embed/${id}?autoplay=1&controls=1&rel=0&modestbranding=1&playsinline=1`;
setStatus('LOADED');
});

const dragHandle=document.getElementById('panelHead');
let drag=false,offsetX=0,offsetY=0;

dragHandle.addEventListener('mousedown',e=>{
drag=true;
offsetX=e.clientX-panel.offsetLeft;
offsetY=e.clientY-panel.offsetTop;
panel.classList.add('dragging');
});

window.addEventListener('mousemove',e=>{
if(!drag) return;
panel.style.left=(e.clientX-offsetX)+'px';
panel.style.top=(e.clientY-offsetY)+'px';
});

window.addEventListener('mouseup',()=>{
drag=false;
panel.classList.remove('dragging');
});

window.addEventListener('keydown',e=>{
if(e.shiftKey&&e.key.toLowerCase()==='i') document.body.classList.toggle('globalInvert');
if(e.shiftKey&&e.key.toLowerCase()==='n') document.body.classList.toggle('hiddenChrome');
if(e.key.toLowerCase()==='n'&&!e.shiftKey) panel.classList.toggle('hidden');
});
</script>
</body>
</html>
