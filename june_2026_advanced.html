<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KETADATA // JUNE 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
:root{--line:#1e1e1e;--cell:128px;--gap:6px}
.topbar{height:38px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0}
.topbar-l{display:flex;align-items:center;gap:16px}
.brand{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.36)}
.brand strong{color:#fff}
.mlabel{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.28)}
.act-btn{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35);background:#000;border:1px solid var(--line);padding:3px 9px;cursor:pointer}
.act-btn:hover{color:#fff;border-color:rgba(255,255,255,.32)}
.page{height:100%;display:flex;flex-direction:column}
.wrap{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:24px}
.cal{width:calc(var(--cell)*7 + var(--gap)*6);display:grid;grid-template-columns:repeat(7,var(--cell));grid-auto-rows:var(--cell);gap:var(--gap)}

.cell{border:1px solid var(--line);display:flex;flex-direction:column;position:relative;transition:border-color .12s;overflow:hidden}
.cell.pad{opacity:.10;pointer-events:none}
.cell.today{border-color:rgba(255,255,255,.28)}
.cell.today .dn{color:#fff;font-weight:700}
.cell.focused{border-color:rgba(255,255,255,.5)!important}

/* header strip */
.cell-head{padding:7px 8px 4px;display:flex;justify-content:space-between;align-items:baseline;flex-shrink:0}
.dn{font-size:11px;color:rgba(255,255,255,.42)}
.dw{font-size:8px;letter-spacing:.14em;color:rgba(255,255,255,.18)}

/* surface blocks — stacked rectangles */
.sblocks{display:flex;flex-direction:column;gap:2px;padding:0 5px 5px;flex:1;justify-content:flex-end}
.sblock{
  display:flex;align-items:center;
  padding:4px 7px;
  font-size:8px;letter-spacing:.12em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  color:rgba(255,255,255,.25);
  cursor:default;
  transition:background .1s,color .1s,border-color .1s;
  user-select:none;
}
.sblock.has{
  border-color:rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.65);
  cursor:pointer;
}
.sblock.has:hover{
  background:rgba(255,255,255,.10);
  color:#fff;
  border-color:rgba(255,255,255,.28);
}
.sblock-dot{width:3px;height:3px;border-radius:50%;background:currentColor;margin-right:6px;flex-shrink:0;opacity:.6}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="topbar-l">
      <div class="brand"><strong>KETADATA</strong></div>
      <div class="mlabel">JUNE · 2026</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="act-btn" onclick="window.location.href='may_2026.html'">← MAY</button>
    </div>
  </div>
  <div class="wrap"><div class="cal" id="cal"></div></div>
</div>

<script>
const TODAY = 3;

const SURFACES = {
  1: { brief:'06_01_26.html', markets:'markets_06_01.html', astro:'astro_06_01.html' },
  2: { brief:'06_02_26.html', markets:'markets_06_02.html', astro:'astro_06_02.html' },
  3: { brief:'06_03_26.html', markets:'markets_06_03.html', astro:'astro_06_03.html' },
};

const DAYS_DATA = [
  [1,'MON'],[2,'TUE'],[3,'WED'],[4,'THU'],[5,'FRI'],[6,'SAT'],[7,'SUN'],
  [8,'MON'],[9,'TUE'],[10,'WED'],[11,'THU'],[12,'FRI'],[13,'SAT'],[14,'SUN'],
  [15,'MON'],[16,'TUE'],[17,'WED'],[18,'THU'],[19,'FRI'],[20,'SAT'],[21,'SUN'],
  [22,'MON'],[23,'TUE'],[24,'WED'],[25,'THU'],[26,'FRI'],[27,'SAT'],[28,'SUN'],
  [29,'MON'],[30,'TUE'],
];

const DEFS = [
  { key:'brief',   label:'OVERVIEW' },
  { key:'markets', label:'MARKETS'  },
  { key:'astro',   label:'ASTRO'    },
];

const cal = document.getElementById('cal');

function addPad(){ const c=document.createElement('div');c.className='cell pad';cal.appendChild(c); }
addPad(); // June 1 = Monday, 1 pad for Sunday

DAYS_DATA.forEach(([d, dw])=>{
  const s = SURFACES[d] || {};
  const c = document.createElement('div');
  c.className = 'cell' + (d===TODAY?' today':'');
  c.dataset.d = d;

  const head = document.createElement('div');
  head.className = 'cell-head';
  head.innerHTML = `<span class="dn">${d}</span><span class="dw">${dw}</span>`;
  c.appendChild(head);

  const blocks = document.createElement('div');
  blocks.className = 'sblocks';

  DEFS.forEach(({key, label})=>{
    const url = s[key];
    const b = document.createElement('div');
    b.className = 'sblock' + (url ? ' has' : '');
    b.innerHTML = `<span class="sblock-dot"></span>${label}`;
    if(url) b.addEventListener('click', e=>{ e.stopPropagation(); window.location.href=url; });
    blocks.appendChild(b);
  });

  c.appendChild(blocks);
  cal.appendChild(c);
});

let focusedDay = TODAY;
function setFocus(d){
  if(d<1||d>30) return;
  cal.querySelectorAll('.cell.focused').forEach(c=>c.classList.remove('focused'));
  const cell = cal.querySelector(`[data-d="${d}"]`);
  if(cell){ cell.classList.add('focused'); focusedDay=d; }
}
document.addEventListener('keydown', e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
  const s = SURFACES[focusedDay]||{};
  switch(e.key){
    case 'ArrowRight': e.preventDefault(); setFocus(focusedDay+1); break;
    case 'ArrowLeft':  e.preventDefault(); setFocus(focusedDay-1); break;
    case 'ArrowDown':  e.preventDefault(); setFocus(focusedDay+7); break;
    case 'ArrowUp':    e.preventDefault(); setFocus(focusedDay-7); break;
    case 'Enter': if(s.brief) window.location.href=s.brief; break;
    case 'b': case 'B': if(s.brief)   window.location.href=s.brief;   break;
    case 'm': case 'M': if(s.markets) window.location.href=s.markets; break;
    case 'a': case 'A': if(s.astro)   window.location.href=s.astro;   break;
  }
});

setFocus(TODAY);
</script>
</body>
</html>
