<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KETADATA // KDTV1</title>
  <style>
    :root {
      --bg:#000; --line:rgba(255,255,255,.10); --line2:rgba(255,255,255,.22);
      --text:rgba(255,255,255,.86); --muted:rgba(255,255,255,.44); --muted2:rgba(255,255,255,.28);
      --panel:rgba(0,0,0,.70); --topH:32px; --botH:26px;
      --gridCols:3; --gridGap:10px; --tileMinH:220px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#000;color:var(--text);font-family:Arial,Helvetica,sans-serif;overflow:hidden}

    /* ── THIN PILL BARS ── */
    .bar{
      position:fixed;left:12px;right:12px;z-index:100;
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      padding:0 10px;height:var(--topH);
      border:1px solid var(--line);border-radius:999px;
      background:var(--panel);backdrop-filter:blur(16px);
    }
    .topbar{top:10px;}
    .bottombar{bottom:10px;height:var(--botH);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);}
    .group{display:flex;align-items:center;gap:6px;flex-shrink:0;}

    .brand{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.80);user-select:none;white-space:nowrap;}
    .slash{opacity:.4;font-weight:400;}

    .btn{
      cursor:pointer;user-select:none;font-family:inherit;
      border:1px solid var(--line);border-radius:999px;
      background:rgba(255,255,255,.02);color:var(--muted);
      height:20px;padding:0 9px;
      font-size:9px;letter-spacing:.14em;text-transform:uppercase;
      transition:border-color .12s,color .12s,background .12s;
      white-space:nowrap;
    }
    .btn:hover{border-color:var(--line2);color:var(--text);}
    .btn.on{border-color:rgba(255,255,255,.30);color:var(--text);background:rgba(255,255,255,.04);}
    .btn.red{border-color:rgba(255,42,42,.40);color:rgba(255,180,180,.70);}
    .btn.red:hover{border-color:rgba(255,42,42,.75);color:#fff;}

    .pill{
      border:1px solid var(--line);border-radius:999px;
      background:rgba(255,255,255,.015);color:var(--muted2);
      height:20px;padding:0 9px;
      font-size:9px;letter-spacing:.12em;text-transform:uppercase;
      user-select:none;white-space:nowrap;display:flex;align-items:center;
    }

    .lights{display:flex;gap:4px;align-items:center;}
    .ldot{
      width:9px;height:9px;border-radius:999px;
      border:1px solid var(--line);background:rgba(255,255,255,.04);cursor:pointer;
      transition:background .12s,box-shadow .12s;
    }
    .ldot.on{background:rgba(255,255,255,.88);box-shadow:0 0 8px rgba(255,255,255,.65);}

    /* ── HERO ── */
    #hero{
      position:fixed;
      top:calc(var(--topH) + 18px);
      bottom:calc(var(--botH) + 18px);
      left:0;right:0;
      display:flex;align-items:center;justify-content:center;padding:0 14px;
    }
    .playerShell{
      position:relative;width:min(1320px,100%);height:min(740px,100%);
      border:1px solid var(--line);border-radius:14px;
      background:#000;overflow:hidden;
      box-shadow:0 28px 90px rgba(0,0,0,.80);
    }
    .playerShell.full{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;border-radius:0!important;z-index:200;}
    .playerShell.autohide .playerHud,.playerShell.autohide .inputBar{opacity:0;pointer-events:none;transition:opacity .18s;}
    .playerShell.autohide:hover .playerHud,.playerShell.autohide:hover .inputBar{opacity:1;pointer-events:auto;}
    .playerShell.forceshow .playerHud,.playerShell.forceshow .inputBar{opacity:1!important;pointer-events:auto!important;}

    .playerMedia{position:absolute;inset:0;}
    iframe,video{width:100%;height:100%;border:0;background:#000;display:block;}
    .vignette{position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(circle at center,transparent 40%,rgba(0,0,0,.70));}

    .playerHud{
      position:absolute;top:12px;left:12px;right:12px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .hudBrand{
      display:flex;align-items:center;gap:8px;
      padding:5px 10px;border:1px solid rgba(255,255,255,.12);border-radius:999px;
      background:rgba(0,0,0,.50);backdrop-filter:blur(10px);
      font-size:9px;letter-spacing:.20em;text-transform:uppercase;color:var(--muted);user-select:none;
    }
    .hudBrand strong{color:rgba(255,255,255,.85);letter-spacing:.24em;}
    .hudRight{display:flex;gap:6px;align-items:center;}

    .inputBar{
      position:absolute;bottom:12px;left:12px;right:12px;
      display:flex;gap:8px;align-items:center;
    }
    .inputWrap{
      flex:1;display:flex;align-items:center;gap:8px;
      padding:6px 12px;border:1px solid rgba(255,255,255,.14);border-radius:999px;
      background:rgba(0,0,0,.55);backdrop-filter:blur(10px);min-width:0;
    }
    .inputWrap .hint{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);white-space:nowrap;}
    .inputWrap input{flex:1;border:0;outline:0;background:transparent;color:var(--text);font-size:11px;min-width:0;}

    /* ── FX DRAWER (inside player) ── */
    #fxDrawer{
      position:absolute;bottom:54px;left:12px;right:12px;
      border:1px solid var(--line);border-radius:12px;
      background:rgba(0,0,0,.62);backdrop-filter:blur(12px);
      display:none;
    }
    #fxDrawer.on{display:block;}
    .dHead{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.06);}
    .dLabel{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
    .dBody{padding:8px 10px;display:grid;gap:5px;}
    .fxRow{display:grid;grid-template-columns:72px 1fr 38px;gap:8px;align-items:center;}
    .fxRow span{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
    .fxRow input[type="range"]{width:100%;accent-color:rgba(255,255,255,.8);}
    .fxVal{font-size:9px;color:rgba(255,255,255,.65);text-align:right;}
    .presetRow{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}

    /* ── CONTROLLER PANEL ── */
    #ctlPanel{
      position:fixed;left:12px;top:52px;
      width:274px;max-height:calc(100vh - 96px);
      border:1px solid var(--line);border-radius:14px;
      background:rgba(0,0,0,.82);backdrop-filter:blur(18px);
      z-index:90;overflow:hidden;display:none;flex-direction:column;
      box-shadow:0 18px 70px rgba(0,0,0,.65);
    }
    #ctlPanel.on{display:flex;}
    .pHead{
      display:flex;align-items:center;justify-content:space-between;
      padding:7px 10px;background:rgba(0,0,0,.90);
      border-bottom:1px solid rgba(255,255,255,.06);cursor:move;flex-shrink:0;
    }
    .pTitle{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
    .pBody{overflow:auto;flex:1;}
    .sect{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.05);}
    .sLabel{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;}
    .iRow{display:flex;gap:6px;}
    .iRow input,.pSearch{
      flex:1;height:22px;padding:0 9px;
      background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:999px;
      color:var(--text);font-size:9px;outline:none;font-family:inherit;
    }
    .catRow{display:flex;gap:4px;flex-wrap:wrap;}
    .catBtn{
      cursor:pointer;padding:3px 8px;border:1px solid var(--line);border-radius:999px;
      background:transparent;font-size:8px;letter-spacing:.12em;text-transform:uppercase;
      color:var(--muted);font-family:inherit;
    }
    .catBtn.on{border-color:var(--line2);color:var(--text);}
    .cardList{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow:auto;}
    .pCard{
      padding:6px 8px;border:1px solid var(--line);border-radius:8px;
      background:rgba(255,255,255,.02);cursor:pointer;
      transition:border-color .12s,background .12s;
    }
    .pCard:hover{border-color:var(--line2);background:rgba(255,255,255,.04);}
    .pCardTitle{font-size:10px;color:rgba(255,255,255,.82);margin-bottom:2px;}
    .pCardMeta{font-size:8px;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);}
    .pFxRow{display:grid;grid-template-columns:64px 1fr 30px;gap:6px;align-items:center;}
    .pFxRow span{font-size:8px;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);}
    .pFxRow input[type="range"]{width:100%;}
    .pFxVal{font-size:8px;color:rgba(255,255,255,.55);text-align:right;}

    /* ── COLLECTION VIEW ── */
    #collView{
      position:fixed;top:calc(var(--topH)+18px);bottom:calc(var(--botH)+18px);
      left:0;right:0;overflow-y:auto;padding:14px 16px;display:none;
    }
    #collView.on{display:block;}
    .collSearch{
      width:100%;max-width:400px;height:28px;padding:0 14px;
      background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:999px;
      color:var(--text);font-size:10px;outline:none;display:block;margin-bottom:10px;
    }
    .collGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    @media(max-width:900px){.collGrid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:580px){.collGrid{grid-template-columns:1fr;}}
    .cCard{
      border:1px solid var(--line);border-radius:12px;
      background:rgba(255,255,255,.02);cursor:pointer;overflow:hidden;
      transition:border-color .12s,transform .12s;
    }
    .cCard:hover{border-color:var(--line2);transform:translateY(-1px);}
    .cThumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;filter:grayscale(15%) brightness(.9);}
    .cInfo{padding:8px 10px;}
    .cTitle{font-size:11px;color:rgba(255,255,255,.82);margin-bottom:3px;}
    .cMeta{font-size:8px;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);}

    /* ── MULTI MODE ── */
    #multi{position:fixed;inset:0;background:#000;z-index:60;flex-direction:column;display:none;}
    #multi.on{display:flex;}
    .mTop{
      padding:7px 12px;border-bottom:1px solid var(--line);
      background:rgba(0,0,0,.80);backdrop-filter:blur(12px);
      display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;flex-shrink:0;
    }
    .mLeft,.mRight{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
    .sWrap{
      display:flex;align-items:center;gap:6px;
      border:1px solid var(--line);border-radius:999px;padding:3px 8px;
      font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
    }
    .sWrap input[type="range"]{width:72px;}
    .mStage{flex:1;overflow:auto;padding:10px 12px 14px;}
    .survGrid{
      display:grid;
      grid-template-columns:repeat(var(--gridCols),1fr);
      gap:var(--gridGap);
    }
    .tile{
      border:1px solid var(--line);border-radius:12px;
      background:rgba(255,255,255,.02);overflow:hidden;
      position:relative;min-height:var(--tileMinH);cursor:pointer;
      transition:border-color .12s;
    }
    .tile:hover{border-color:var(--line2);}
    .tMedia{position:absolute;inset:0;}
    .tHud{
      position:absolute;top:8px;left:8px;right:8px;
      display:flex;justify-content:space-between;align-items:center;pointer-events:none;
    }
    .tMini{
      pointer-events:auto;
      padding:3px 7px;border:1px solid var(--line);border-radius:999px;
      background:rgba(0,0,0,.50);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
    }

    /* ── KETA NOTE ── */
    #ketaNote{
      position:fixed;right:12px;bottom:46px;
      width:290px;height:210px;
      border:1px solid var(--line);border-radius:14px;
      background:rgba(0,0,0,.82);backdrop-filter:blur(14px);
      z-index:95;display:none;flex-direction:column;overflow:hidden;
    }
    #ketaNote.on{display:flex;}
    #ketaNote .pHead{cursor:default;}
    #ketaNote textarea{
      flex:1;background:#000;border:0;color:var(--text);
      padding:8px 10px;resize:none;outline:none;
      font-family:inherit;font-size:11px;line-height:1.4;
    }

    /* null mode */
    .null .topbar,.null .bottombar,.null #ctlPanel,.null #ketaNote{display:none!important;}
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar bar">
  <div class="group">
    <div class="brand">KETADATA <span class="slash">//</span> KDTV1</div>
    <div class="lights" id="lights">
      <div class="ldot" data-i="0"></div><div class="ldot" data-i="1"></div>
      <div class="ldot" data-i="2"></div><div class="ldot" data-i="3"></div>
      <div class="ldot" data-i="4"></div><div class="ldot" data-i="5"></div>
    </div>
  </div>
  <div class="group">
    <button class="btn" id="btnPanel">panel</button>
    <button class="btn" id="btnFx">effects</button>
    <button class="btn" id="btnColl">browse</button>
    <button class="btn red" id="btnMulti">multi</button>
    <button class="btn" id="btnInvert">invert</button>
    <button class="btn red" id="btnNull">null</button>
    <button class="btn" id="btnNote">note</button>
  </div>
  <div class="group">
    <button class="btn" id="btnExport">export</button>
    <button class="btn" id="btnImport">import</button>
    <div class="pill" id="statusPill">READY</div>
  </div>
</div>

<!-- HERO PLAYER -->
<div id="hero">
  <div class="playerShell autohide" id="playerShell">
    <div class="playerMedia" id="playerMedia"></div>
    <div class="vignette"></div>

    <div class="playerHud">
      <div class="hudBrand"><strong>KDTV</strong> <span class="slash">//</span> CINEMA</div>
      <div class="hudRight">
        <button class="btn" id="btnHudFx">effects</button>
        <button class="btn red" id="btnHudMulti">multi</button>
        <button class="btn" id="btnHudPanel">panel</button>
        <button class="btn" id="btnFull">full</button>
      </div>
    </div>

    <div id="fxDrawer">
      <div class="dHead">
        <div class="dLabel">KETADATA EFFECTS</div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="presetRow" id="fxPresets"></div>
          <button class="btn" id="btnFxToggle">collapse</button>
        </div>
      </div>
      <div class="dBody" id="fxSliders"></div>
    </div>

    <div class="inputBar">
      <div class="inputWrap">
        <span class="hint">yt url / id</span>
        <input id="ytInput" type="text" placeholder="paste link or id then Enter">
      </div>
      <button class="btn" id="btnLoad">load</button>
      <button class="btn" id="btnList">playlist</button>
      <button class="btn" id="btnPrev">prev</button>
      <button class="btn" id="btnNext">next</button>
      <div class="pill" id="modePill">YT</div>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar bar">
  <div class="group">
    <div class="pill" id="queuePill">—</div>
  </div>
  <div>SHIFT+I INVERT · SHIFT+N NULL · SHIFT+M MULTI · SHIFT+P PLAYLIST · 1–6 LIGHTS</div>
  <div class="group">
    <button class="btn" id="btnControls">controls</button>
  </div>
</div>

<!-- CONTROLLER PANEL -->
<div id="ctlPanel">
  <div class="pHead" id="pHead">
    <div class="pTitle">KDTV CONTROL SURFACE</div>
    <button class="btn" id="btnClosePanel">×</button>
  </div>
  <div class="pBody">
    <div class="sect">
      <div class="sLabel">Load</div>
      <div class="iRow">
        <input id="pInput" type="text" placeholder="youtube url / id">
        <button class="btn" id="pLoad">go</button>
      </div>
    </div>
    <div class="sect">
      <div class="sLabel">Categories</div>
      <div class="catRow" id="pCats"></div>
    </div>
    <div class="sect">
      <div class="sLabel">Archive</div>
      <input class="pSearch" id="pSearch" type="text" placeholder="search…">
      <div class="cardList" id="pCards"></div>
    </div>
    <div class="sect">
      <div class="sLabel">Effects</div>
      <div id="pFxSliders" style="display:grid;gap:5px;"></div>
      <div class="presetRow" style="margin-top:6px;" id="pFxPresets"></div>
    </div>
  </div>
</div>

<!-- COLLECTION BROWSE VIEW -->
<div id="collView">
  <input class="collSearch" id="collSearch" type="text" placeholder="search archive…">
  <div class="collGrid" id="collGrid"></div>
</div>

<!-- MULTI MODE -->
<div id="multi">
  <div class="mTop">
    <div class="mLeft">
      <div class="brand" style="font-size:10px">KDTV <span class="slash">//</span> MULTI</div>
      <div class="sWrap">cols <input id="mCols" type="range" min="1" max="6" value="3"> <span id="mColsV">3</span></div>
      <div class="sWrap">gap <input id="mGap" type="range" min="4" max="22" value="10"> <span id="mGapV">10</span></div>
      <div class="sWrap">h <input id="mMinh" type="range" min="140" max="400" value="220"> <span id="mMinhV">220</span></div>
    </div>
    <div class="mRight">
      <button class="btn" id="btnAddTile">add</button>
      <button class="btn" id="btnClearTiles">clear</button>
      <button class="btn red" id="btnCloseMulti">close</button>
    </div>
  </div>
  <div class="mStage"><div class="survGrid" id="survGrid"></div></div>
</div>

<!-- KETA NOTE -->
<div id="ketaNote">
  <div class="pHead">
    <div class="pTitle">KETA_NOTE</div>
    <button class="btn" id="btnCloseNote">×</button>
  </div>
  <textarea id="noteText" placeholder="KETA_NOTE…"></textarea>
</div>

<script>
"use strict";

// ── ARCHIVE (10 sets) ──
const ARCHIVE = [
  { id:"s1",  title:"Set #001", ch:"Archive", cat:"DJ Sets", yt:"w6dj0_OS4kE" },
  { id:"s2",  title:"Set #002", ch:"Archive", cat:"DJ Sets", yt:"7XFgpeRXEpg" },
  { id:"s3",  title:"Set #003", ch:"Archive", cat:"DJ Sets", yt:"ODZ8mfR7LVI" },
  { id:"s4",  title:"Set #004", ch:"Archive", cat:"DJ Sets", yt:"jw-QNQdRkDo" },
  { id:"s5",  title:"Set #005", ch:"Archive", cat:"DJ Sets", yt:"pbOHGkYcO5I" },
  { id:"s6",  title:"Set #006", ch:"Archive", cat:"DJ Sets", yt:"WQccuRd8vMM" },
  { id:"s7",  title:"Set #007", ch:"Archive", cat:"DJ Sets", yt:"rlwRRgZcVCA" },
  { id:"s8",  title:"Set #008", ch:"Archive", cat:"DJ Sets", yt:"JP1KwzSRVm4" },
  { id:"s9",  title:"Set #009", ch:"Archive", cat:"DJ Sets", yt:"mfUnzLi4u6o" },
  { id:"s10", title:"Set #010", ch:"Archive", cat:"DJ Sets", yt:"GzaALzxIyxM" },
];

// ── UTILS ──
const $ = id => document.getElementById(id);
function setStatus(v){ $("statusPill").textContent = v.toUpperCase(); }
function setVar(n,v){ document.documentElement.style.setProperty(n,v); }

function parseYTId(s){
  s = (s||"").trim();
  if(/^[a-zA-Z0-9_-]{8,15}$/.test(s) && !s.includes("http")) return s;
  try{
    const u = new URL(s);
    if(u.searchParams.get("v")) return u.searchParams.get("v");
    const parts = u.pathname.split("/").filter(Boolean);
    if(u.hostname.includes("youtu.be") && parts[0]) return parts[0];
    if(parts.indexOf("embed") >= 0) return parts[parts.indexOf("embed")+1]||null;
  }catch(e){}
  return null;
}
function parseYTList(text){
  return [...new Set(
    String(text||"").split(/\n|,|\s+/).map(x=>x.trim()).filter(Boolean)
      .map(parseYTId).filter(Boolean)
  )];
}
function ytSrc(id,autoplay){ return `https://www.youtube-nocookie.com/embed/${id}?rel=0&modestbranding=1&controls=1${autoplay?"&autoplay=1":""}`; }
function thumbUrl(id){ return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`; }
function escHtml(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// ── STATE ──
let state = {
  light: -1,      // -1 = none, 0-5 = dots
  invert: false,
  nullMode: false,
  noteOpen: false,
  panelOpen: false,
  collOpen: false,
  panelCat: "DJ Sets",
  panelQ: "",
  hero: { ytId: ARCHIVE[0].yt, mode:"yt" },
  fx: defaultFx(),
  playlist: { items:[], idx:0, active:false },
  multi: { cols:3, gap:10, minh:220, tiles:[] },
  ketaNote: ""
};

function defaultFx(){
  return { brightness:1, contrast:1, saturate:1, hue:0, blur:0, grayscale:0, invert:0, sepia:0 };
}
function fxFilter(fx){
  return `brightness(${fx.brightness}) contrast(${fx.contrast}) saturate(${fx.saturate}) hue-rotate(${fx.hue}deg) blur(${fx.blur}px) grayscale(${fx.grayscale}%) invert(${fx.invert}%) sepia(${fx.sepia}%)`;
}
const FX_PRESETS = {
  clean:       {brightness:1.00, contrast:1.00, saturate:1.00, hue:0,   blur:0,   grayscale:0,  invert:0,  sepia:0},
  infra:       {brightness:1.06, contrast:1.28, saturate:1.45, hue:18,  blur:0,   grayscale:0,  invert:0,  sepia:0},
  xray:        {brightness:1.12, contrast:1.55, saturate:0.10, hue:-30, blur:0.2, grayscale:40, invert:18, sepia:0},
  surveillance:{brightness:0.92, contrast:1.42, saturate:0.70, hue:-10, blur:0,   grayscale:22, invert:0,  sepia:8},
  null:        {brightness:1.00, contrast:1.00, saturate:0.00, hue:0,   blur:0,   grayscale:100,invert:0,  sepia:0},
};
const FX_DEFS = [
  ["brightness","brightness",0.6,1.6,0.01],
  ["contrast","contrast",0.6,2.0,0.01],
  ["saturate","saturate",0,2.5,0.01],
  ["hue","hue",-180,180,1],
  ["blur","blur",0,10,0.1],
  ["grayscale","grayscale",0,100,1],
  ["invert","invert",0,100,1],
  ["sepia","sepia",0,100,1],
];

function applyFx(){
  const f = fxFilter(state.fx);
  $("playerMedia").style.filter = f;
}
function applyFxPreset(name){
  state.fx = {...FX_PRESETS[name]};
  applyFx();
  buildFxSliders();
  buildPanelFxSliders();
}

// ── SLIDER BUILDERS ──
function buildFxSliders(){
  const cont = $("fxSliders");
  cont.innerHTML = "";
  FX_DEFS.forEach(([label,key,min,max,step])=>{
    const row = document.createElement("div"); row.className = "fxRow";
    const sp = document.createElement("span"); sp.textContent = label;
    const inp = document.createElement("input"); inp.type="range"; inp.min=min; inp.max=max; inp.step=step; inp.value=state.fx[key];
    const val = document.createElement("div"); val.className="fxVal"; val.textContent=state.fx[key];
    inp.addEventListener("input",()=>{ state.fx[key]=Number(inp.value); val.textContent=inp.value; applyFx(); buildPanelFxSliders(); });
    row.append(sp,inp,val); cont.appendChild(row);
  });
  // presets
  const pr = $("fxPresets"); pr.innerHTML="";
  Object.keys(FX_PRESETS).forEach(p=>{
    const b=document.createElement("button"); b.className="btn"; b.textContent=p;
    b.addEventListener("click",()=>applyFxPreset(p)); pr.appendChild(b);
  });
}
function buildPanelFxSliders(){
  const cont = $("pFxSliders"); cont.innerHTML="";
  FX_DEFS.forEach(([label,key,min,max,step])=>{
    const row=document.createElement("div"); row.className="pFxRow";
    const sp=document.createElement("span"); sp.textContent=label;
    const inp=document.createElement("input"); inp.type="range"; inp.min=min; inp.max=max; inp.step=step; inp.value=state.fx[key];
    const val=document.createElement("div"); val.className="pFxVal"; val.textContent=state.fx[key];
    inp.addEventListener("input",()=>{ state.fx[key]=Number(inp.value); val.textContent=inp.value; applyFx(); });
    row.append(sp,inp,val); cont.appendChild(row);
  });
  const pr=$("pFxPresets"); pr.innerHTML="";
  Object.keys(FX_PRESETS).forEach(p=>{
    const b=document.createElement("button"); b.className="btn"; b.style.fontSize="8px";
    b.textContent=p; b.addEventListener("click",()=>applyFxPreset(p)); pr.appendChild(b);
  });
}

// ── HERO PLAYER ──
function loadHero({autoplay=false}={}){
  const m = $("playerMedia"); m.innerHTML="";
  if(state.hero.mode==="local" && state.hero.localUrl){
    const v=document.createElement("video"); v.src=state.hero.localUrl; v.controls=true; v.playsInline=true; v.autoplay=!!autoplay;
    m.appendChild(v); $("modePill").textContent="LOCAL";
  } else {
    const ifr=document.createElement("iframe");
    ifr.src=ytSrc(state.hero.ytId, autoplay);
    ifr.allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
    ifr.allowFullscreen=true;
    m.appendChild(ifr);
    $("modePill").textContent = state.playlist.active ? `YT ${state.playlist.idx+1}/${state.playlist.items.length}` : "YT";
  }
  applyFx();
  updateQueuePill();
}
function updateQueuePill(){
  $("queuePill").textContent = state.playlist.active
    ? `QUEUE ${state.playlist.idx+1} / ${state.playlist.items.length}`
    : (state.hero.mode==="local" ? "LOCAL FILE" : `YT: ${state.hero.ytId}`);
}

function loadFromInput(raw){
  const id = parseYTId(raw);
  if(!id){setStatus("INVALID URL");return;}
  state.playlist.active=false; state.playlist.items=[]; state.playlist.idx=0;
  state.hero.ytId=id; state.hero.mode="yt"; state.hero.localUrl=null;
  loadHero({autoplay:true}); setStatus("LOADED "+id.slice(0,8)+"…");
}
function loadPlaylistPrompt(){
  const txt=prompt("PASTE YOUTUBE LINKS / IDs (any separator)","");
  if(txt===null)return;
  const ids=parseYTList(txt);
  if(!ids.length){alert("No valid YouTube IDs found.");return;}
  state.playlist.items=ids; state.playlist.idx=0; state.playlist.active=true;
  state.hero.ytId=ids[0]; state.hero.mode="yt"; state.hero.localUrl=null;
  loadHero({autoplay:true}); setStatus("PLAYLIST "+ids.length+" ITEMS");
}
function playlistStep(dir){
  if(!state.playlist.active||!state.playlist.items.length)return;
  state.playlist.idx=(state.playlist.idx+dir+state.playlist.items.length)%state.playlist.items.length;
  state.hero.ytId=state.playlist.items[state.playlist.idx];
  state.hero.mode="yt"; state.hero.localUrl=null;
  loadHero({autoplay:true}); setStatus("QUEUE "+(state.playlist.idx+1));
}

// ── LIGHTS ──
function setLight(i){
  state.light=i;
  document.querySelectorAll(".ldot").forEach((d,idx)=>d.classList.toggle("on",idx<=i));
}
document.querySelectorAll(".ldot").forEach(d=>{
  d.addEventListener("click",()=>{ const i=Number(d.dataset.i); setLight(state.light===i&&i===0?-1:i); });
});

// ── PANEL ──
function buildPanelCards(){
  const q=(state.panelQ||"").toLowerCase();
  const items=ARCHIVE.filter(it=>
    (state.panelCat==="All"||it.cat===state.panelCat) &&
    (!q||it.title.toLowerCase().includes(q)||it.ch.toLowerCase().includes(q))
  );
  const cont=$("pCards"); cont.innerHTML="";
  items.forEach(it=>{
    const c=document.createElement("div"); c.className="pCard";
    c.innerHTML=`<div class="pCardTitle">${escHtml(it.title)}</div><div class="pCardMeta">${escHtml(it.ch)} · ${escHtml(it.cat)}</div>`;
    c.addEventListener("click",()=>{
      state.playlist.active=false; state.playlist.items=[]; state.playlist.idx=0;
      state.hero.ytId=it.yt; state.hero.mode="yt"; state.hero.localUrl=null;
      loadHero({autoplay:true}); setStatus(it.title);
    });
    cont.appendChild(c);
  });
}
function buildPanelCats(){
  const cats=["All",...new Set(ARCHIVE.map(x=>x.cat))];
  const cont=$("pCats"); cont.innerHTML="";
  cats.forEach(c=>{
    const b=document.createElement("button"); b.className="catBtn"+(state.panelCat===c?" on":"");
    b.textContent=c; b.addEventListener("click",()=>{ state.panelCat=c; buildPanelCats(); buildPanelCards(); });
    cont.appendChild(b);
  });
}

// ── COLLECTION VIEW ──
function buildColl(q){
  const items = ARCHIVE.filter(it=>!q||it.title.toLowerCase().includes(q)||it.ch.toLowerCase().includes(q));
  const g=$("collGrid"); g.innerHTML="";
  items.forEach(it=>{
    const c=document.createElement("div"); c.className="cCard";
    c.innerHTML=`<img class="cThumb" src="${thumbUrl(it.yt)}" alt="" loading="lazy">
      <div class="cInfo"><div class="cTitle">${escHtml(it.title)}</div><div class="cMeta">${escHtml(it.ch)}</div></div>`;
    c.addEventListener("click",()=>{
      state.playlist.active=false; state.playlist.items=[]; state.playlist.idx=0;
      state.hero.ytId=it.yt; state.hero.mode="yt"; state.hero.localUrl=null;
      loadHero({autoplay:true}); setStatus(it.title);
      toggleColl(false);
    });
    g.appendChild(c);
  });
}
function toggleColl(force){
  state.collOpen = typeof force==="boolean"?force:!state.collOpen;
  $("collView").classList.toggle("on",state.collOpen);
  $("hero").style.display=state.collOpen?"none":"flex";
  $("btnColl").classList.toggle("on",state.collOpen);
  if(state.collOpen) buildColl($("collSearch").value||"");
}

// ── MULTI MODE ──
function openMulti(){ $("multi").classList.add("on"); applyMultiVars(); renderMulti(); setStatus("MULTI"); }
function closeMulti(){ $("multi").classList.remove("on"); setStatus("CINEMA"); }
function toggleMulti(){ $("multi").classList.contains("on")?closeMulti():openMulti(); }

function applyMultiVars(){
  setVar("--gridCols",state.multi.cols);
  setVar("--gridGap",state.multi.gap+"px");
  setVar("--tileMinH",state.multi.minh+"px");
  $("mCols").value=state.multi.cols; $("mColsV").textContent=state.multi.cols;
  $("mGap").value=state.multi.gap;  $("mGapV").textContent=state.multi.gap;
  $("mMinh").value=state.multi.minh;$("mMinhV").textContent=state.multi.minh;
}
function newTile(){
  const r=ARCHIVE[Math.floor(Math.random()*ARCHIVE.length)];
  return {id:"t_"+Math.random().toString(16).slice(2),mode:"yt",ytId:r.yt,localUrl:null,title:r.title};
}
function renderMulti(){
  const g=$("survGrid"); g.innerHTML="";
  if(!state.multi.tiles.length){state.multi.tiles=[newTile(),newTile(),newTile()];}
  state.multi.tiles.forEach((t,i)=>{
    const tile=document.createElement("div"); tile.className="tile";
    tile.innerHTML=`<div class="tMedia"></div>
      <div class="tHud">
        <div class="tMini">${escHtml(t.title||"module "+(i+1))}</div>
        <div class="tMini" style="cursor:pointer" data-act="load">load</div>
      </div>`;
    const ifr=document.createElement("iframe");
    ifr.src=ytSrc(t.ytId,false);
    ifr.allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
    ifr.allowFullscreen=true;
    tile.querySelector(".tMedia").appendChild(ifr);
    tile.querySelector("[data-act='load']").addEventListener("click",async(e)=>{
      e.stopPropagation();
      const raw=prompt("YouTube URL / ID:");
      if(!raw)return;
      const id=parseYTId(raw);
      if(id){t.ytId=id;t.title="YT:"+id;renderMulti();}
    });
    tile.addEventListener("dblclick",()=>{
      state.hero.ytId=t.ytId; state.hero.mode="yt"; state.hero.localUrl=null;
      state.playlist.active=false; loadHero({autoplay:true}); closeMulti();
    });
    g.appendChild(tile);
  });
}

// ── NULL / INVERT ──
function toggleNull(){
  state.nullMode=!state.nullMode;
  document.body.classList.toggle("null",state.nullMode);
  setStatus(state.nullMode?"NULL":"LIVE");
}
function toggleInvert(){
  state.invert=!state.invert;
  document.documentElement.style.filter=state.invert?"invert(1) hue-rotate(180deg)":"none";
  setStatus(state.invert?"INVERT ON":"INVERT OFF");
}

// ── FX DRAWER ──
function toggleFxDrawer(force){
  const d=$("fxDrawer"),on=typeof force==="boolean"?force:!d.classList.contains("on");
  d.classList.toggle("on",on); $("btnFxToggle").textContent=on?"collapse":"expand";
  $("btnFx").classList.toggle("on",on); $("btnHudFx").classList.toggle("on",on);
}

// ── PANEL DRAG ──
(function(){
  const panel=$("ctlPanel"),head=$("pHead");
  let drag=false,ox=0,oy=0;
  head.addEventListener("mousedown",e=>{
    if(e.target.closest("button"))return;
    drag=true;const r=panel.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;
    panel.style.right="auto"; head.setPointerCapture(e.pointerId);
  });
  head.addEventListener("pointermove",e=>{
    if(!drag)return;
    panel.style.left=Math.max(0,e.clientX-ox)+"px";
    panel.style.top=Math.max(0,e.clientY-oy)+"px";
  });
  head.addEventListener("pointerup",()=>drag=false);
  head.addEventListener("pointercancel",()=>drag=false);
})();

// ── PANEL TOGGLE ──
function togglePanel(force){
  const on=typeof force==="boolean"?force:!state.panelOpen;
  state.panelOpen=on;
  $("ctlPanel").classList.toggle("on",on);
  $("btnPanel").classList.toggle("on",on);
}

// ── EXPORT / IMPORT ──
function exportState(){
  const blob=new Blob([JSON.stringify({state},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="kdtv_state.json";a.click();URL.revokeObjectURL(a.href);
  setStatus("EXPORTED");
}
function importState(){
  const inp=document.createElement("input");inp.type="file";inp.accept="application/json";
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    try{
      const obj=JSON.parse(await f.text());
      if(obj.state){Object.assign(state,obj.state);applyFx();loadHero({autoplay:false});}
      setStatus("IMPORTED");
    }catch(e){setStatus("IMPORT FAIL");}
  };
  inp.click();
}

// ── WIRE BUTTONS ──
$("btnPanel").addEventListener("click",()=>togglePanel());
$("btnClosePanel").addEventListener("click",()=>togglePanel(false));
$("btnFx").addEventListener("click",()=>toggleFxDrawer());
$("btnHudFx").addEventListener("click",()=>toggleFxDrawer());
$("btnFxToggle").addEventListener("click",()=>toggleFxDrawer());
$("btnColl").addEventListener("click",()=>toggleColl());
$("btnMulti").addEventListener("click",toggleMulti);
$("btnHudMulti").addEventListener("click",toggleMulti);
$("btnCloseMulti").addEventListener("click",closeMulti);
$("btnInvert").addEventListener("click",toggleInvert);
$("btnNull").addEventListener("click",toggleNull);
$("btnNote").addEventListener("click",()=>{ state.noteOpen=!state.noteOpen; $("ketaNote").classList.toggle("on",state.noteOpen); });
$("btnCloseNote").addEventListener("click",()=>{ state.noteOpen=false; $("ketaNote").classList.remove("on"); });
$("noteText").addEventListener("input",()=>state.ketaNote=$("noteText").value);
$("btnExport").addEventListener("click",exportState);
$("btnImport").addEventListener("click",importState);
$("btnLoad").addEventListener("click",()=>loadFromInput($("ytInput").value));
$("ytInput").addEventListener("keydown",e=>{ if(e.key==="Enter") loadFromInput($("ytInput").value); });
$("btnList").addEventListener("click",loadPlaylistPrompt);
$("btnPrev").addEventListener("click",()=>playlistStep(-1));
$("btnNext").addEventListener("click",()=>playlistStep(1));
$("btnControls").addEventListener("click",()=>togglePanel());
$("btnHudPanel").addEventListener("click",()=>togglePanel());
$("btnFull").addEventListener("click",()=>{ $("playerShell").classList.toggle("full"); $("btnFull").classList.toggle("on"); });
$("pLoad").addEventListener("click",()=>loadFromInput($("pInput").value));
$("pInput").addEventListener("keydown",e=>{ if(e.key==="Enter") loadFromInput($("pInput").value); });
$("pSearch").addEventListener("input",()=>{ state.panelQ=$("pSearch").value; buildPanelCards(); });
$("collSearch").addEventListener("input",()=>buildColl($("collSearch").value));

$("mCols").addEventListener("input",()=>{ state.multi.cols=Number($("mCols").value);applyMultiVars(); });
$("mGap").addEventListener("input",()=>{ state.multi.gap=Number($("mGap").value);applyMultiVars(); });
$("mMinh").addEventListener("input",()=>{ state.multi.minh=Number($("mMinh").value);applyMultiVars(); });
$("btnAddTile").addEventListener("click",()=>{ state.multi.tiles.push(newTile());renderMulti(); });
$("btnClearTiles").addEventListener("click",()=>{ state.multi.tiles=[];renderMulti(); });
$("multi").addEventListener("mousedown",e=>{ if(e.target===$("multi"))closeMulti(); });

// ── KEYBOARD ──
window.addEventListener("keydown",e=>{
  const tag=(e.target&&e.target.tagName)?e.target.tagName.toLowerCase():"";
  const typing=(tag==="input"||tag==="textarea");
  if(typing&&!e.shiftKey)return;

  if(e.key==="Escape"){ if($("multi").classList.contains("on")){closeMulti();e.preventDefault();return;} return; }
  if(!e.shiftKey&&/^[1-6]$/.test(e.key)&&!typing){ setLight(Number(e.key)-1); e.preventDefault(); return; }
  if(e.shiftKey){
    const k=e.key.toLowerCase();
    if(k==="i"){toggleInvert();e.preventDefault();return;}
    if(k==="n"){toggleNull();e.preventDefault();return;}
    if(k==="m"){toggleMulti();e.preventDefault();return;}
    if(k==="p"){loadPlaylistPrompt();e.preventDefault();return;}
    if(e.key==="ArrowRight"){playlistStep(1);e.preventDefault();return;}
    if(e.key==="ArrowLeft"){playlistStep(-1);e.preventDefault();return;}
  }
});

// ── INIT ──
buildFxSliders();
buildPanelFxSliders();
buildPanelCats();
buildPanelCards();
$("noteText").value = state.ketaNote;
loadHero({autoplay:true});
setStatus("LOADED · "+ARCHIVE.length+" SETS");
</script>
