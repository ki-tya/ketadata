<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAIN BALL // OBSERVATORY</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial,Helvetica,sans-serif;
}

canvas{
    display:block;
}

/* CONTROLLER */

.controls{
    position:absolute;

    top:72px;
    right:18px;

    display:flex;
    flex-direction:column;
    gap:10px;

    padding:10px;

    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;

    background:rgba(0,0,0,0.74);

    backdrop-filter:blur(18px);

    box-shadow:
        0 0 0 1px rgba(255,255,255,0.02) inset,
        0 20px 80px rgba(0,0,0,0.55);

    z-index:10;

    cursor:move;

    user-select:none;
}

.control-group{
    display:flex;
    flex-direction:column;
    gap:6px;

    padding-bottom:8px;

    border-bottom:1px solid rgba(255,255,255,0.06);
}

.btn{
    height:24px;

    padding:0 12px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,0.02);

    border:1px solid rgba(255,255,255,0.10);
    border-radius:999px;

    color:rgba(255,255,255,0.72);

    font-size:9px;
    letter-spacing:0.18em;
    text-transform:uppercase;

    cursor:pointer;

    transition:.18s ease;
}

.btn:hover{
    border-color:rgba(255,255,255,0.22);
    background:rgba(255,255,255,0.06);
    color:#fff;
}

.btn.active{
    background:rgba(255,255,255,0.10);
    border-color:rgba(255,255,255,0.24);
    color:#fff;
}

.slider-container{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.slider-label{
    font-size:8px;
    color:rgba(255,255,255,0.42);
    letter-spacing:0.22em;
    text-transform:uppercase;
}

input[type="range"]{
    width:170px;
    height:1px;

    background:rgba(255,255,255,0.12);

    outline:none;

    -webkit-appearance:none;
}

input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;

    width:10px;
    height:10px;

    border-radius:999px;

    background:#fff;

    border:1px solid rgba(255,255,255,0.8);

    box-shadow:0 0 12px rgba(255,255,255,0.35);

    cursor:pointer;
}

/* STATUS */

.status{
    position:absolute;

    left:18px;
    bottom:18px;

    padding:6px 10px;

    border:1px solid rgba(255,255,255,0.08);
    border-radius:999px;

    background:rgba(0,0,0,0.74);

    color:rgba(255,255,255,0.38);

    font-size:8px;
    letter-spacing:0.22em;
    text-transform:uppercase;

    backdrop-filter:blur(18px);

    z-index:5;
}

/* CROSSHAIR */

.crosshair{
    position:absolute;

    left:50%;
    top:50%;

    width:120px;
    height:120px;

    transform:translate(-50%,-50%);

    pointer-events:none;

    opacity:.08;

    z-index:3;
}

.crosshair::before,
.crosshair::after{
    content:'';
    position:absolute;
    background:#fff;
}

.crosshair::before{
    left:50%;
    top:0;

    width:1px;
    height:100%;

    transform:translateX(-50%);
}

.crosshair::after{
    top:50%;
    left:0;

    width:100%;
    height:1px;

    transform:translateY(-50%);
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="crosshair"></div>

<div class="status">
    brain sphere // observatory
</div>

<div class="controls">

    <div class="control-group">

        <button class="btn active" id="autoRotate">
            auto rotate
        </button>

        <button class="btn" id="beatBump">
            beat bump
        </button>

        <button class="btn" id="waveToggle">
            waves
        </button>

        <button class="btn" id="flameToggle">
            flames
        </button>

        <button class="btn" id="metronomeToggle">
            metronome
        </button>

        <button class="btn" id="resetView">
            reset view
        </button>

    </div>

    <div class="slider-container">

        <label class="slider-label">
            beat speed:
            <span id="speedValue">120</span>
            bpm
        </label>

        <input
            type="range"
            id="beatSpeed"
            min="60"
            max="200"
            value="120"
        >

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene;
let camera;
let renderer;
let sphere;

let mouseX = 0;
let mouseY = 0;

let targetRotationX = 0;
let targetRotationY = 0;

let isDragging = false;

let autoRotate = true;
let beatBump = false;
let beatSpeed = 120;

let wavesEnabled = false;
let flamesEnabled = false;

let metronomeEnabled = false;
let metronomeAudio;

function init(){

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );

    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer({
        canvas:document.getElementById('canvas'),
        antialias:true,
        alpha:true
    });

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

    renderer.setPixelRatio(
        window.devicePixelRatio
    );

    renderer.setClearColor(0x000000);

    createSphere();

    const ambientLight =
        new THREE.AmbientLight(0xffffff,0.5);

    scene.add(ambientLight);

    const pointLight =
        new THREE.PointLight(0xffffff,0.8);

    pointLight.position.set(5,5,5);

    scene.add(pointLight);

    window.addEventListener('resize',onResize);

    document.addEventListener('mousedown',onMouseDown);
    document.addEventListener('mousemove',onMouseMove);
    document.addEventListener('mouseup',onMouseUp);

    document.addEventListener('wheel',onWheel);

    document.getElementById('autoRotate')
        .addEventListener('click',toggleAutoRotate);

    document.getElementById('beatBump')
        .addEventListener('click',toggleBeatBump);

    document.getElementById('waveToggle')
        .addEventListener('click',toggleWaves);

    document.getElementById('flameToggle')
        .addEventListener('click',toggleFlames);

    document.getElementById('metronomeToggle')
        .addEventListener('click',toggleMetronome);

    document.getElementById('resetView')
        .addEventListener('click',resetView);

    document.getElementById('beatSpeed')
        .addEventListener('input',updateBeatSpeed);

    initDraggableControls();

    animate();
}

function createSphere(){

    const geometry =
        new THREE.SphereGeometry(2,128,128);

    const material =
        new THREE.ShaderMaterial({

            uniforms:{
                time:{ value:0 },
                beatBump:{ value:0 },
                wavesEnabled:{ value:0 },
                flamesEnabled:{ value:0 }
            },

            vertexShader:`

                uniform float time;
                uniform float beatBump;
                uniform float wavesEnabled;
                uniform float flamesEnabled;

                varying vec3 vNormal;
                varying vec3 vPosition;

                void main(){

                    vNormal =
                        normalize(normalMatrix * normal);

                    vPosition = position;

                    float displacement = 0.0;

                    if(wavesEnabled > 0.5){

                        float wave1 =
                            sin(position.x * 3.0 + time * 0.8) *
                            cos(position.y * 3.0 + time * 0.6);

                        float wave2 =
                            sin(position.z * 4.0 + time * 0.5) *
                            cos(position.x * 2.0 + time * 0.4);

                        float wave3 =
                            sin(length(position.xy) * 6.0 - time * 1.2);

                        displacement +=
                            wave1 * 0.08 +
                            wave2 * 0.06 +
                            wave3 * 0.04;
                    }

                    if(flamesEnabled > 0.5){

                        float flameMask =
                            max(0.0, normal.y);

                        float flameNoise =
                            sin(position.x * 8.0 + time * 2.2) *
                            cos(position.z * 8.0 + time * 1.8);

                        float flameRise =
                            sin(time * 3.0 + position.y * 10.0);

                        float flames =
                            flameMask *
                            flameNoise *
                            flameRise *
                            0.12;

                        displacement += flames;
                    }

                    displacement += beatBump * 0.18;

                    vec3 newPosition =
                        position +
                        normal * displacement;

                    gl_Position =
                        projectionMatrix *
                        modelViewMatrix *
                        vec4(newPosition,1.0);
                }

            `,

            fragmentShader:`

                varying vec3 vNormal;
                varying vec3 vPosition;

                void main(){

                    vec3 viewDirection =
                        normalize(cameraPosition - vPosition);

                    float fresnel =
                        pow(
                            1.0 -
                            abs(dot(viewDirection,vNormal)),
                            2.5
                        );

                    vec3 color =
                        vec3(1.0) *
                        (0.25 + fresnel * 1.6);

                    gl_FragColor =
                        vec4(color,1.0);
                }

            `,

            wireframe:true

        });

    sphere =
        new THREE.Mesh(geometry,material);

    scene.add(sphere);
}

function toggleAutoRotate(){

    autoRotate = !autoRotate;

    document.getElementById('autoRotate')
        .classList.toggle('active');
}

function toggleBeatBump(){

    beatBump = !beatBump;

    document.getElementById('beatBump')
        .classList.toggle('active');
}

function toggleWaves(){

    wavesEnabled = !wavesEnabled;

    document.getElementById('waveToggle')
        .classList.toggle('active');
}

function toggleFlames(){

    flamesEnabled = !flamesEnabled;

    document.getElementById('flameToggle')
        .classList.toggle('active');
}

function toggleMetronome(){

    metronomeEnabled = !metronomeEnabled;

    document.getElementById('metronomeToggle')
        .classList.toggle('active');

    if(metronomeEnabled){

        playMetronome();

    }else{

        clearInterval(metronomeAudio);
    }
}

function updateBeatSpeed(){

    beatSpeed =
        parseInt(
            document.getElementById('beatSpeed').value
        );

    document.getElementById('speedValue')
        .textContent = beatSpeed;

    if(metronomeEnabled){
        playMetronome();
    }
}

function playMetronome(){

    if(!metronomeEnabled) return;

    if(metronomeAudio){
        clearInterval(metronomeAudio);
    }

    const interval =
        (60 / beatSpeed) * 1000;

    metronomeAudio = setInterval(()=>{

        const ctx =
            new (
                window.AudioContext ||
                window.webkitAudioContext
            )();

        const osc =
            ctx.createOscillator();

        const gain =
            ctx.createGain();

        osc.type = 'square';

        osc.frequency.value = 1200;

        gain.gain.value = 0.02;

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();

        osc.stop(ctx.currentTime + 0.03);

    }, interval);
}

function resetView(){

    targetRotationX = 0;
    targetRotationY = 0;

    camera.position.z = 5;
}

function onMouseDown(e){

    isDragging = true;

    mouseX = e.clientX;
    mouseY = e.clientY;
}

function onMouseMove(e){

    if(isDragging){

        const deltaX =
            e.clientX - mouseX;

        const deltaY =
            e.clientY - mouseY;

        targetRotationY += deltaX * 0.005;
        targetRotationX += deltaY * 0.005;

        mouseX = e.clientX;
        mouseY = e.clientY;
    }
}

function onMouseUp(){

    isDragging = false;
}

function onWheel(e){

    e.preventDefault();

    const delta = e.deltaY * 0.001;

    camera.position.z =
        Math.max(
            3,
            Math.min(
                10,
                camera.position.z + delta
            )
        );
}

function onResize(){

    camera.aspect =
        window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
}

function animate(){

    requestAnimationFrame(animate);

    if(autoRotate && !isDragging){

        targetRotationY += 0.003;
    }

    sphere.rotation.y +=
        (targetRotationY - sphere.rotation.y) * 0.05;

    sphere.rotation.x +=
        (targetRotationX - sphere.rotation.x) * 0.05;

    let beatValue = 0;

    if(beatBump){

        const bpm = beatSpeed / 60;

        const beat =
            Math.sin(
                performance.now() *
                0.001 *
                bpm *
                Math.PI
            );

        beatValue =
            beat > 0.7
            ? (beat - 0.7) * 1.2
            : 0;
    }

    sphere.material.uniforms.beatBump.value =
        beatValue;

    sphere.material.uniforms.wavesEnabled.value =
        wavesEnabled ? 1.0 : 0.0;

    sphere.material.uniforms.flamesEnabled.value =
        flamesEnabled ? 1.0 : 0.0;

    sphere.material.uniforms.time.value += 0.02;

    renderer.render(scene,camera);
}

function initDraggableControls(){

    const controls =
        document.querySelector('.controls');

    let drag = false;

    let offsetX = 0;
    let offsetY = 0;

    controls.addEventListener('mousedown',(e)=>{

        if(
            e.target.tagName === 'BUTTON' ||
            e.target.tagName === 'INPUT'
        ){
            return;
        }

        drag = true;

        offsetX =
            e.clientX - controls.offsetLeft;

        offsetY =
            e.clientY - controls.offsetTop;
    });

    window.addEventListener('mousemove',(e)=>{

        if(!drag) return;

        controls.style.left =
            (e.clientX - offsetX) + 'px';

        controls.style.top =
            (e.clientY - offsetY) + 'px';

        controls.style.right = 'auto';
    });

    window.addEventListener('mouseup',()=>{

        drag = false;
    });
}

init();

</script>

</body>
</html>
