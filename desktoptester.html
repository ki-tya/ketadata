<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>K-1 / GREYSCALE</title>
<style>
  :root{
    --bg:#000000;
    --bg-2:#111111;
    --bg-3:#1b1b1b;
    --panel:rgba(18,18,18,.94);
    --panel-2:rgba(34,34,34,.96);
    --panel-3:rgba(52,52,52,.96);
    --fg:#ffffff;
    --muted:rgba(255,255,255,.68);
    --dim:rgba(255,255,255,.44);
    --hair:rgba(255,255,255,.12);
    --hair-2:rgba(255,255,255,.2);
    --shadow:0 24px 80px rgba(0,0,0,.72);
    --radius:12px;

    --gray-floor:0;
    --gray-boost:0;
    --contrast:1;
    --invert:0;

    --folder-face:28;
    --folder-line:58;
    --drive-top:220;
    --drive-bottom:176;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow:hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.04), transparent 32%),
      radial-gradient(circle at 80% 30%, rgba(255,255,255,.025), transparent 30%),
      radial-gradient(circle at 50% 80%, rgba(255,255,255,.03), transparent 34%);
    mix-blend-mode:screen;
    opacity:.7;
  }

  .surface{
    width:100vw;
    height:100vh;
    filter:
      grayscale(calc(var(--gray-floor) * 1%))
      contrast(var(--contrast))
      invert(var(--invert));
    transition: filter .14s linear, background .14s linear;
    background:linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
  }

  body.dragging *{
    cursor:move !important;
    user-select:none !important;
    -webkit-user-select:none !important;
  }

  .menu-bar{
    height:24px;
    background:rgba(30,30,30,.96);
    border-bottom:1px solid rgba(255,255,255,.08);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 10px 0 12px;
    color:#fff;
    font-size:12px;
    letter-spacing:.04em;
    position:relative;
    z-index:1000;
  }

  .menu-left,.menu-right{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .menu-item{
    padding:2px 7px;
    border-radius:4px;
    cursor:pointer;
    color:rgba(255,255,255,.88);
    transition:background .12s ease,color .12s ease, opacity .12s ease;
  }

  .menu-item:hover{
    background:rgba(255,255,255,.08);
    color:#fff;
  }

  .menu-item.soft{
    color:rgba(255,255,255,.6);
  }

  .desktop{
    height:calc(100vh - 24px);
    position:relative;
    overflow:hidden;
  }

  .folder,.drive{
    width:106px;
    text-align:center;
    cursor:pointer;
    position:absolute;
    user-select:none;
  }

  .folder-icon{
    width:72px;
    height:58px;
    margin:0 auto 6px;
    position:relative;
    border-radius:4px;
    background:rgb(
      calc(var(--folder-face) + var(--gray-boost)),
      calc(var(--folder-face) + var(--gray-boost)),
      calc(var(--folder-face) + var(--gray-boost))
    );
    border:1px solid rgba(255,255,255,.08);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  }

  .folder-icon::before{
    content:"";
    position:absolute;
    left:-1px;
    top:-8px;
    width:30px;
    height:12px;
    border-radius:4px 4px 0 0;
    border:1px solid rgba(255,255,255,.08);
    border-bottom:none;
    background:rgb(
      calc(var(--folder-face) + 8 + var(--gray-boost)),
      calc(var(--folder-face) + 8 + var(--gray-boost)),
      calc(var(--folder-face) + 8 + var(--gray-boost))
    );
  }

  .folder-icon::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:4px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.06), transparent 22%),
      repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,.02) 3px 4px),
      repeating-linear-gradient(90deg, transparent 0 3px, rgba(0,0,0,.10) 3px 4px);
    mix-blend-mode:screen;
    opacity:.75;
  }

  .folder-name{
    color:rgba(255,255,255,.92);
    font-size:11px;
    line-height:1.25;
    letter-spacing:.05em;
    text-shadow:0 1px 1px rgba(0,0,0,.7);
    padding:0 4px;
    word-wrap:break-word;
  }

  .folder:hover .folder-icon,
  .folder:hover .folder-icon::before{
    filter:brightness(1.14);
  }

  .drive-icon{
    width:72px;
    height:58px;
    margin:0 auto 6px;
    position:relative;
    border-radius:4px;
    border:1px solid rgba(255,255,255,.18);
    background:linear-gradient(
      180deg,
      rgb(calc(var(--drive-top) + var(--gray-boost)), calc(var(--drive-top) + var(--gray-boost)), calc(var(--drive-top) + var(--gray-boost))) 0%,
      rgb(calc(var(--drive-bottom) + var(--gray-boost)), calc(var(--drive-bottom) + var(--gray-boost)), calc(var(--drive-bottom) + var(--gray-boost))) 100%
    );
    box-shadow:inset 0 1px 0 rgba(255,255,255,.3);
  }

  .drive-icon::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:8px;
    transform:translateX(-50%);
    width:28px;
    height:3px;
    border-radius:999px;
    background:rgba(0,0,0,.5);
  }

  .drive:hover .drive-icon{ filter:brightness(1.06); }

  .window-container{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:2000;
  }

  .window{
    position:absolute;
    display:flex;
    overflow:hidden;
    pointer-events:auto;
    background:var(--panel);
    border:1px solid rgba(255,255,255,.08);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    backdrop-filter:blur(20px);
  }

  .finder-window{
    width:760px;
    height:620px;
  }

  .content-window{
    width:520px;
    height:720px;
    background:rgba(0,0,0,.96);
    flex-direction:column;
  }

  .cv-mode .content-window{
    width:100vw !important;
    height:100vh !important;
    left:0 !important;
    top:0 !important;
    border-radius:0 !important;
    transform:none !important;
  }

  .finder-sidebar{
    width:190px;
    background:rgba(20,20,20,.96);
    border-right:1px solid rgba(255,255,255,.07);
    display:flex;
    flex-direction:column;
  }

  .finder-sidebar-header,
  .content-header{
    height:44px;
    min-height:44px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 14px;
    background:rgba(48,48,48,.95);
    border-bottom:1px solid rgba(255,255,255,.09);
    cursor:move;
  }

  .finder-close,
  .content-close{
    color:rgba(255,255,255,.65);
    cursor:pointer;
    padding:4px 7px;
    border-radius:4px;
    font-size:12px;
    transition:background .12s ease, color .12s ease;
  }

  .finder-close:hover,
  .content-close:hover{
    background:rgba(255,255,255,.08);
    color:#fff;
  }

  .finder-folders{
    flex:1;
    overflow:auto;
    padding:8px 0;
  }

  .finder-folder{
    padding:7px 14px;
    color:rgba(255,255,255,.68);
    font-size:12px;
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    transition:background .12s ease,color .12s ease;
  }

  .finder-folder:hover{ background:rgba(255,255,255,.05); color:#fff; }
  .finder-folder.active{ background:rgba(255,255,255,.1); color:#fff; }

  .finder-folder-dot{
    width:12px;
    height:12px;
    border-radius:2px;
    background:rgba(255,255,255,.86);
    opacity:.8;
  }

  .finder-main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  .finder-header{
    height:44px;
    min-height:44px;
    display:flex;
    align-items:center;
    padding:0 16px;
    background:rgba(58,58,58,.96);
    border-bottom:1px solid rgba(255,255,255,.08);
    color:rgba(255,255,255,.9);
    font-size:12px;
    letter-spacing:.05em;
  }

  .finder-content,
  .content-body{
    flex:1;
    overflow:auto;
    color:#fff;
  }

  .finder-content{
    padding:18px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.02), transparent 18%),
      rgba(0,0,0,.08);
  }

  .file-item{
    padding:12px 12px;
    border-radius:8px;
    background:rgba(255,255,255,.035);
    border:1px solid rgba(255,255,255,.04);
    color:rgba(255,255,255,.86);
    font-size:12px;
    margin-bottom:8px;
    cursor:pointer;
    transition:background .12s ease, border-color .12s ease, transform .12s ease;
  }

  .file-item:hover{
    background:rgba(255,255,255,.08);
    border-color:rgba(255,255,255,.11);
    transform:translateY(-1px);
  }

  .content-title{
    color:rgba(255,255,255,.92);
    font-size:12px;
    letter-spacing:.05em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    padding-right:12px;
  }

  .content-body{
    padding:26px;
    line-height:1.9;
    font-size:14px;
  }

  .content-body.cv-display{
    display:flex;
    justify-content:center;
    padding:60px 24px;
  }

  .content-body.cv-display > div{
    width:100%;
    max-width:880px;
  }

  .content-body h1,
  .content-body h2,
  .content-body h3{
    font-weight:400;
    letter-spacing:.03em;
    margin:0 0 14px 0;
  }

  .content-body h1{ font-size:28px; }
  .content-body h2{ font-size:22px; margin-top:24px; }
  .content-body h3{ font-size:18px; margin-top:18px; }

  .content-body p{
    font-size:14px;
    color:rgba(255,255,255,.92);
    margin:0 0 14px 0;
  }

  .content-body a{
    color:#fff;
    text-decoration:underline;
    text-decoration-color:rgba(255,255,255,.35);
  }

  .content-body img{
    max-width:100%;
    height:auto;
    display:block;
    margin:18px 0;
    border-radius:4px;
  }

  .loading,
  .empty{
    padding:28px;
    color:rgba(255,255,255,.48);
    text-align:center;
    font-size:12px;
    letter-spacing:.05em;
  }

  .resize-handle{
    position:absolute;
    background:transparent;
  }
  .resize-e{top:0;right:0;width:6px;height:100%;cursor:ew-resize}
  .resize-s{left:0;bottom:0;width:100%;height:6px;cursor:ns-resize}
  .resize-se{right:0;bottom:0;width:20px;height:20px;cursor:nwse-resize}

  .control-panel{
    position:fixed;
    right:14px;
    bottom:14px;
    width:290px;
    background:rgba(18,18,18,.95);
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    box-shadow:0 18px 60px rgba(0,0,0,.6);
    backdrop-filter:blur(16px);
    z-index:4000;
    overflow:hidden;
  }

  .control-head{
    height:36px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 12px;
    background:rgba(42,42,42,.98);
    border-bottom:1px solid rgba(255,255,255,.08);
    font-size:11px;
    letter-spacing:.08em;
    color:rgba(255,255,255,.86);
  }

  .control-body{
    padding:12px;
    display:grid;
    gap:10px;
  }

  .row{
    display:grid;
    grid-template-columns:88px 1fr 40px;
    gap:10px;
    align-items:center;
    font-size:11px;
    letter-spacing:.06em;
    color:rgba(255,255,255,.72);
  }

  .row input[type="range"]{
    width:100%;
    accent-color:#fff;
    background:transparent;
  }

  .val{
    text-align:right;
    color:rgba(255,255,255,.92);
  }

  .btn-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    padding-top:2px;
  }

  .ctl-btn{
    flex:1;
    min-width:82px;
    background:rgba(255,255,255,.06);
    color:#fff;
    border:1px solid rgba(255,255,255,.08);
    border-radius:8px;
    padding:8px 10px;
    font-size:11px;
    letter-spacing:.08em;
    cursor:pointer;
    transition:background .12s ease,border-color .12s ease,transform .12s ease;
  }

  .ctl-btn:hover{
    background:rgba(255,255,255,.1);
    border-color:rgba(255,255,255,.14);
    transform:translateY(-1px);
  }

  .hint{
    color:rgba(255,255,255,.44);
    font-size:10px;
    letter-spacing:.06em;
    line-height:1.45;
    padding-top:2px;
  }

  .flash{
    animation:flashPulse .12s linear 1;
  }

  @keyframes flashPulse{
    0%{ filter: grayscale(calc(var(--gray-floor) * 1%)) contrast(var(--contrast)) invert(var(--invert)); }
    50%{ filter: grayscale(100%) contrast(1.8) invert(calc(1 - var(--invert))); }
    100%{ filter: grayscale(calc(var(--gray-floor) * 1%)) contrast(var(--contrast)) invert(var(--invert)); }
  }
</style>
</head>

<div class="surface" id="surface">

      <div class="menu-item soft" onclick="flashSurface()">FLASH</div>
    </div>
    <div class="menu-right">
      <span id="clockText">MON      APR      20      12:00 AM</span>
    </div>
  </div>

  <div class="desktop" id="desktop"></div>
  <div id="windowsHost"></div>

  <div class="control-panel">
    <div class="control-head">
      <span>GREYSCALE CONTROLS</span>
      <span id="invertState">INVERT: OFF</span>
    </div>
    <div class="control-body">
      <div class="row">
        <label for="grayFloor">GRAY</label>
        <input id="grayFloor" type="range" min="0" max="100" value="100" />
        <div class="val" id="grayFloorVal">100</div>
      </div>
      <div class="row">
        <label for="grayBoost">BOOST</label>
        <input id="grayBoost" type="range" min="-20" max="60" value="0" />
        <div class="val" id="grayBoostVal">0</div>
      </div>
      <div class="row">
        <label for="contrast">CONTRAST</label>
        <input id="contrast" type="range" min="70" max="180" value="100" />
        <div class="val" id="contrastVal">1.00</div>
      </div>

      <div class="btn-row">
        <button class="ctl-btn" onclick="setGreyPreset('flat')">FLAT</button>
        <button class="ctl-btn" onclick="setGreyPreset('soft')">SOFT</button>
        <button class="ctl-btn" onclick="setGreyPreset('hard')">HARD</button>
        <button class="ctl-btn" onclick="resetVisuals()">RESET</button>
      </div>

      <div class="hint">
        KEYBOARD — I = INVERT / [ = LESS CONTRAST / ] = MORE CONTRAST / - = LESS GREY BOOST / = = MORE GREY BOOST / G = RESET GREYSCALE / F = FLASH
      </div>
    </div>
  </div>
</div>

function updateClock(){
  const now = new Date();
  const fmt = new Intl.DateTimeFormat('en-US',{
    weekday:'short', month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit',
    hour12:true
  }).formatToParts(now);

  const map = {};
  fmt.forEach(part => map[part.type] = part.value);
  const text = `${(map.weekday||'').toUpperCase()}      ${(map.month||'').toUpperCase()}      ${map.day||''}      ${map.hour||''}:${map.minute||''} ${(map.dayPeriod||'').toUpperCase()}`;
  document.getElementById('clockText').textContent = text;
}
updateClock();
setInterval(updateClock, 1000);

function getCirclePositions(){
  const cx = window.innerWidth / 2;
  const cy = (window.innerHeight - 24) / 2 + 12;
  const r = Math.min(cx, cy) * 0.7;
  const angleStep = (Math.PI * 2) / folderNames.length;
  return folderNames.map((_,i)=>{
    const a = i * angleStep - Math.PI / 2;
    return { x: cx + r * Math.cos(a) - 50, y: cy + r * Math.sin(a) - 50 };
  });
}

function createFolders(){
  desktop.innerHTML = '';

  const drive = document.createElement('div');
  drive.className = 'drive';
  drive.style.right = '60px';
  drive.style.bottom = '40px';
  drive.innerHTML = `<div class="drive-icon"></div><div class="folder-name">K-DRIVE</div>`;
  drive.onclick = ()=>{ stopPerpetualMotion(); openKetadataDrive(); };
  desktop.appendChild(drive);

  folderNames.forEach((name, i)=>{
    const el = document.createElement('div');
    el.className = 'folder';
    el.style.left = folderPositions[i].x + 'px';
    el.style.top = folderPositions[i].y + 'px';
    el.innerHTML = `<div class="folder-icon"></div><div class="folder-name">${name}</div>`;
    el.onclick = ()=>{ stopPerpetualMotion(); openFolder(name); };
    desktop.appendChild(el);
  });
}

function sortFolders(mode){
  stopPerpetualMotion();
  if(mode === 'q'){ startPerpetualMotion(); return; }
  const nodes = [...document.querySelectorAll('.folder')];
  const positions = mode === 'n' ? chronologicalPositions : mode === 't' ? getCirclePositions() : geographicPositions;
  nodes.forEach((el, i)=>{
    el.style.transition = 'left .45s ease, top .45s ease';
    el.style.left = positions[i].x + 'px';
    el.style.top = positions[i].y + 'px';
  });
}

function startPerpetualMotion(){
  const nodes = [...document.querySelectorAll('.folder')];
  const minTop = 24;
  function move(){
    nodes.forEach(el=>{
      el.style.transition = 'left 2.6s ease-in-out, top 2.6s ease-in-out';
      el.style.left = Math.max(0, Math.random() * (window.innerWidth - 160)) + 'px';
      el.style.top = Math.max(minTop, minTop + Math.random() * (window.innerHeight - minTop - 180)) + 'px';
    });
  }
  move();
  perpetualMotion = setInterval(move, 2800);
}

function stopPerpetualMotion(){
  if(perpetualMotion){
    clearInterval(perpetualMotion);
    perpetualMotion = null;
  }
}

function loadFolder(folderName, id){

function createContentWindow(fileName, url, isCv=false){
  const key = isCv ? 'cv' : `file:${url}`;
  if(openWindows.has(key)) return;
  openWindows.add(key);

  const id = `w-${windowCounter++}`;
  const offsetX = (windowCounter % 6) * 20;
  const offsetY = (windowCounter % 6) * 16;
  const left = isCv ? 0 : ((window.innerWidth * .62) - 260 + offsetX);
  const top = isCv ? 0 : (((window.innerHeight - 24) / 2) - 360 + 24 + offsetY);

  const wrap = document.createElement('div');
  wrap.className = `window-container ${isCv ? 'cv-mode' : ''}`;
  wrap.id = id;
  wrap.dataset.key = key;
  wrap.innerHTML = `
    <div class="window content-window" style="left:${left}px;top:${top}px;">
      <div class="content-header">
        <div class="content-title">${fileName}</div>
        <div class="content-close">×</div>
      </div>
      <div class="content-body ${isCv ? 'cv-display' : ''}">
        <div class="loading">LOADING...</div>
      </div>
      ${isCv ? '' : '<div class="resize-handle resize-e"></div><div class="resize-handle resize-s"></div><div class="resize-handle resize-se"></div>'}
    </div>
  `;
  windowsHost.appendChild(wrap);

  const win = wrap.querySelector('.content-window');
  const closeBtn = wrap.querySelector('.content-close');
  const header = wrap.querySelector('.content-header');
  closeBtn.onclick = ()=>closeWindow(id);

  if(!isCv){
    setupDragging(win, header);
    setupResize(win);
  }

  fetch(url)
    .then(r=>r.text())
    .then(md=>{
      const body = wrap.querySelector('.content-body');
      body.innerHTML = isCv ? `<div>${parseMarkdown(md)}</div>` : parseMarkdown(md);
    })
    .catch(()=>{
      wrap.querySelector('.content-body').innerHTML = `<div class="empty">ERROR LOADING FILE</div>`;
    });
}

function closeWindow(id){
  const el = document.getElementById(id);
  if(!el) return;
  if(el.dataset.key) openWindows.delete(el.dataset.key);
  el.remove();
}

function parseMarkdown(md){
  const lines = md.split('\n');
  let html = '';
  let inP = false;

  for(let line of lines){
    line = line.trim();
    if(!line){
      if(inP){ html += '</p>'; inP = false; }
      continue;
    }

    const imgMatch = line.match(/!\[([^\]]*)\]\(([^)]+)\)/);
    if(imgMatch){
      if(inP){ html += '</p>'; inP = false; }
      html += `<img src="${imgMatch[2]}" alt="${imgMatch[1]}">`;
      continue;
    }

    if(line.startsWith('### ')){
      if(inP){ html += '</p>'; inP = false; }
      html += `<h3>${line.slice(4)}</h3>`;
    } else if(line.startsWith('## ')){
      if(inP){ html += '</p>'; inP = false; }
      html += `<h2>${line.slice(3)}</h2>`;
    } else if(line.startsWith('# ')){
      if(inP){ html += '</p>'; inP = false; }
      html += `<h1>${line.slice(2)}</h1>`;
    } else {
      if(!inP){ html += '<p>'; inP = true; }
      else { html += ' '; }

      line = line
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,'<em>$1</em>')
        .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

      html += line;
    }
  }

  if(inP) html += '</p>';
  return html;
}

function setupDragging(win, handle){
  let moveHandler = null;
  let upHandler = null;

  handle.addEventListener('mousedown', (e)=>{
    if(e.target.closest('.finder-close') || e.target.closest('.content-close')) return;
    if(win.closest('.cv-mode')) return;

    const rect = win.getBoundingClientRect();
    isDragging = true;
    activeWindow = win;
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    document.body.classList.add('dragging');

    moveHandler = (ev)=>{
      if(!isDragging || activeWindow !== win) return;
      let left = ev.clientX - dragOffsetX;
      let top = ev.clientY - dragOffsetY;
      const minTop = 24;
      const maxLeft = window.innerWidth - win.offsetWidth;
      const maxTop = window.innerHeight - win.offsetHeight;

      left = Math.max(0, Math.min(left, maxLeft));
      top = Math.max(minTop, Math.min(top, maxTop));

      win.style.left = left + 'px';
      win.style.top = top + 'px';
    };

    upHandler = ()=>{
      isDragging = false;
      activeWindow = null;
      document.body.classList.remove('dragging');
      document.removeEventListener('mousemove', moveHandler, true);
      document.removeEventListener('mouseup', upHandler, true);
    };

    document.addEventListener('mousemove', moveHandler, true);
    document.addEventListener('mouseup', upHandler, true);
    e.preventDefault();
  });
}

function setupResize(win){
  const handles = win.querySelectorAll('.resize-handle');
  handles.forEach(handle=>{
    let moveHandler = null;
    let upHandler = null;

    handle.addEventListener('mousedown', (e)=>{
      isResizing = true;
      activeWindow = win;
      document.body.classList.add('dragging');

      resizeMode = handle.classList.contains('resize-se') ? 'se' :
                   handle.classList.contains('resize-e') ? 'e' : 's';
      startX = e.clientX;
      startY = e.clientY;
      startW = win.offsetWidth;
      startH = win.offsetHeight;

      moveHandler = (ev)=>{
        if(!isResizing || activeWindow !== win) return;
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;

        if(resizeMode === 'e' || resizeMode === 'se'){
          win.style.width = Math.max(400, startW + dx) + 'px';
        }
        if(resizeMode === 's' || resizeMode === 'se'){
          win.style.height = Math.max(300, startH + dy) + 'px';
        }
      };

      upHandler = ()=>{
        isResizing = false;
        activeWindow = null;
        document.body.classList.remove('dragging');
        document.removeEventListener('mousemove', moveHandler, true);
        document.removeEventListener('mouseup', upHandler, true);
      };

      document.addEventListener('mousemove', moveHandler, true);
      document.addEventListener('mouseup', upHandler, true);
      e.preventDefault();
      e.stopPropagation();
    });
  });
}

function applyVisuals(){
  document.documentElement.style.setProperty('--gray-floor', String(visualState.grayFloor));
  document.documentElement.style.setProperty('--gray-boost', String(visualState.grayBoost));
  document.documentElement.style.setProperty('--contrast', String(visualState.contrast));
  document.documentElement.style.setProperty('--invert', visualState.invert ? '1' : '0');

  document.getElementById('grayFloor').value = visualState.grayFloor;
  document.getElementById('grayBoost').value = visualState.grayBoost;
  document.getElementById('contrast').value = Math.round(visualState.contrast * 100);

  document.getElementById('grayFloorVal').textContent = visualState.grayFloor;
  document.getElementById('grayBoostVal').textContent = visualState.grayBoost;
  document.getElementById('contrastVal').textContent = visualState.contrast.toFixed(2);
  document.getElementById('invertState').textContent = `INVERT: ${visualState.invert ? 'ON' : 'OFF'}`;
}

function toggleInvert(){
  visualState.invert = !visualState.invert;
  applyVisuals();
}

function flashSurface(){
  surface.classList.remove('flash');
  void surface.offsetWidth;
  surface.classList.add('flash');
  setTimeout(()=>surface.classList.remove('flash'), 140);
}

function resetVisuals(){
  visualState.grayFloor = 100;
  visualState.grayBoost = 0;
  visualState.contrast = 1;
  visualState.invert = false;
  applyVisuals();
}

function setGreyPreset(mode){
  if(mode === 'flat'){
    visualState.grayFloor = 100;
    visualState.grayBoost = 0;
    visualState.contrast = 1;
  } else if(mode === 'soft'){
    visualState.grayFloor = 100;
    visualState.grayBoost = 14;
    visualState.contrast = .92;
  } else if(mode === 'hard'){
    visualState.grayFloor = 100;
    visualState.grayBoost = -8;
    visualState.contrast = 1.28;
  }
  applyVisuals();
}

document.getElementById('grayFloor').addEventListener('input', e=>{
  visualState.grayFloor = Number(e.target.value);
  applyVisuals();
});
document.getElementById('grayBoost').addEventListener('input', e=>{
  visualState.grayBoost = Number(e.target.value);
  applyVisuals();
});
document.getElementById('contrast').addEventListener('input', e=>{
  visualState.contrast = Number(e.target.value) / 100;
  applyVisuals();
});

document.addEventListener('keydown', (e)=>{
  const tag = (e.target.tagName || '').toLowerCase();
  const typing = tag === 'input' || tag === 'textarea' || e.target.isContentEditable;
  if(typing) return;

  if(e.key.toLowerCase() === 'i'){
    e.preventDefault();
    toggleInvert();
  }
  if(e.key.toLowerCase() === 'f'){
    e.preventDefault();
    flashSurface();
  }
  if(e.key.toLowerCase() === 'g'){
    e.preventDefault();
    visualState.grayFloor = 100;
    visualState.grayBoost = 0;
    applyVisuals();
  }
  if(e.key === '['){
    e.preventDefault();
    visualState.contrast = Math.max(.7, +(visualState.contrast - .05).toFixed(2));
    applyVisuals();
  }
  if(e.key === ']'){
    e.preventDefault();
    visualState.contrast = Math.min(1.8, +(visualState.contrast + .05).toFixed(2));
    applyVisuals();
  }
  if(e.key === '-'){
    e.preventDefault();
    visualState.grayBoost = Math.max(-20, visualState.grayBoost - 2);
    applyVisuals();
  }
  if(e.key === '=' || e.key === '+'){
    e.preventDefault();
    visualState.grayBoost = Math.min(60, visualState.grayBoost + 2);
    applyVisuals();
  }
});

window.addEventListener('resize', ()=>{
  stopPerpetualMotion();
});

function escapeSingle(str){
  return str.replace(/'/g, "\\'");
}

createFolders();
applyVisuals();
